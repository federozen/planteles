  uruguay: {
    nombre:'Uruguay', flag:'🇺🇾', dt:'Marcelo Bielsa', mundiales:'2', grupo:'H',
    jugadores:[
      { numero:1,  nombre:'Fernando Muslera',       pos:'GK',  nacimiento:'16 jun 1986', club:'Estudiantes de La Plata', pais_club:'Argentina', foto:'', bio:'Muslera nacio en Buenos Aires el dia que Argentina vencio a Uruguay en los octavos de final del Mundial de 1986, pero nunca hubo dudas sobre su lealtad: fue nombrado en honor al delantero uruguayo Fernando Morena. Su vida cambio a los ocho anos cuando no se presento el arquero de su equipo. Como cualquier chico solo queria jugar, pero cada vez que recibia un gol, me ponia a llorar. Ahora hace historia como el primer uruguayo en participar en cinco Mundiales.', dato_extra:'Primer uruguayo en la historia en participar en cinco Mundiales' },
      { numero:12, nombre:'Sergio Rochet',          pos:'GK',  nacimiento:'23 mar 1993', club:'Internacional',           pais_club:'Brasil',    foto:'', bio:'Era bastante desconocido cuando aparecio en las celebraciones del titulo de liga de Danubio en 2014 como tercer arquero a los 21 anos. Pronto partio a los Paises Bajos y el AZ Alkmaar. En 2019 Nacional lo trajo de vuelta a Uruguay. La madre de Sergio dijo que el traspaso a Nacional era el sueno de su hijo. Ella apenas podia creerlo cuando jugo en el Mundial de 2022: El dia que lo vi en el primer partido fue un shock. Me detuve frente al televisor y solo llore.', dato_extra:'Su madre no paro de llorar al verlo debutar en el Mundial de 2022' },
      { numero:23, nombre:'Santiago Mele',          pos:'GK',  nacimiento:'6 sep 1997',  club:'Monterrey',               pais_club:'Mexico',    foto:'', bio:'Mele aparecio en todas las portadas uruguayas cuando hizo dos atajadas en penales contra Portugal en el Mundial Sub-20 de 2017. Los estaba observando, queria hacer juegos mentales porque eso tiene una gran influencia. Despues le costo tiempo de juego en Turquia y Espana. Esos tres anos en Turquia fueron dificiles, al igual que volver a Uruguay para tomar las riendas de mi carrera. Junto con entregarme a Dios, estas son las razones por las que estoy donde estoy.', dato_extra:'Atajo dos penales clave contra Portugal haciendo juegos mentales' },
      { numero:24, nombre:'Franco Israel',          pos:'GK',  nacimiento:'22 abr 2000', club:'Torino',                  pais_club:'Italia',    foto:'', bio:'Entusiasta jugador de basquetbol, Israel solo se inclino por el futbol tras ver a Uruguay en el Mundial de 2010. Impresiono en Nacional cuando ganaron la Copa Libertadores Sub-20 en 2018, consiguio un traspaso a la Juventus sin haber jugado un partido en primera y pudo aprender de Gianluigi Buffon. Ha sido mi heroe desde que era chico. Entrenar con el es un sueno. Despues de tres anos en Lisboa con el Sporting, esta de vuelta en Turin. Se espera que sea el numero 1 de Bielsa en este Mundial.', dato_extra:'Se espera que sea el arquero numero 1 de Marcelo Bielsa en el Mundial' },
      { numero:2,  nombre:'Ronald Araujo',          pos:'DEF', nacimiento:'7 mar 1999',  club:'Barcelona',               pais_club:'Espana',    foto:'', bio:'Hacia finales del ano pasado, tras una tarjeta roja contra el Chelsea en la Liga de Campeones, decidio alejarse del juego para recibir tratamiento por depresion que lo habia estado afectando por mas de un ano. Tenemos que entender que ademas de ser futbolistas, somos personas, dijo cuando regreso 47 dias despues. En Qatar una lesion le impidio jugar. Bicampeon de La Liga, es parte del grupo de capitanes del Barcelona.', dato_extra:'Roca defensiva del Barcelona que hablo abiertamente sobre la salud mental' },
      { numero:3,  nombre:'Jose Maria Gimenez',     pos:'DEF', nacimiento:'20 ene 1995', club:'Atletico Madrid',         pais_club:'Espana',    foto:'', bio:'Cuando jugaba en la academia de Danubio a los 17 anos, su hermana Agustina de 14 quedo embarazada. Con los ojos llenos de lagrimas les dijo a sus padres que el mantendria al bebe. Penso en dejar el futbol pero Danubio lo ayudo. A los 18 firmo por el Atletico y en su debut enfrentando a Radamel Falcao le pregunto durante un ataque si tenia auto en Madrid para distraerlo. Dias despues Gimenez se tatuo esa pregunta en el cuerpo. Ahora capitan con mas de 100 partidos y tres Mundiales.', dato_extra:'El capitan que a los 18 anos distrajo a Falcao preguntandole por su auto' },
      { numero:4,  nombre:'Sebastian Caceres',      pos:'DEF', nacimiento:'18 ago 1999', club:'America',                 pais_club:'Mexico',    foto:'', bio:'Dias antes de una final, Caceres tenia una oferta del America de Mexico. En lugar de aceptar el traspaso, decidio quedarse en Liverpool de Montevideo. Queria ser campeon con Liverpool. Queria jugar ese partido por el club que me formo. La final termino en gloria. El America regreso al ano siguiente y el central gano tres titulos de liga alli. Ha jugado para Uruguay en todas las categorias desde la sub-17.', dato_extra:'Rechazo millones del futbol mexicano para ser campeon con el club de su infancia' },
      { numero:5,  nombre:'Santiago Bueno',         pos:'DEF', nacimiento:'9 nov 1998',  club:'Wolves',                  pais_club:'Inglaterra',foto:'', bio:'En medio del Mundial Sub-20 de 2017, siendo titular para Uruguay, Bueno firmo con el Barcelona. Llego como campeon sudamericano sub-20 pero le costo hacerse un lugar. Tuve que dar un paso atras para dar dos pasos adelante. La apuesta valio la pena y en un par de anos ya jugaba en La Liga. Siguio un traspaso a la Premier League con los Wolves y ha estado sonando todos los dias con un lugar en el avion para este Mundial.', dato_extra:'Tuvo que dar un paso atras en el Barcelona para dar dos hacia adelante' },
      { numero:17, nombre:'Matias Vina',            pos:'DEF', nacimiento:'9 nov 1997',  club:'River Plate',             pais_club:'Argentina', foto:'', bio:'Cuando estaba a punto de firmar su primer contrato con Nacional, se rompio la clavícula. El club lo espero. Compitio por el lateral izquierdo con Mathias Olivera desde la academia. A veces me deprimia porque no estaba jugando, pero mi familia me ayudo mucho. En 2019 debuto internacionalmente. Es tricampeon de la Copa Libertadores y fue fichado por Jose Mourinho en la Roma.', dato_extra:'Lateral resiliente que no logro ser titular regular hasta los 22 anos' },
      { numero:22, nombre:'Joaquin Piquerez',       pos:'DEF', nacimiento:'24 ago 1998', club:'Palmeiras',               pais_club:'Brasil',    foto:'', bio:'A los 19 anos, Piquerez pateo un penal en la final del campeonato uruguayo y fallo, perdiendo Defensor la tanda 4-2. Crecí en Defensor y esta no es la forma en que queria irme. Uso ese revers como combustible. En 2021 levanto la Copa Libertadores en el Estadio Centenario de Montevideo, donde habia fallado ese penal cuatro anos antes, cerrando el circulo perfectamente.', dato_extra:'Levanto la Libertadores en el mismo estadio donde fallo un penal clave a los 19 anos' },
      { numero:16, nombre:'Mathias Olivera',        pos:'DEF', nacimiento:'31 oct 1997', club:'Napoli',                  pais_club:'Italia',    foto:'', bio:'Aunque se hizo un nombre como lateral izquierdo, Bielsa lo despliega como central. Es un central bastante liviano que se siente comodo en posiciones abiertas y me gusta este tipo de central con una vida pasada como lateral. Sus primeros pasos en Europa se vieron obstaculizados por la nostalgia. Extrañaba mucho mi casa. Lloraba todos los dias y queria volver. Desde el Mundial de 2022 gano dos titulos de la Serie A con el Napoli.', dato_extra:'Cuando llego a Europa con 19 anos, lloraba todos los dias extranando su casa' },
      { numero:13, nombre:'Guillermo Varela',       pos:'DEF', nacimiento:'24 mar 1993', club:'Flamengo',                pais_club:'Brasil',    foto:'', bio:'Sus actuaciones en el Mundial Sub-20 de 2013 atrajeron al Manchester United. Fue cedido al Real Madrid y al Eintracht Frankfurt. Su tiempo en Alemania termino de forma amarga por un tatuaje inflamado antes de la final de la Copa de Alemania. Todos los demas jugadores tenian tatuajes. El tecnico dijo que le habia faltado el respeto por perderme un entrenamiento. Tras etapas en Dinamarca y Rusia, gano dos Copas Libertadores con el Flamengo.', dato_extra:'Su carrera en Alemania termino de forma amarga por un tatuaje' },
      { numero:26, nombre:'Jose Luis Rodriguez',    pos:'DEF', nacimiento:'14 mar 1997', club:'Vasco da Gama',           pais_club:'Brasil',    foto:'', bio:'Uruguay anuncio su plantel para el Mundial 2022 con un video donde el nombre de cada jugador era sostenido en una camiseta. Todos excepto Rodriguez, cuyo nombre simplemente fue escrito en un telefono y mostrado a la camara. Fue la gran sorpresa de la lista de Diego Alonso. Cuatro anos antes su propuesto traspaso de Danubio al Real Madrid fue gran noticia, pero le dijeron que el trato se habia cancelado justo cuando planeaba viajar a Espana.', dato_extra:'La gran sorpresa anunciada a ultimo minuto para el Mundial de 2022' },
      { numero:15, nombre:'Federico Valverde',      pos:'MID', nacimiento:'22 jul 1998', club:'Real Madrid',             pais_club:'Espana',    foto:'', bio:'Acompanaba a su madre a su puesto en el mercado y empezo a jugar al futbol tan joven que aun usaba panales. Cuando llego al Real Madrid en 2016, se sentia acomplejado al comparar su ropa con la de sus companeros. Llevas una remera de 2 euros, se decia. Irónicamente para un jugador que no le gustaba correr, ascendio de rango gracias a sus atributos fisicos excepcionales. Llega a este Mundial como el talismán de su pais tras un triplete al Manchester City en la Champions de marzo.', dato_extra:'El talismán — llego al Real Madrid acomplejado usando una remera de 2 euros' },
      { numero:6,  nombre:'Rodrigo Bentancur',      pos:'MID', nacimiento:'25 jun 1997', club:'Tottenham',               pais_club:'Inglaterra',foto:'', bio:'Un Bentancur de 12 anos dejo su pequeno pueblo de 11.000 habitantes para dar el salto en Buenos Aires. Boca Juniors creyo haber encontrado un talento especial. Fue difícil. Yo no quería saber nada pero mi papa me convencio. En su primer Mundial asistio en el gol de la victoria de Cavani contra Portugal. Lo festeje como si lo hubiera marcado yo mismo, dijo. Los problemas de lesiones han frenado su prometedora carrera, pero es ahora un miembro experimentado del plantel de Bielsa.', dato_extra:'Dejo su pueblo de 11.000 habitantes a los 12 anos para buscar suerte en Boca' },
      { numero:8,  nombre:'Nahitan Nandez',         pos:'MID', nacimiento:'28 dic 1995', club:'Al-Qadsiah',              pais_club:'Arabia S.', foto:'', bio:'Inquieto de nino, su madre constantemente intentaba encontrar actividades para canalizar su energía. Una vez lo llevo a los boy scouts pero el lugar estaba cerrado. El futbol ofrecio la solucion. Dejo Boca Juniors por el Cagliari con La Bombonera coreando su nombre. Nacio con la camiseta de Boca pintada en la piel, dijo su entrenador. Se perdio el ultimo Mundial por un caso legal. Ahora juega bajo el mando de Brendan Rodgers en Arabia Saudita.', dato_extra:'Nacio con la camiseta de Boca pintada en la piel y es un corredor incansable' },
      { numero:10, nombre:'Giorgian de Arrascaeta', pos:'MID', nacimiento:'1 jun 1994', club:'Flamengo',                 pais_club:'Brasil',    foto:'', bio:'Un traspaso a Europa es el objetivo final para la mayoria de los futbolistas sudamericanos. No para De Arrascaeta. Es uno de los mejores de un continente que nunca ha dejado. Idolo en el Flamengo tras levantar 20 trofeos en siete anos, incluyendo tres Copas Libertadores. Las criticas son parte del futbol y te acostumbras con la experiencia. Marco dos goles contra Ghana en el Mundial de 2022, pero lo ocurrido en otras canchas condeno a Uruguay a una eliminacion temprana.', dato_extra:'Idolo indiscutido en Brasil con 20 trofeos sin haber jugado nunca en Europa' },
      { numero:7,  nombre:'Nicolas de la Cruz',     pos:'MID', nacimiento:'1 jun 1997', club:'Flamengo',                 pais_club:'Brasil',    foto:'', bio:'Le ofrecieron un contrato en Liverpool de Montevideo incluso antes de patear una pelota en su primer entrenamiento. Le encantaba que le pegaran, dijo un companero. En las reuniones se sentaba en la silla del presidente del club con tal descaro que este solo podia sonreir. Su mayor idolo era su medio hermano Carlos Sanchez. Desde el Mundial de 2022 se recupero de una lesion de rodilla que un medico del Flamengo dijo que no iba a superar.', dato_extra:'Se recupero de una lesion de rodilla que un medico afirmo que acabaria con su carrera' },
      { numero:20, nombre:'Manuel Ugarte',          pos:'MID', nacimiento:'11 abr 2001', club:'Manchester United',       pais_club:'Inglaterra',foto:'', bio:'Este ano es el 25 de Ugarte en este planeta y su decimo en el futbol profesional. Era un prodigio de 15 anos en Fenix y en cuatro anos en Europa paso del Famalicao de Portugal al Manchester United via Sporting y PSG. Su madre dijo: Manuel me llamo y le temblaba la voz porque estaba compartiendo vestuario con companeros con los que hasta unos dias antes jugaba en la PlayStation. Apodado El Poeta, su caracteristica definitoria es el trabajo duro.', dato_extra:'Apodado El Poeta, su principal caracteristica en el mediocampo es el trabajo duro' },
      { numero:21, nombre:'Emiliano Martinez',      pos:'MID', nacimiento:'17 ago 1999', club:'Palmeiras',               pais_club:'Brasil',    foto:'', bio:'Llego a la academia de Nacional como numero 10 y se unio al primer equipo como mediocampista defensivo admirando a Busquets. Viajaba pidiendo lugar en el auto de la madre de un companero para recorrer 130km desde Maldonado a Montevideo para entrenar. Mantuvo la calma en penales para enviar a Nacional a los cuartos de la Libertadores 2020, admitiendo: Nunca habia pateado un penal ni siquiera en los entrenamientos.', dato_extra:'Viajaba 130 km cada dia para entrenar desde Maldonado hasta Montevideo' },
      { numero:14, nombre:'Juan Manuel Sanabria',   pos:'MID', nacimiento:'29 mar 2000', club:'Real Salt Lake',          pais_club:'EEUU',      foto:'', bio:'Tras ganar la Copa Libertadores Sub-20 con Nacional, un Sanabria de 18 anos firmo con el Atletico de Madrid. Solia viajar 100km ida y vuelta a los entrenamientos para poder relajarse en casa en Florida. Jugo para el equipo B del Atletico antes de mudarse al filial en Mexico. Tecnicamante es excelente. Nadie tiene mas ritmo que el y puede jugar de lateral, de mediocampista central o de extremo, dijo Bielsa.', dato_extra:'Elogiado por su versatilidad por Bielsa: nadie tiene mas ritmo que el' },
      { numero:18, nombre:'Facundo Torres',         pos:'MID', nacimiento:'13 abr 2000', club:'Austin FC',               pais_club:'EEUU',      foto:'', bio:'Torres ha tenido admiradores notables. Alcides Ghiggia, autor del legendario gol del Mundial de 1950, le entrego un premio en un torneo juvenil. Carlos Aguilera, campeon de la Copa America en 1983, se acerco a su padre para decirle que era un gran jugador con un futuro asombroso. Nestor Goncalves lo llevo a Peñarol a los 11 anos, donde entreno con Valverde. Suplente sin minutos en el ultimo Mundial, ha ganado trofeos con el Orlando City.', dato_extra:'Elogiado desde nino por leyendas historicas del futbol uruguayo' },
      { numero:25, nombre:'Rodrigo Zalazar',        pos:'MID', nacimiento:'12 ago 1999', club:'Braga',                   pais_club:'Portugal',  foto:'', bio:'Su padre Jose Zalazar fue uno de los uruguayos que inicio la tendencia de irse a Europa en los 80 y jugo mas de 200 partidos en el Albacete, ciudad donde nacio Rodrigo. Su carrera juvenil transcurrio en Espana. A diferencia de su hermano Kuki que jugo en las juveniles de Espana, la lealtad de Rodrigo nunca estuvo en duda. Nunca pense en jugar para Espana. Siempre sone con jugar para Uruguay.', dato_extra:'Nacido en Espana, siempre tuvo claro que su sueno era jugar para Uruguay' },
      { numero:9,  nombre:'Darwin Nunez',           pos:'FWD', nacimiento:'24 jun 1999', club:'Al-Hilal',                pais_club:'Arabia S.', foto:'', bio:'Algun dia me veran jugando en Europa, les decia Nunez a sus entrenadores en juveniles en Artigas. No me olvido de donde vengo. Mi madre salia a juntar botellas en la calle para venderlas. Lesiones graves de rodilla en su adolescencia hicieron que considerara dejar el futbol, pero eligio luchar. Un rapido ascenso lo llevo por Peñarol, Almeria y Benfica antes del Liverpool. Gano la Premier League y la Copa de la Liga. Este sera su segundo Mundial.', dato_extra:'Estuvo a punto de dejar el futbol en la adolescencia debido a lesiones graves' },
      { numero:11, nombre:'Facundo Pellistri',      pos:'FWD', nacimiento:'20 dic 2001', club:'Panathinaikos',           pais_club:'Grecia',    foto:'', bio:'El Manchester United pago 10 millones de dolares para ficharlo con solo 18 anos proveniente de Peñarol. Hijo de un contador y una pediatra, cuyo padrino es cantante en una famosa banda de rock uruguaya. Brillo como titular inesperado en el equipo de 2022, pero ha visto estancarse su carrera en multiples prestamos en Espana. Ahora en Grecia de forma permanente bajo las ordenes de Rafa Benitez.', dato_extra:'Hijo de una pediatra y un contador, fue la titularidad sorpresa en Qatar 2022' },
      { numero:19, nombre:'Brian Rodriguez',        pos:'FWD', nacimiento:'20 may 2000', club:'America',                 pais_club:'Mexico',    foto:'', bio:'Rodriguez dejo Tranqueras de 7.000 habitantes para unirse a los juveniles de Tacuarembo y consiguio una prueba en Peñarol a los 15 anos. El primer entrenamiento fue duro. Lo patearon y le robaron la pelota pero lo soporto bien. La conducta le costo caro en ocasiones, obligado a entrenar con categorias menores dos veces por mal comportamiento. Los que me conocen saben lo que me ha costado llegar hasta aqui.', dato_extra:'Los que me conocen saben lo que me ha costado llegar hasta aqui' },
      { numero:27, nombre:'Maximiliano Araujo',     pos:'FWD', nacimiento:'15 feb 2000', club:'Sporting',                pais_club:'Portugal',  foto:'', bio:'En 2012 un video se volvio viral en Uruguay mostrando a un nino corriendo por la banda y asistiendo en gol en un partido infantil. Era Maxi Araujo centrando para que su hermano Cesar ganara la Danone Cup. Ambos ninos ahora son futbolistas profesionales. Bielsa bromeo llamandolo malisimo antes de aclarar: Me gustan los jugadores que corren directamente de un area a la otra, que sacan muchos centros, y Maxi tiene todas esas caracteristicas.', dato_extra:'Bielsa lo llamo malisimo en broma antes de elogiar todas sus virtudes' },
      { numero:28, nombre:'Federico Vinas',         pos:'FWD', nacimiento:'30 jun 1998', club:'Leon',                    pais_club:'Mexico',    foto:'', bio:'Soy Federico Vinas, es posible que me hayan confundido con Matias Vina, dijo el delantero cuando fue convocado. Jugar futbol internacional es muy distinto al barrio Casabo en Montevideo donde se ganaba la vida entregando productos carnicos. El delantero apodado El Tanque llego con 15 kilos de sobrepeso a su prueba amateur pero debuto en el primer equipo un ano despues. Logro el ascenso a La Liga con el Real Oviedo.', dato_extra:'Ex repartidor de carne que llego a su prueba amateur con 15 kilos de sobrepeso' },
      { numero:29, nombre:'Rodrigo Aguirre',        pos:'FWD', nacimiento:'1 oct 1994',  club:'Tigres',                  pais_club:'Mexico',    foto:'', bio:'En el Mundial Sub-17 de 2011 quedo inconsciente en la final contra Mexico y desperto en el hospital. Lo primero que recuerdo fue cuando los medicos me preguntaron como me llamaba. Dos anos despues se perdio el Mundial Sub-20 por un problema cardiaco. No fue hasta una racha goleadora en el America de Mexico que llamo la atencion de Bielsa. Hizo su debut internacional absoluto a los 30 anos y marco contra Colombia en el Estadio Centenario. No podria haberlo sonado mejor.', dato_extra:'Debuto en la seleccion absoluta y marco un gol de eliminatorias a sus 30 anos' },
      { numero:30, nombre:'Luciano Rodriguez',      pos:'FWD', nacimiento:'16 jul 2003', club:'Neom SC',                 pais_club:'Arabia S.', foto:'', bio:'El 16 de julio es sagrado en el futbol uruguayo, siendo el dia de la victoria contra Brasil que sello el Mundial de 1950. Rodriguez, nacido en esa fecha, fue quien entrego el siguiente titulo mundial 73 anos despues marcando el gol decisivo en la final del Sub-20 contra Italia en 2023. Fue apodado La Perla. Ha tenido una relacion complicada con Bielsa por momentos — el tecnico lo dejo fuera por considerar que habia ganado demasiada masa muscular. Ahora esta de vuelta tras su traspaso a la Pro League Saudi.', dato_extra:'Apodado La Perla, le dio a Uruguay su siguiente titulo mundial 73 anos despues' },
      { numero:31, nombre:'Ignacio Laquintana',     pos:'FWD', nacimiento:'1 feb 1999',  club:'RB Bragantino',           pais_club:'Brasil',    foto:'', bio:'Laquintana estaba en la academia de Defensor Sporting cuando unos examenes cardiologicos detectaron un latido irregular. Me dijeron que quizas tendrian que ponerme un marcapasos. Se sometio a dos operaciones para poder seguir jugando al futbol y marco un gol en su debut en liga meses despues. Un traspaso a Brasil en 2023 alerto la atencion de Bielsa. Ayudo al Santos a regresar a la maxima categoria tras su historico descenso.', dato_extra:'Tuvo que operarse el corazon dos veces a los 19 anos para seguir jugando' }
    ]

  colombia:      { nombre:'Colombia',       flag:'🇨🇴', dt:'', mundiales:'0', grupo:'K', subtitulo:'Los Cafeteros',  jugadores:[{ 
        numero:1, nombre:'Álvaro Montero', pos:'GK', nacimiento:'29 mar 1995', club:'Vélez Sarsfield', pais_club:'Argentina', foto:'', 
        bio:'Si algo caracteriza a Montero es su enorme confianza en sí mismo. Cuando llegó a Vélez Sarsfield el año pasado, dijo: "Soy un arquero al que es muy difícil marcarle; esa es mi mejor cualidad. Después de eso, tenemos altibajos, fortalezas y debilidades". Montero probó suerte en el extranjero con el São Caetano en Brasil y San Lorenzo en Argentina, pero apenas jugó. No fue hasta que regresó a Colombia con el Tolima que comenzó a ganar confianza. Solo habían ganado un título de liga en 63 años, pero con Montero en la portería ganaron dos en cuatro años, sorprendiendo a Atlético Nacional y Millonarios en los partidos de vuelta fuera de casa. Después de la final de 2021, Montero lo celebró dándole al árbitro un gran pero no correspondido abrazo por la espalda, subiéndole los pantalones cortos. Cuando el entrenador del Tolima, Alberto Gamero, se fue a Millonarios, Montero le dijo: "Jefe, si quiere ganar trofeos allí, tendrá que llevarme con usted". Lo hizo y ganaron tres de ellos.', 
        dato_extra:'Celebró un título de liga dándole al árbitro un gran abrazo sorpresivo por la espalda' 
      },
      { 
        numero:12, nombre:'David Ospina', pos:'GK', nacimiento:'31 ago 1988', club:'Atlético Nacional', pais_club:'Colombia', foto:'', 
        bio:'Suplente de Vargas tras la mayor parte de una década como número 1. Cuando era pequeño, durante los viajes al supermercado, Ospina abandonaba a sus padres en busca de las pelotas de fútbol. Para empezar, no quería ser arquero. Tenía todos los ingredientes de un delantero: podía patear con ambos pies y tenía olfato de gol. Sin embargo, cuando el arquero del equipo de la academia Alexis García no apareció un día, Ospina levantó la mano y se puso entre los tres palos. A los 18 años, ya estaba ganando títulos de liga como el arquero titular del Atlético Nacional. Su debut internacional se produjo casi por accidente cuando el número 1 Miguel Calero fue expulsado en un partido contra Uruguay y Ospina fue lanzado en su lugar. Más de 125 partidos internacionales después, el jugador de 38 años llega a su tercer Mundial. Tiene dos FA Cups con el Arsenal, jugando la final de 2017 contra el Chelsea, y una Coppa Italia con el Napoli a su nombre.', 
        dato_extra:'Debutó en la selección de forma inesperada tras una expulsión de Miguel Calero' 
      },
      { 
        numero:22, nombre:'Camilo Vargas', pos:'GK', nacimiento:'9 mar 1989', club:'Atlas', pais_club:'México', foto:'', 
        bio:'Sabe un par de cosas sobre acabar con maldiciones, habiéndolo hecho en dos de los clubes más tradicionales de Sudamérica. En 2012 ayudó a su primer equipo, Santa Fe, a ganar su primer título de liga desde 1975. Y eso tuvo mucho que ver con su suegra, Sandra Merino. A ella no le gustaba el fútbol, pero empezó a interesarse cuando su hija, Ángela, se juntó con Vargas. Una devota seguidora de Cristo, Sandra les dijo a los directivos de Santa Fe que el equipo estaba siendo afectado por brujería. A pesar del escepticismo inicial, el club invitó a Sandra a conocer al equipo y ella les limpió los pies. Después de eso, los jugadores saltaron a la cancha descalzos antes de los partidos. Funcionó. Al jugar en México en 2021, Vargas ayudó a Atlas a ganar su primer título en 70 años. El tímido arquero rara vez tiene mucho que decir frente a los medios y tiene la paciencia de un santo: solo reemplazó a David Ospina como el número 1 de Colombia casi a sus 30 y largos años.', 
        dato_extra:'Su suegra le limpió los pies a sus compañeros en Santa Fe para romper una "brujería"' 
      },
      { 
        numero:23, nombre:'Kevin Mier', pos:'GK', nacimiento:'18 may 2000', club:'Cruz Azul', pais_club:'México', foto:'', 
        bio:'Hubo señales desde una edad temprana de que Mier iba a atajar para Colombia, pero tenía un problema: no tenía botines de fútbol. Su primer par fue pagado por sus tíos después de que hubieran recaudado dinero en su ciudad natal, Barrancabermeja. Atlético Nacional lo descubrió mientras jugaba en un torneo amateur en Bucaramanga. "Estaba jugando para Oro Negro, un club invitado al torneo. Realmente nos llamó la atención... es un talento único", dijo Milton Patiño, uno de los entrenadores que lo descubrió. Después de cada partido que juega, Mier tiene un ritual: besa su guante derecho y mira hacia el cielo. Es un tributo a su primo, quien murió en un accidente a los 17 años.', 
        dato_extra:'Besa su guante derecho y mira al cielo tras cada partido en homenaje a su difunto primo' 
      },
      { 
        numero:2, nombre:'Willer Ditta', pos:'DEF', nacimiento:'23 jun 1997', club:'Cruz Azul', pais_club:'México', foto:'', 
        bio:'En las eliminatorias, Ditta jugó solo dos partidos, siendo titular en uno, y vio otros tres desde el banco. Sintió que necesitaba estar haciendo más para ganarse un lugar en el avión a Norteamérica, así que decidió entrenar en su propio tiempo. "Es para seguir mejorando a nivel personal y deportivo. Decidimos que trabajaríamos duro en estos dos meses antes del Mundial para mejorar en el aspecto físico y técnico", le dijo al periodista Adrián Esparza Oteo. Nacido en Ibirico, Ditta creció en Barranquilla, en el norte, antes de mudarse a La Jagua de Ibirico con su madre. No había muchas oportunidades para jugar al fútbol, fue rechazado por el equipo regional y terminó jugando "por gaseosas" afuera del estadio de Valledupar. Pablo Zuleta, el entrenador que inicialmente lo había descartado, lo vio jugar en un torneo escolar y se dio cuenta de su error. Después de una etapa en Argentina, se ha establecido en México.', 
        dato_extra:'Tras ser rechazado de joven, terminó jugando "por gaseosas" afuera del estadio de Valledupar' 
      },
      { 
        numero:3, nombre:'Jhon Lucumí', pos:'DEF', nacimiento:'26 jun 1998', club:'Bologna', pais_club:'Italia', foto:'', 
        bio:'Destinado a convertirse en futbolista. El día en que nació, Colombia fue eliminada del Mundial de 1998 por Inglaterra, poniendo fin a la generación de Carlos Valderrama. Fue en el club que Valderrama dejó para irse a Europa, el Deportivo Cali, donde Lucumí comenzó. El ojeador Michel Arango lo vio jugando en una cancha en el barrio San Luisito de Cali: tenía solo 10 años, jugaba como delantero, pero se destacaba por su altura. Arango sugirió que le iría mejor como defensor. Estaba jugando para el primer equipo del Cali a los 17 años, debutando como lateral izquierdo porque el entrenador, Fernando Castro, se había quedado sin uno. Dirigido por el ex central de Colombia Mario Yepes, Lucumí aseguró un pase a Europa con el Genk y es parte del equipo del Bologna que alcanzó la fase final de la Liga de Campeones y ganó la Coppa Italia del año pasado.', 
        dato_extra:'A los 10 años era delantero, pero le sugirieron ser defensor por su gran altura' 
      },
      { 
        numero:4, nombre:'Daniel Muñoz', pos:'DEF', nacimiento:'26 may 1996', club:'Crystal Palace', pais_club:'Inglaterra', foto:'', 
        bio:'Nacido en Amalfi, hogar de algunas de las minas de oro más grandes de Colombia, Muñoz tuvo un florecimiento tardío. Era un gran fanático del Atlético Nacional y a menudo iba a ver sus partidos. A los 18 años, habiendo sido rechazado por varios clubes, Muñoz le dio la espalda al fútbol. Quería ir a Estados Unidos a buscar trabajo, pero no pudo conseguir la visa. Finalmente, el equipo Total Soccer le abrió sus puertas. "No fue fácil llegar a un lugar y jugar con chicos más jóvenes que tú, sabiendo que algunos de tus compañeros ya eran profesionales", dijo Muñoz. A los 21 años, se hizo profesional con Águilas Doradas en Rionegro antes de atraer el interés del club de sus sueños, Atlético Nacional. De allí partió hacia el Genk en Bélgica y fue una parte fundamental del equipo del Crystal Palace que ganó el primer trofeo importante del club, la FA Cup, el año pasado.', 
        dato_extra:'A los 18 años casi abandona el fútbol para buscar trabajo como inmigrante en EE. UU.' 
      },
      { 
        numero:5, nombre:'Álvaro Angulo', pos:'DEF', nacimiento:'6 mar 1997', club:'Pumas', pais_club:'México', foto:'', 
        bio:'Solía pasar todo el día jugando al fútbol si podía. "Terminaba jugando con los niños más pequeños, los más bajitos y simplemente seguía jugando con ellos. Llegaba a casa todo sucio y embarrado a las 10 pm. Esa era mi pasión", dijo durante su paso por la Dimayor. Sin embargo, tuvo que lidiar con el rechazo muchas veces antes de unirse finalmente a un club profesional. "Estaba bastante resignado y estaba ayudando a mi papá a reparar un techo cuando llegó el entrenador del Deportivo Pasto. Tenía 16 años cuando me uní y seis meses después estaba debutando en el primer equipo". El lateral ganó títulos con Atlético Nacional antes de unirse a Independiente en Argentina. Ahora en Pumas en la Ciudad de México.', 
        dato_extra:'Fue descubierto por un técnico del Deportivo Pasto mientras ayudaba a su padre a reparar un techo' 
      },
      { 
        numero:6, nombre:'Davinson Sánchez', pos:'DEF', nacimiento:'12 jun 1996', club:'Galatasaray', pais_club:'Turquía', foto:'', 
        bio:'Puede ser complicado para los jugadores sudamericanos que no son de Brasil o Argentina sellar un traspaso a Europa, y mucho menos ser recibidos con gran fanfarria. "¿Quién diablos es Davinson Sánchez?", preguntó un hincha del Tottenham en Internet cuando el defensor fichó procedente del Ajax en 2017. Para entonces ya había ganado una medalla de la Copa Libertadores con Atlético Nacional y había disfrutado de un comienzo brillante en la Eredivisie. Fue el fichaje récord de los Spurs por 42 millones de libras, pero tuvo que ganarse a los que dudaban de él antes de convertirse en una pieza clave del equipo que alcanzó la final de la Liga de Campeones en 2019. Pero, ¿qué pasaría si no se hubiera convertido en futbolista?. "Soy bueno en matemáticas, así que habría estudiado algo que tuviera que ver con los números. No sé, algo como ingeniería o administración", le dijo a la revista Bocas en 2018, el año en que debutó en el Mundial. Ahora es bicampeón de la Superliga turca con el Galatasaray.', 
        dato_extra:'Si no fuera futbolista habría sido matemático o ingeniero porque se le dan bien los números' 
      },
      { 
        numero:17, nombre:'Johan Mojica', pos:'DEF', nacimiento:'21 ago 1992', club:'Mallorca', pais_club:'España', foto:'', 
        bio:'Ha jugado en Europa durante casi 12 años y sus atributos físicos le han permitido prosperar en España e Italia. No siempre fue bendecido con tal físico. Su primer club, Academia Compensar, en Bogotá, dudaba que pudiera triunfar en el juego. "Cuando Johan llegó, estaba por debajo del peso para su edad... no veíamos cómo iba a mejorar ese muchacho", dijo a Gol Jorge Caracol Serna, entrenador de la Academia y futuro director técnico de las selecciones Sub-15 y Sub-17 de Colombia. "Pero su técnica y capacidad para leer el juego eran tan buenas que le dimos algo de tiempo". Le hicieron un plan a largo plazo para ayudarlo a ganar peso y le dieron un suplemento alimenticio mensual. "Lo único que le creció fue el pelo", bromeó Serna. Ahora con 33 años, Mojica ha jugado para una gran cantidad de clubes en La Liga, así como para el Atalanta en la Serie A.', 
        dato_extra:'De niño le daban suplementos alimenticios para subir de peso, pero "solo le creció el pelo"' 
      },
      { 
        numero:24, nombre:'Carlos Cuesta', pos:'DEF', nacimiento:'9 mar 1999', club:'Vasco da Gama', pais_club:'Brasil', foto:'', 
        bio:'Cuesta siempre pareció maduro para su edad. "Cuando tenía 16, 17 años, era como hablar con un jugador que había pasado cinco o siete años como profesional", dijo Francisco Nájera, campeón de la Copa Libertadores con Atlético Nacional en 2016, cuando Cuesta recién estaba irrumpiendo en el primer equipo. Sin embargo, el modelo a seguir de Cuesta era otro central, el capitán Alexis Henríquez, quien levantó el trofeo de la Libertadores. "Porque jugó junto a muchos jugadores jóvenes, Alexis sabe cómo tener una buena relación con uno. No habla mucho, y si lo hace entonces se trata de la posición en la cancha: \u0027Retrocede, avanza, apóyame, sal\u0027. Así es como aprendes las cosas", dijo Cuesta. Ni Nájera ni Henríquez jugaron en Europa. Cuesta, ahora con 27 años, se unió al Galatasaray desde el Genk el año pasado, y ha estado a préstamo en Brasil en el período previo al Mundial con el Vasco da Gama.', 
        dato_extra:'A los 16 años ya demostraba tener la mentalidad de un jugador experimentado' 
      },
      { 
        numero:13, nombre:'Yerry Mina', pos:'DEF', nacimiento:'23 sep 1994', club:'Cagliari', pais_club:'Italia', foto:'', 
        bio:'A pesar de su delgadez en su juventud, Mina no era muy bueno cabeceando la pelota, algo que compensaría más adelante en la vida. Tuvo pruebas en el Deportivo Cali pero no logró quedar. También jugó para el América de Cali, cuando solía pedir que lo llevaran en camiones para ahorrar dinero en pasajes de autobús. Terminó en el Deportivo Pasto donde dos de sus compañeros, Marlon Piedrahíta y Camilo Pérez, comenzaron a instarlo a aprovechar al máximo su gran estatura. Para cuando fichó por Santa Fe, ya era una presencia aérea importante. Jugó un papel clave en el triunfo de la Copa Sudamericana en 2015 y se ganó un traspaso al Palmeiras antes de una gran oportunidad en el Barcelona. Fue el máximo goleador de Colombia en el Mundial de 2018, cada uno de sus tres goles llegando con la cabeza, incluido un gol del empate agónico contra Inglaterra en los octavos de final. Tras un período de cinco años en el Everton, el jugador de 31 años se ha convertido en uno de los favoritos en Cerdeña.', 
        dato_extra:'De joven se subía escondido a los camiones para ahorrar dinero en pasajes de autobús' 
      },
      { 
        numero:25, nombre:'Santiago Arias', pos:'DEF', nacimiento:'13 ene 1992', club:'Independiente', pais_club:'Argentina', foto:'', 
        bio:'El ex lateral del PSV y del Atlético de Madrid estuvo a punto de elegir seguir un deporte distinto al fútbol. "En la escuela teníamos que hacer una actividad deportiva. Estaba listo para elegir taekwondo porque me gustaban mucho las películas de karate, pero al final elegí el fútbol", le dijo Arias una vez a Bocas. Fue su padre, Raúl, quien lo persuadió. "Era un gran aficionado al fútbol", dijo Arias. "Era seguidor del Atlético Nacional. Íbamos a la cancha juntos. Todo se trataba de fútbol con él, 24/7. Es gracias a él que estoy donde estoy". No fue en Nacional donde comenzó su carrera sino en La Equidad, a través de la academia de Alexis García. García era el entrenador del primer equipo y le dio a Arias su debut. Raúl nunca vio a su hijo jugar para Colombia: fue asesinado trágicamente a tiros en 2009 cuando protegía a unos niños de unos ladrones armados fuera de una escuela.', 
        dato_extra:'De niño estuvo a punto de dejar el fútbol por el taekwondo porque amaba las películas de karate' 
      },
      { 
        numero:10, nombre:'James Rodríguez', pos:'MID', nacimiento:'12 jul 1991', club:'Minnesota United', pais_club:'EE.UU.', foto:'', 
        bio:'No es el primer miembro de su familia en jugar en un Mundial. Su padre formó parte del plantel de Colombia en la edición Sub-20 de 1985. Después de que Wilson James y Pilar Rubio se separaran, fue el padrastro de Rodríguez, Juan Carlos Restrepo, quien lo animó a seguir su sueño. Se formó en Envigado, una de las mejores academias de Colombia. "Juan Carlos es un obsesivo; se encargó de hacer de James una estrella. Merece mucho crédito", dijo Silvio Sandri, el primer agente de Rodríguez, en 2014, el año en que ganó la Bota de Oro en el Mundial de Brasil y selló un traspaso espectacular al Real Madrid. El dos veces ganador de la Liga de Campeones ahora juega en la MLS a los 35 años después de algunos viajes por el mundo que incluyeron Merseyside, Qatar, Grecia, Brasil y México. Este será su tercer Mundial.', 
        dato_extra:'Su padrastro fue quien se obsesionó e impulsó su carrera hasta convertirlo en una estrella mundial' 
      },
      { 
        numero:11, nombre:'Jhon Arias', pos:'MID', nacimiento:'21 sep 1997', club:'Palmeiras', pais_club:'Brasil', foto:'', 
        bio:'Quibdó es, quizás, la ciudad capital más pobre de los 33 departamentos de Colombia y ahí es donde comenzó el viaje de Arias hacia el fútbol profesional. No fue fácil, y tuvo que mudarse al extranjero para tener la oportunidad de brillar. "Soy de un lugar hermoso, donde no hay muchas oportunidades; ahí es donde nació este niño con sueños", le dijo a El Colombiano. "Todas esas experiencias y dificultades que tuve de niño me han dado la certeza de que todo ese esfuerzo valió la pena". De Quibdó, Arias se fue a Cali y luego a equipos juveniles en México. Después de ser rechazado por Tijuana, pasó por cuatro clubes en Colombia antes de que sus actuaciones para Santa Fe en la Copa Libertadores 2021 le valieran un traspaso a Fluminense, donde ganó el título continental en 2023. Después de una etapa en la Premier League con los Wolves, el jugador de 28 años está de vuelta en Brasil con Palmeiras.', 
        dato_extra:'"Soy de un lugar hermoso, donde no hay muchas oportunidades", dijo sobre su ciudad natal Quibdó' 
      },
      { 
        numero:16, nombre:'Jefferson Lerma', pos:'MID', nacimiento:'25 oct 1994', club:'Crystal Palace', pais_club:'Inglaterra', foto:'', 
        bio:'Le tomó mucho tiempo al mediocampista del Crystal Palace ganarse la confianza de sus entrenadores en su juventud. Tras ser rechazado por tres clubes, acabó en el Atlético Huila. Harto de su falta de oportunidades, Lerma volvió a su ciudad natal, El Cerrito, al otro lado de los Andes. Cuando Álvaro de Jesús Gómez asumió como entrenador del Huila en 2013, preguntó cuáles de los sub-20 podrían dar el salto al primer equipo. Cuando le hablaron de Lerma, fue en su busca y le dijo que regresara, pagándole incluso los gastos de viaje. Pronto fue titular en el Huila, dos años después estaba en Europa y, en 2016, jugó para Colombia en los Juegos Olímpicos. Su inclusión en el plantel del Mundial de 2018 fue controvertida porque no había participado en las eliminatorias. Lerma estuvo a punto de abandonar la selección ante las críticas, pero lo convencieron para que se quedara. Ese verano se ganó el traspaso al Bournemouth y ahora es una parte integral de la selección nacional. Ganó la FA Cup con el Palace en 2024-25.', 
        dato_extra:'A punto de abandonar la selección por las críticas al ser citado a Rusia 2018 sin jugar eliminatorias' 
      },
      { 
        numero:8, nombre:'Juan Portilla', pos:'MID', nacimiento:'12 sep 1998', club:'Athletico Paranaense', pais_club:'Brasil', foto:'', 
        bio:'Los primeros pasos de Portilla en el fútbol fueron aventureros. Su padre, electricista de profesión, lo inscribió en una pequeña escuela de fútbol en Cali pero no podía permitirse el lujo de mantenerlo allí. Poco después, uno de los amigos de su padre lo recomendó a Boca Juniors de Cali. Su debut en la absoluta fue con el Universitario de Popayán, propiedad de los mismos dueños que Boca, pero Portilla quería ampliar sus horizontes. Hizo una prueba para un equipo de la tercera división en Jacksonville en los Estados Unidos y luego nuevamente para un equipo en la segunda división de Chile, Melipilla. Su amor por su familia lo trajo de vuelta a Colombia, donde finalmente se abrió paso en el América, los rivales locales del equipo que apoyaba de niño, el Deportivo Cali. Después de un período en Talleres en Argentina, se mudó a Brasil en enero pasado.', 
        dato_extra:'Se probó en la tercera de EE. UU. y la segunda de Chile antes de lograr triunfar en Colombia' 
      },
      { 
        numero:15, nombre:'Richard Ríos', pos:'MID', nacimiento:'2 jun 2000', club:'Benfica', pais_club:'Portugal', foto:'', 
        bio:'Una pieza clave en el mediocampo de Néstor Lorenzo, alguna vez soñó con ser una estrella del fútbol sala, pero el destino tenía otras ideas. Empezó a jugar al fútbol en las calles de Vegachí, en la región de Antioquía, no muy lejos de Medellín. La región es conocida por sus minas de oro, pero también por producir caña de azúcar y dulces que contienen guayaba. "El fútbol era una buena alternativa a ir por el camino equivocado", dijo una vez Ríos. Llamó la atención jugando para Colombia en un campeonato sudamericano de fútbol sala Sub-18 en Brasil y se le dio una prueba en Flamengo. "Dejar tu país no es fácil para nadie, pero eso me motivaba. Los de fuera de Brasil lo vemos como el país del fútbol", afirmó. Esa mezcla de garra antioqueña y magia brasileña le ayudó a recuperarse de una grave lesión de rodilla mientras jugaba a préstamo en México y pasó a conseguir un traspaso al Benfica después de impresionar en el Mundial de Clubes el verano pasado.', 
        dato_extra:'Era un prodigio del fútbol sala que descubrió el Flamengo en un torneo sudamericano juvenil' 
      },
      { 
        numero:5, nombre:'Kevin Castaño', pos:'MID', nacimiento:'29 sep 2000', club:'River Plate', pais_club:'Argentina', foto:'', 
        bio:'Los padres de Castaño se separaron poco después de que él naciera y su madre dejó su ciudad natal, Itagüí, por trabajo. Su padre, Richard, lo crio junto a su abuela, María Noelia. Richard también fue el primer entrenador de Kevin: fue contratado como entrenador juvenil por Itagüí Ditaires (ahora Águilas Doradas) en 2008. "Kevin era un loco por el fútbol", le dijo Richard a El Tiempo. "Jugaba torneos locales y llamaba la atención. Lo ponía arriba y siempre marcaba goles. Tenía un buen remate y era un gran líder". Cuando Kevin hizo su debut en el primer equipo para Águilas en 2020, su padre estaba en cirugía después de ser admitido en el hospital con Covid. Después de su operación, lo primero que pidió Richard fue ver la repetición del partido. Castaño recibió su primera convocatoria internacional en 2023 y, después de breves etapas en México y Rusia, el jugador de 25 años ahora se encuentra en River Plate.', 
        dato_extra:'Su padre pidió ver el debut de Kevin apenas despertó de una cirugía por Covid-19 en 2020' 
      },
      { 
        numero:20, nombre:'Jorge Carrascal', pos:'MID', nacimiento:'25 may 1998', club:'Flamengo', pais_club:'Brasil', foto:'', 
        bio:'En apenas ocho meses en Flamengo, Carrascal ha ganado la Copa Libertadores, la Serie A de Brasil y el campeonato estatal Carioca. Sin embargo, su carrera estuvo a punto de terminar antes de empezar. Cuando cumplió 18 años se mudó a Sevilla, que lo fichó a pesar de una grave lesión en la rodilla. Fue operado y pudo regresar para el equipo B del Sevilla, pero luego su rodilla volvió a ceder. Durante el proceso de una segunda operación, contrajo una infección bacteriana y estuvo en peligro de que le amputaran la pierna. Afortunadamente, logró recuperarse. Después de su debut en el fútbol colombiano, su entrenador de Millonarios, Ricardo Lunari, lo comparó con Juan Román Riquelme. Cuando firmó por River Plate, lo llamaron el nuevo Neymar. A Carrascal no le gustaron las comparaciones. "Cada jugador tiene su propia carrera y quiere hacerse un nombre", le dijo a Olé. "Esperemos que algún día a un jugador se le apode Carrascal. ¡Nunca se sabe!".', 
        dato_extra:'Casi pierde la pierna a los 18 años por una infección bacteriana mientras jugaba en España' 
      },
      { 
        numero:21, nombre:'Yáser Asprilla', pos:'MID', nacimiento:'19 nov 2003', club:'Galatasaray', pais_club:'Turquía', foto:'', 
        bio:'Asprilla es uno de los jugadores más jóvenes de esta selección de Colombia, pero también uno de los más viajeros. Nació en el Bajo Baudó, en la costa del Pacífico, pero se mudó de pequeño a Palmira, no muy lejos de Cali. Fue allí donde fue descubierto por dos miembros del equipo de Colombia que ganó la Copa América 2001. Juan Carlos Ramírez y Freddy Grisales lo llevaron al Envigado, donde brilló jugando en el prestigioso torneo juvenil Pony Fútbol. Asprilla jugó junto a Jhon Durán, pero tiene un carácter mucho más tímido que el delantero. "Es un chico tímido, muy introvertido en sus relaciones sociales, pero en el campo es definitivamente un extrovertido en el sentido futbolístico y humano", le dijo a Deportes RCN Albert Suárez, quien le dio la oportunidad de debutar en la absoluta con Envigado.', 
        dato_extra:'Extrovertido y atrevido en la cancha, pero extremadamente tímido e introvertido fuera de ella' 
      },
      { 
        numero:26, nombre:'Juan Quintero', pos:'MID', nacimiento:'18 ene 1993', club:'River Plate', pais_club:'Argentina', foto:'', 
        bio:'Solo dos jugadores han marcado goles para Colombia en más de un Mundial. Uno es Juan Cuadrado y el otro es \'Juanfer\', quien, después de haber anotado contra Costa de Marfil en 2014, coló un tiro libre por debajo de la barrera contra Japón cuatro años después. Quintero es conocido por inventarse lo espectacular. Ganó el gol del torneo por su tanto contra El Salvador en el Mundial Sub-20 de 2013 y una genialidad en el tiempo extra ayudó a darle a River Plate el título de la Copa Libertadores 2018 contra su archirrival del superclásico, Boca Juniors. Pero lejos del fútbol, Quintero ha tenido que vivir con una tragedia personal. Su padre desapareció en 1993, cuando él tenía dos años. "Tengo derecho a saber qué le pasó a mi padre y eso es lo que quiero saber porque he sufrido y he visto a mi familia pasar por eso", dijo Quintero en 2020, cuando Eduardo Zapateiro, quien fue investigado como parte del caso de su padre (ambos tuvieron una discusión poco antes de la desaparición del padre de Quintero), fue nombrado comandante general del ejército colombiano.', 
        dato_extra:'Su padre desapareció misteriosamente en 1993 cuando él tenía solo dos años de edad' 
      },
      { 
        numero:9, nombre:'Jhon Córdoba', pos:'FWD', nacimiento:'11 may 1993', club:'Krasnodar', pais_club:'Rusia', foto:'', 
        bio:'Hay algunos dúos de padre e hijo que han jugado para Colombia, pero solo uno donde ambos han encontrado la red para la selección. Córdoba heredó su olfato goleador de su padre, Manuel Acisclo, quien anotó tres veces en 15 apariciones en la década de 1980. \'El Triciclo\', como se le conocía, no era solo su mentor y mayor apoyo, sino también una voz crítica. "Jhon es una persona muy fuerte", dijo Manuel a Caracol Deportes. "No me gusta hablar con él antes de los partidos. Tenemos una charla después pero tiendo a alejarme del fútbol. Al día siguiente, cuando se ha calmado, hablamos. Si cometió un error, le digo: \u0027Hiciste esto mal y por esto\u0027". Manuel es muy exigente y solía llevar la cuenta. "Marqué 153 goles. Le queda un largo camino por recorrer", solía decir. Después de su paso por México, España y Alemania, Jhon, de 32 años, ya ha superado esa cifra.', 
        dato_extra:'Su padre, "El Triciclo" Córdoba, también fue goleador de la selección en los años 80' 
      },
      { 
        numero:14, nombre:'Jhon Durán', pos:'FWD', nacimiento:'13 dic 2003', club:'Al-Nassr', pais_club:'Arabia Saudita', foto:'', 
        bio:'Un rebelde desde temprana edad. Nutrido en el Envigado FC, el mismo club que produjo talentos como James Rodríguez, Fredy Guarín y Juan Quintero, Durán tenía que cumplir con ciertos objetivos en la escuela para poder jugar en los torneos. A menudo prefería quedarse en casa escuchando reguetón, pero los entrenadores seguían insistiendo en que le dieran oportunidades. "Jugaba de extremo pero hablé con los directivos para explorar la posibilidad de reconvertirlo en un 9", dijo a Efe Wilbert Perea, su entrenador de entonces. "Diseñamos un plan de desarrollo donde se lo dotó de muchas herramientas para ayudarlo en esa nueva posición". Wilson James Rodríguez, el padre de James, también ayudó a Durán a trabajar en su cabezazo. Ese espíritu rebelde no ha abandonado al jugador de 22 años que explotó en la escena en el Aston Villa antes de irse para unirse al Al-Nassr de Cristiano Ronaldo en Arabia Saudita. Luego de préstamos en el Fenerbahce y el Zenit de San Petersburgo, tuvo que arreglar su relación con el técnico de la selección nacional Néstor Lorenzo después de que surgieran reportes de una pelea en el entretiempo entre ambos en el partido contra Perú en junio de 2025. No apareció para la segunda mitad y durante muchos meses después de eso.', 
        dato_extra:'De niño prefería quedarse en casa escuchando reguetón antes que ir a jugar torneos escolares' 
      },
      { 
        numero:18, nombre:'Luis Suárez', pos:'FWD', nacimiento:'2 dic 1997', club:'Sporting', pais_club:'Portugal', foto:'', 
        bio:'Máquina de goles. No ese. Sin embargo, el ex delantero del Granada ha tenido una primera temporada sobresaliente en Portugal y algunos de los clubes más grandes de Europa lo están mirando. Pero en esta época el año pasado el panorama era muy diferente. Sí, estaba marcando goles en la segunda división española con el Almería, pero no estaba realmente en el radar de la selección nacional. Es más, venía de una lesión que había afectado su salud mental. "Pasé por una depresión, de la cual todavía estoy saliendo poco a poco con trabajo y ayuda de psicólogos y personas cercanas a mí. Había tocado fondo", dijo a Marca. El apoyo de su pareja, Carolina, ha sido clave. Después de marcar casi un gol por partido en la Primeira Liga esta temporada, el jugador de 28 años es ahora un fijo para Colombia.', 
        dato_extra:'Tocó fondo y superó una profunda depresión en España antes de su explosión en Portugal'

      { 
        numero:19, nombre:'Jaminton Campaz', pos:'FWD', nacimiento:'24 may 2000', club:'Rosario Central', pais_club:'Argentina', foto:'', 
        bio:'Engañó a la muerte para convertirse en futbolista. De niño en Chontal, cerca de la frontera sur con Ecuador, ganaba dinero pescando y, un día, fue mordido por una serpiente. Uno de sus compañeros le apretó la herida y evitó que las cosas empeoraran. Campaz proviene de una familia de futbolistas. Su madre, Betzabet, era arquera; su hermano, Mike, jugó para Guinea Ecuatorial y su hermano, Carlos Darwin Quintero, jugó para Colombia en las eliminatorias del Mundial 2014 y tuvo una larga carrera en México y la MLS; todavía juega para Millonarios. Campaz luchó por una carrera por derecho propio, probándose en el Deportivo Pasto, pero su madre se olvidó de firmar un documento y se vio obligado a irse. También reprobó una prueba en el América de Cali. Fue Mike quien lo llevó a Tolima, donde comenzó su viaje como profesional.', 
        dato_extra:'Trabajaba pescando y engañó a la muerte al ser mordido por una serpiente en su infancia' 
      },
      { 
        numero:27, nombre:'Juan ‘Cucho’ Hernández', pos:'FWD', nacimiento:'20 abr 1999', club:'Real Betis', pais_club:'España', foto:'', 
        bio:'Se ganó el apodo de \'Cucho\' por casualidad. Una vez se presentó a un partido en su ciudad natal Pereira con la cabeza rapada y sus amigos comenzaron a llamarlo \'Cuchu\' por el ex mediocampista del Inter y Real Madrid Esteban Cambiasso. Eso eventualmente se convirtió en \'Cucho\'. El fútbol está en su sangre: sus padres, Néstor y Yanet, se conocieron mientras jugaban un torneo y se enamoraron de inmediato. Desde pequeño se unió a sus padres en los torneos y comenzó a jugar él mismo, eventualmente jugando para el equipo regional de Risaralda. Fue allí donde Hernán Lisi, el entrenador de Deportivo Pereira, lo descubrió. "¡Quiero a ese jugador!", gritó cuando lo vio jugar. Después de anotar dos veces en su debut con Colombia, el jugador de 26 años ha luchado para establecerse.', 
        dato_extra:'Su apodo es por una vieja burla de sus amigos comparándolo con el "Cuchu" Cambiasso' 
      },
      { 
        numero:28, nombre:'Andrés Gómez', pos:'FWD', nacimiento:'12 sep 2002', club:'Vasco da Gama', pais_club:'Brasil', foto:'', 
        bio:'Aficionado a las motos. Ha acumulado una buena cantidad de apodos durante su corta carrera. Cuando irrumpió por primera vez en Millonarios lo llamaban \'Diablito\' por su estilo de juego travieso. También lo han llamado \'Yanfri\' por un niño que se volvió viral en las redes sociales que aparentemente se parecía a él. Un apodo que no le gusta es \'Tinito\' (su estilo de juego es similar al de Tino Asprilla) porque Asprilla era hombre de Atlético Nacional, los grandes rivales de Millonarios. Gómez tuvo un comienzo de vida difícil. "De chico, crecí viendo a algunos de mis amigos ser asesinados y vi a otros seguir el camino equivocado. Pero toda mi familia siempre ha estado interesada en el fútbol", escribió en Chocó 7 Días. También admitió que él mismo casi había ido por el camino equivocado: intentó robar a alguien una vez pero fue atrapado. El joven de 24 años tiene dos pasiones: las motos y el baile. "Donde quiera que vaya, siempre hago el baile popular de mi barrio. Es una forma de expresar de dónde vengo", dijo.', 
        dato_extra:'Apasionado de las motos y el baile; confiesa que de niño lo atraparon intentando robar' 
      },
      { 
        numero:7, nombre:'Luis Díaz', pos:'FWD', nacimiento:'13 ene 1997', club:'Bayern Munich', pais_club:'Alemania', foto:'', 
        bio:'Súper estrella. Cualquiera que vea jugar al fuerte y combativo Díaz para el Bayern no pensaría que una vez le pusieron una dieta especial para engordar 10 kilos. Eso fue en el Barranquilla FC, un club filial del Atlético Junior, donde llegó recomendado por el legendario Carlos Valderrama. \'El Pibe\' lo vio jugando para Colombia en una Copa América para comunidades indígenas en 2015, donde John Jairo Díaz era el entrenador. "Valderrama era prácticamente mi jefe", dijo el entrenador. "Él decía: \u0027Ese niño flaco va a jugar, va a triunfar como profesional\u0027. Y mira lo que pasó". El padre de Díaz, Mane, fue otra persona clave en su carrera. El secuestro de Mane por parte de guerrilleros armados en la frontera colombo-venezolana, y su regreso seguro, fue noticia de primera plana en todo el mundo en 2023 cuando Díaz jugaba para el Liverpool, donde ganó la Premier League, una FA Cup y dos Copas de la Liga.', 
        dato_extra:'En el Barranquilla FC el "Pibe" Valderrama mandó a que le hicieran una dieta para subir 10kg' 
      },
      { 
        numero:29, nombre:'Rafael Santos Borré', pos:'FWD', nacimiento:'15 sep 1995', club:'Internacional', pais_club:'Brasil', foto:'', 
        bio:'El nombre de Borré tiene un origen interesante. Nació en Barranquilla pero pasó parte de su infancia en Valledupar, la cuna del festival de vallenato, uno de los géneros musicales más populares de Colombia. Sus padres eran grandes fanáticos de Diomedes Díaz, uno de los nombres más importantes del vallenato, y llamaron a su hijo como a uno de sus 28 hijos reconocidos, Rafael Santos. Fue en Valledupar donde Borré comenzó a destacarse jugando para su equipo escolar. Fue descubierto por Agustín Garizábalo, uno de los mejores ojeadores de Colombia, y aterrizó a la puerta del Deportivo Cali. A partir de ahí lanzó una carrera que ha pasado por River Plate, ganando la Copa Libertadores en 2018, Eintracht Frankfurt, marcando en el tiempo reglamentario y el penal de la victoria en su triunfo en la tanda de penales en la final de la Europa League de 2022 contra el Rangers, y ahora Brasil con Internacional.', 
        dato_extra:'Fue bautizado en honor a uno de los 28 hijos reconocidos del célebre cantante Diomedes Díaz' 
      }] },

  inglaterra:    { nombre:'Inglaterra',     flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', dt:'', mundiales:'1', grupo:'L', subtitulo:'Three Lions',   jugadores:[{ 
        numero:1, nombre:'Jordan Pickford', pos:'GK', nacimiento:'7 mar 1994', club:'Everton', pais_club:'Inglaterra', foto:'', 
        bio:'Le gusta hacerse escuchar. James Tarkowski dice que su compañero del Everton es "de primer nivel" pero "loco... él y yo nos peleamos constantemente. Grita mi nombre constantemente desde detrás de mí, así que lo miro constantemente y él simplemente me ladra para que le ladre a alguien más. Y nunca puedo entender realmente lo que dice porque está a 40 yardas de distancia, gritándome, chillándome. Y yo pienso: \u0027¿Podrías simplemente venir y decirme lo que quieres?\u0027...". El año pasado batió el récord de vallas invictas consecutivas con Inglaterra. Lo habrían llamado Jordan Pigford pero su padre, Lee, cambió el apellido de la familia porque estaba cansado de que lo llamaran Piggy (Cerdito) en la escuela. Pickford dice que si no fuera futbolista, estaría en el motocross. "Crecí viéndolo. De niños nos quedábamos en autocaravanas y caravanas en la pista de carreras y era genial. Me da una adrenalina adecuada y es una de las cosas que amo".', 
        dato_extra:'Su padre cambió el apellido familiar "Pigford" para que no lo llamaran cerdito en la escuela' 
      },
      { 
        numero:13, nombre:'Dean Henderson', pos:'GK', nacimiento:'12 mar 1997', club:'Crystal Palace', pais_club:'Inglaterra', foto:'', 
        bio:'Henderson dejó el Manchester United para unirse al Palace en 2023 tras una llamativa cesión en el Forest, y su reputación, y valoración, sigue creciendo. Lo más destacado hasta ahora incluye atajar el penal de Omar Marmoush en Wembley para ayudar al Palace a ganar su primera FA Cup, lo que más tarde atribuyó a "mi gorra mágica... cuando me la puse supe que teníamos una oportunidad". A menudo se le ve liderando la canción tributo a Shakira de los fanáticos del Palace sobre esa victoria de Copa durante y después de los partidos. Dice que le encanta ir a los campamentos de entrenamiento de Inglaterra porque "a veces el primer día es una noche especial y nos dan brownies y natillas. Eso siempre es algo que espero con ansias. Un día antes de un partido el postre es arroz con leche. El arroz con leche aquí es sensacional, tiene pequeñas chispas de chocolate blanco. Es algo que siempre espero con ansias".', 
        dato_extra:'Atajó un penal clave usando su "gorra mágica" para ganar una FA Cup' 
      },
      { 
        numero:22, nombre:'James Trafford', pos:'GK', nacimiento:'10 oct 2002', club:'Manchester City', pais_club:'Inglaterra', foto:'', 
        bio:'Regresó al City, donde comenzó a los 12 años, desde el Burnley el año pasado, después de mantener 29 vallas invictas en 45 partidos de la Championship. Creció en la granja de sus padres en Cumbria, y su traspaso al City en 2015 salió en el periódico local con el titular: "James, 12 años, ficha por el mega rico Man City". Su padre le dijo al Times & Star: "Él nos ayuda a llevar las ovejas al campo; es uno de sus trabajos favoritos. Pero nunca he dicho que deba cultivar. Tienes que dejarlos seguir su propio camino... estamos muy orgullosos de él". El joven James le dijo al periódico: "No estoy nervioso. Los jugadores del primer equipo están en el mismo lugar donde entrenamos. Conocí a Gaël Clichy y Vincent Kompany, y he visto a Joe Hart entrenando. Es realmente emocionante". El año pasado dijo que todavía echa una mano siempre que va a casa. "Cuando estuve con papá el mes pasado, estaba preparándoles la cama a todas las ovejas y poniéndoles heno a las que estaban afuera. Siempre hemos hecho eso".', 
        dato_extra:'Hijo de granjeros, todavía echa una mano en casa preparando la cama a las ovejas' 
      },
      { 
        numero:23, nombre:'Nick Pope', pos:'GK', nacimiento:'19 abr 1992', club:'Newcastle', pais_club:'Inglaterra', foto:'', 
        bio:'Liberado por el Ipswich a los 16 años. "No era enorme en ese entonces, tal vez tuve un crecimiento tardío", dijo en 2018 cuando, como jugador del Burnley, acababa de ganarse su primera convocatoria a Inglaterra. "Pero creo que simplemente decidieron que no era lo suficientemente bueno. Fue duro... tuve un par de trabajos. Trabajé en Next y en un camión de leche, en el turno de las 4 de la mañana en Soham. No pagaba mucho". Estaba combinando eso con el estudio de marketing en la universidad, pero, a través del fútbol amateur, se ganó un contrato profesional en el Charlton a los 19 años y, una década después, un traspaso de 10 millones de libras al Newcastle. No debe ser confundido con el difunto experto en ovnis inglés Nick Pope, pero dice que a menudo lo es, al menos en línea: "Tuvimos un poco de conflicto hace unos años cuando pasó algo, creo que los fanáticos rivales lo estaban acosando, así que tuve que decirle a la gente que no era yo".', 
        dato_extra:'Trabajó repartiendo leche a las 4 de la mañana y a menudo lo confunden con un experto en OVNIs'

        numero:5, nombre:'John Stones', pos:'DEF', nacimiento:'28 may 1994', club:'Manchester City', pais_club:'Inglaterra', foto:'', 
        bio:'Debutó con Inglaterra hace 12 años y ha ganado todo a nivel de clubes con el City. "Nunca pensé que sería un profesional, y mucho menos jugar para Inglaterra, jugar en la Premier League, por no hablar de ganar la Premier League", dijo en 2023, al ser preguntado sobre su viaje desde la academia del Barnsley. Conocido como el \u0027Beckenbauer de Barnsley\u0027, pero siempre ha querido no ser visto como demasiado culto con el balón. "Por supuesto, la patearé a la fila Z si es necesario", dijo hace una década tras su fichaje por 47,5 millones de libras procedente del Everton. "Hago el trabajo sucio que todo defensor debería hacer y en lo que debería ser bueno. El resto es un plus, donde puedo salir jugando e iniciar ataques". Es popular entre sus compañeros de equipo; el año pasado, su compañero en el City Bernardo Silva reveló por qué le puso el nombre de Stones a su perro. "Estaba pensando en tener un perro y le dije: \u0027John, un día si tengo un perro, le pondré tu nombre. ¿Estarías feliz por ello?\u0027 Él dijo \u0027no, no puedes\u0027. Pero luego simplemente lo hice. Me gusta el nombre John. John Silva, creo que es un buen nombre".',

      { 
        numero:6, nombre:'Dan Burn', pos:'DEF', nacimiento:'9 may 1992', club:'Newcastle', pais_club:'Inglaterra', foto:'', 
        bio:'Liberado por el Newcastle a los 11 años justo antes de Navidad en 2003. Burn dijo que fue "devastador" pero "era bastante malo, si soy honesto". A los 13 años tenía solo nueve dedos después de un accidente al trepar una cerca, y a los 16 estaba trabajando en Asda en Blyth empujando carritos de compras. "Normalmente, a los chicos que son elegidos para jugar en los equipos juveniles los eligen alrededor de los 15, 16 años. Terminé sin fichar por nadie. Fui a sexto año y estaba empujando carritos. Si me hubieran dicho entonces que estaría en la Premier League, me habría reído de ustedes". Pero siguió adelante en las divisiones inferiores y Darlington lo fichó a los 17, iniciando un viaje que, en 2022, incluyó un emotivo regreso de 13 millones de libras al Newcastle desde el Brighton. Cuando marcó en la final de la Carabao Cup y ganó su primera convocatoria a Inglaterra en 2024, el Asda de Blyth enmarcó una chaqueta de alta visibilidad de empujador de carritos con "Burn 33" en homenaje. Dean, el gerente de la tienda: "Planeamos exhibirla en la tienda, esperamos que Dan nos visite pronto, junto con el trofeo".',

      {

        bio:'Fichó por el Charlton a los 11 años tras empezar en el Senrab FC, el club de la liga dominical en Forest Gate de Londres que también produjo, entre otros, a Jermain Defoe, Sol Campbell y John Terry. Konsa tiene la palabra "bendecido" tatuada en su mano izquierda. "Me lo hice en mi segunda temporada en el Charlton", dijo en 2021. "Me recuerda lo lejos que he llegado y lo bendecido que soy. Fue difícil crecer donde crecí. Había mucho crimen y violencia, pero tengo suerte de tener un hermano mayor que me mantuvo fuera de problemas y me mantuvo con los pies en la tierra. Fue duro, pero mi familia, mis amigos y yo lo afrontamos y salimos de ello. Ojalá que lo que estoy haciendo ahora pueda inspirar a la próxima generación". Fichó por el Villa procedente del Brentford en 2019 por 12 millones de libras, y debutó con Inglaterra ante Brasil en 2024.',

      {

        bio:'Un graduado de la academia del City habiendo firmado a los ocho años, el ascenso de O\u0027Reilly a la cima ha sido rápido. Un debut absoluto en 2024, una primera convocatoria con Inglaterra un año después, y ahora un Mundial. "Es una locura, nunca pensé que estaría en esta posición tan pronto", dijo el año pasado sobre su irrupción, insistiendo en que no lo había cambiado. "Sigo teniendo los mismos amigos, sigo haciendo las mismas cosas, sigo yendo a Tesco con mi mamá". Le da el crédito a su mamá Holli como su inspiración, y ella grabó un mensaje de video sorpresa para él cuando firmó su nuevo contrato con el City en septiembre pasado, diciendo: "Siempre recuerdo, cuando tenías unos tres meses, te miré y supe que eras especial. Le dije a Nana que es especial y ella se rió de mí como lo hace, y dice que todo el mundo piensa que sus hijos son especiales. Pero hijo, yo sabía que lo eras, y siempre creí en ti, y siempre lo haré. Nunca cambies. Estás absolutamente arrasando en la vida, y te amo".',

      { 
        numero:2, nombre:'Reece James', pos:'DEF', nacimiento:'8 dic 1999', club:'Chelsea', pais_club:'Inglaterra', foto:'', 
        bio:'Graduado de la academia del Chelsea, James empezó como delantero porque "idolatraba a Didier Drogba... Él jugaba en mi equipo, jugaba en mi posición y siempre lo admiré. Solo quería ser como él, marcar como él y celebrar como él". Pero sus entrenadores lo vieron diferente, moviéndolo primero al mediocampo, luego, a los 15 años, como lateral derecho. "Lo odié durante dos o tres años. Pero un día simplemente hizo clic". Él y Lauren son el primer hermano y hermana en jugar fútbol absoluto para Inglaterra en la era moderna. Sin embargo, se dan su espacio. Lauren dijo en 2022: "Cualquier cosa que tenga que ver con el fútbol, ambos sabemos lo que tenemos que hacer, así que simplemente dejamos que el otro lo haga. Pero fuera del fútbol, tenemos una gran relación. Creo que nuestra diferencia de edad ayuda, siendo de solo dos años... Es un tipo divertido". Superó tres temporadas difíciles de problemas de lesiones y estado físico para llegar en buena forma este verano.',

      {

        bio:'Se unió al Chelsea a los ocho años e hizo su debut en la Premier League en 2022, a los 18 años, en una derrota por 1-0 ante el Newcastle, club al que se unió cedido nueve meses después, con una obligación de compra por 28 millones de libras, más 7 millones en variables. Rápidamente tuvo un impacto positivo, pero la fractura de un hueso de su pie el año pasado lo dejó fuera de su victoria en la final de la Carabao Cup, lo que, según dijo el año pasado, fue "increíblemente difícil... todavía duele bastante ver eso y simplemente no poder estar ahí. Me habían operado literalmente cinco días antes, así que no pude llegar al partido y celebrar con el equipo". Pero, dijo, "creo que me ha hecho mentalmente mucho más fuerte, que creo que cualquier persona que esté lesionada te lo dirá". Tiene experiencia previa con Thomas Tuchel, habiendo logrado su gran avance en el Chelsea durante el tiempo del alemán a cargo en Stamford Bridge. "Fue una buena persona conmigo y me dio mi debut. Me dio la confianza para seguir adelante".',

      { 
        numero:15, nombre:'Djed Spence', pos:'DEF', nacimiento:'9 ago 2000', club:'Tottenham', pais_club:'Inglaterra', foto:'', 
        bio:'Spence dice que mantiene una nota mental de todos los que dudan de él. Fue enviado a préstamo tres veces por los Spurs antes de consolidarse, y también fue cedido en el Middlesbrough en 2021, con el entonces entrenador Neil Warnock advirtiéndole que estaría en el fútbol amateur en cinco años a menos que cambiara su actitud. Tras lograr el ascenso con el Forest, al que se unió cedido por el Boro, tuiteó una foto suya con el trofeo, fumando un cigarro, y etiquetó a Warnock. "No diría que tengo una lista en particular, pero sí tengo una nota mental de la gente que dudó de mí, seguro, y se siente bien demostrar que están equivocados. Siempre he tenido eso desde pequeño, siempre he tenido que luchar por mi posición". Cuando hizo su debut con Inglaterra el año pasado se convirtió en el primer musulmán en hacerlo para el equipo mayor masculino. "Es una bendición, es increíble. Me sorprendió, de verdad, el primero en la historia. Si yo puedo hacerlo, tú puedes hacerlo. Es importante no solo para los niños musulmanes sino para cualquier niño de cualquier fe. Pon tu mente en algo y puedes lograrlo, hombre".',

      {

        bio:'El segundo futbolista nacido en Costa de Marfil en jugar para Inglaterra después de su ex compañero de equipo en el Palace, Wilfried Zaha. Dejó el Chelsea por el Palace, a través de una cesión en el Swansea, en 2021, y ganó la FA Cup allí. Hijo del ministro de una iglesia, calificó su frustrado traspaso al Liverpool el verano pasado y su posterior mudanza al City en enero como "el plan de Dios llegando a buen término". Conocido por ser tranquilo y reflexivo, pero tiene sus ojos puestos en un tipo diferente de futuro. "Me encantaría ser luchador de la WWE", le dijo a la BBC. "Crecer viendo WWE... Puede ser peligroso, pero el lado de la actuación... Soy un buen hablador al micrófono... hacer creer a la gente que eres el malo o el bueno". Pasa su tiempo libre leyendo o en el cine "porque nadie va al cine, así que es agradable estar en el cine solo", y tiene planes de retomar la batería. "Toqué la batería en la iglesia durante mucho tiempo. Toqué la batería en la escuela. No tengo una batería, pero realmente quiero una. Esa es una manera realmente buena de disfrutar de la música y escapar".',

        bio:'Nacido en Croydon de padre portugués y madre escocesa, Livramento fue delantero de su club de la infancia, el Roundshaw, antes de unirse a la academia del Chelsea a los siete años. Se fue en 2021 antes de hacer una aparición en el primer equipo, uniéndose al Southampton, donde sufrió una grave lesión del ligamento cruzado anterior, tardando un año en recuperarse. "Mentalmente, me hizo pasar por muchas cosas", le dijo al Telegraph en 2024. "Me hizo crecer enormemente. Tenía 19 años, ya vivía lejos de mi familia. Estaba pasando por muchas cosas. No sabía si iba a volver al mismo nivel o a poder mejorar". Pero se reconstruyó, y se ganó un traspaso de 32 millones de libras al Newcastle, donde los fanáticos han adaptado su viejo cántico a Tino Asprilla en su honor. "No me parezco en nada a Asprilla. Nunca he hecho nada salvaje en un campo de entrenamiento. Soy consciente de las historias sobre él, un poco al menos. No he hecho nada salvaje, no se preocupen por eso. Soy bastante aburrido, ¿sabes?. Pero el cántico es increíble, cada vez que lo escucho quiero sonreír".',

      { 
        numero:8, nombre:'Declan Rice', pos:'MID', nacimiento:'14 ene 1999', club:'Arsenal', pais_club:'Inglaterra', foto:'', 
        bio:'El jugador británico más caro de la historia con 105 millones de libras, justo por delante de los 100 millones de Jack Grealish. Rice fue liberado de la academia del Chelsea a los 14 años y se mudó al West Ham después de una prueba, quedándose allí hasta 2023 tras convertirse en uno de los tres únicos capitanes de los Hammers, junto con Billy Bonds y Bobby Moore, en llevar al club a un trofeo importante en la Europa Conference League de 2023. Hizo tres apariciones para Irlanda antes de comprometerse con Inglaterra en 2019. También le encanta el golf e hizo algo de modelaje en la Semana de la Moda de Londres en 2024, usando una chaqueta azul marino con cordones blancos. "Saben qué, fue tan bueno", le dijo a Sky. "Amo la moda y que me pidan estar involucrado en esto es realmente especial". Ha hablado previamente sobre desarrollar su propio estilo, después de crecer con "mamá siempre diciéndome cómo vestirme... Siempre estoy buscando un par de pantalones que queden bien por encima de mis zapatos. Ni muy bajo, ni muy alto. Eso es una cosa clave para mí, cómo caen un par de pantalones sobre los zapatos".',

      {

        bio:'Se unió al Borussia Dortmund desde el Birmingham en 2020 y al Real Madrid en 2023 con un contrato de seis años por 88,5 millones de libras, llamándolo "una obviedad en realidad, simplemente acepté". Criado en Stourbridge, solía presentarse en el Birmingham para entrenar a los 14 años con su uniforme burdeos de la escuela Priory. El delantero Lukas Jutkiewicz: "Estábamos haciendo ejercicios de definición y este chico se une al primer equipo, amaga con disparar, sienta de culo a los profesionales experimentados, recorta y luego la pone rodando en el otro rincón. Pensé para mis adentros, y sé que no fui el único: \u0027¿Quién es este?\u0027". Bellingham se graduó de la Universidad de Loughborough con un Certificado BTEC de Nivel 3 en Deportes en 2021, completándolo a distancia después de mudarse a Alemania. Sus acuerdos comerciales incluyen Louis Vuitton, Lucozade, su propia colección exclusiva de Adidas JB, su propia aplicación y, en 2024, modelar calzoncillos de hombre para la marca Skims de Kim Kardashian. Thomas Tuchel dijo que el comportamiento de Bellingham puede ser "un poco repulsivo" en junio del año pasado (un comentario por el que luego se disculpó) y el jugador del Real Madrid aún no ha alcanzado su mejor nivel bajo el mando del alemán.',

      { 
        numero:17, nombre:'Jordan Henderson', pos:'MID', nacimiento:'17 jun 1990', club:'Brentford', pais_club:'Inglaterra', foto:'', 
        bio:'Un líder vocal, recién salido de una temporada de regreso estelar en el fútbol inglés con el Brentford. Fue fuertemente criticado en 2023 después de dejar el Liverpool por el club Al-Ettifaq de la Saudi Pro League, dado su anterior apoyo a los derechos LGBTQ+, y fue abucheado por los fanáticos durante un partido de Inglaterra poco después. Terminó su contrato saudí tras 24 semanas y se mudó al Ajax, pero quedó fuera de la convocatoria para la Eurocopa 2024. Cuando Inglaterra llegó a la final, llamó a una empresa de alquiler de furgonetas e hizo el viaje de siete horas a Berlín con su familia para mirar, sorprendiendo a los aficionados de Inglaterra en varias estaciones de servicio a lo largo del camino. "Cuando necesitábamos ir al baño o algo, o pasábamos a las gasolineras, fue bastante divertido ver a algunos de los fanáticos", dice. "De hecho, fue muy agradable estar con ellos. Pero obviamente me hubiera gustado estar con el equipo". Se ganó ser convocado a la selección de nuevo el pasado mes de marzo. Se le concedió un MBE en 2021 por ayudar a impulsar la campaña de recaudación de fondos #PlayersTogether para el NHS durante la pandemia de Covid.',

        bio:'Tranquilo, modesto, enormemente talentoso: un pasador instintivo con una sólida ética de trabajo. Su padre John dijo a la BBC en 2024: "Es bastante solitario, Adam. Es muy tranquilo, no suelta mucha prenda. Creo que es el más inteligente de mis hijos". Aficionado del Blackburn, Wharton fue mascota para un partido contra el Chelsea en 2008 a la edad de cuatro años, se unió a la academia dos años después e hizo su debut en el primer equipo en 2022. El Palace lo fichó por 18 millones de libras en 2024. Suplente sin minutos para Inglaterra en la Euro 2024, pero Gareth Southgate era un gran admirador de su habilidad natural. "Es un chico muy tranquilo. Cuando hablas con él, es bastante inalterable tal como lo era en el campo. Esa capacidad para recibir el balón y ver el panorama con anticipación no es algo que se deba subestimar". Su entrenador en el club, Oliver Glasner, describió esa habilidad en términos similares: "Su preorientación, sus soluciones con uno o dos toques, son asombrosas". Conocido por algunos como el "Pirlo de Wilpshire" en honor a su pueblo natal en Lancashire. Su hermano mayor Scott todavía juega para el Blackburn.',

      { 
        numero:26, nombre:'Elliot Anderson', pos:'MID', nacimiento:'6 nov 2002', club:'Nottingham Forest', pais_club:'Inglaterra', foto:'', 
        bio:'Anderson, nacido en Whitley Bay, fue nombrado en la selección absoluta de Escocia por primera vez en agosto de 2023, elegible para representarlos a través de su abuela. Pero cambió de opinión poco después. "Dejé el campamento después de unos días y decidí que simplemente necesitaba más tiempo", dijo después de ser convocado a la selección mayor de Inglaterra el año pasado. "No quería sumergirme en nada, así que estoy muy agradecido de haberlo hecho ahora. Soy definitivamente inglés. Es solo que realmente no había sido convocado por Inglaterra en los niveles de edad cuando era más joven, así que pensé en aprovechar la oportunidad. Pero una vez que tuve esa creencia de que era lo suficientemente bueno para jugar para Inglaterra, me golpeó la realidad". El Newcastle lo vendió al Forest en 2024 para cumplir con las reglas de rentabilidad y sostenibilidad de la Premier League. Anderson es otro graduado del famoso Wallsend Boys Club, junto a Alan Shearer, Peter Beardsley y Michael Carrick. Su hermano mayor Wil apareció en la temporada 11 de Love Island, entrando en la villa en el Día 12, y siendo eliminado de la isla en el Día 37.',
