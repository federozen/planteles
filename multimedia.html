      { 
        numero:7, nombre:'Bukayo Saka', pos:'FWD', nacimiento:'5 sep 2001', club:'Arsenal', pais_club:'Inglaterra', foto:'', 
        bio:'Se siente como una presencia fija a largo plazo en las selecciones de Inglaterra, habiendo hecho su debut hace seis años, pero todavía tiene solo 24 años. Su primer nombre, elegido por su abuela nigeriana, significa "añade a la felicidad"; su apodo, "Little Chilli" (Pequeño Chile), se lo dio su ex compañero Pierre-Emerick Aubameyang debido a sus tiros picantes en los entrenamientos. "Simplemente seguía llamándome así y luego se convirtió en algo real, y ahora es una gran cosa". En 2024 Nando\u0027s sacó una salsa oficial Peri Peri Saka. "He estado yendo a Nando\u0027s desde que era pequeño, así que tener mi propia salsa Peri-Peri es una locura". Durante sus tres meses de baja por un desgarro en el tendón de la corva el año pasado se compró un nuevo cachorro, Tucker el cockapoo, y se sumergió de lleno en la lectura, con un libro en particular, El poder del ahora: Una guía para la iluminación espiritual de Eckhart Tolle, tocando una fibra sensible. "A veces pensaba: \u0027Oh, ¿voy a regresar en la mejor forma?\u0027 O, en el pasado: \u0027¿Qué podría haber hecho para prevenir la lesión?\u0027. Pero todo eso no es necesario. Una de las mejores cosas que saqué del libro es siempre preguntarte a ti mismo: ¿qué es necesario en este momento ahora mismo? Y tratar de vivir de esa manera".', 
        dato_extra:'Aubameyang lo apodó "Little Chilli" por sus tiros picantes; tiene su propia salsa en Nando\'s' 
      },
      { 
        numero:20, nombre:'Jarrod Bowen', pos:'FWD', nacimiento:'20 dic 1996', club:'West Ham', pais_club:'Inglaterra', foto:'', 
        bio:'Una opción de ataque experimentada, llegó al torneo tras una temporada de pruebas con el West Ham. Su carrera comenzó lentamente: se quedó con su club de la infancia, Leominster Minors, hasta que tenía 15 años después de pruebas fallidas en el Villa y el Cardiff, firmando finalmente una beca en Hereford United. Su padre, un granjero, lo ayudó con su trabajo físico. "Papá jura por esta rutina de entrenar en campos de papas... están las carreras con carretillas y mezcladoras de cemento, voltear neumáticos de tractores... Obviamente, cuando corres en un campo de papas, no corres tan rápido pero luego, cuando vuelves al campo de fútbol, te sientes 10 veces más rápido que antes". Se mudó al Hull libre cuando el Hereford colapsó en 2014, y su forma allí le valió un traspaso de 22 millones de libras al West Ham en 2020. Su gol les ganó la Conference League en 2023. Se casó con la hija de Danny Dyer, Dani, el año pasado. Su truco para fiestas: "Tengo doble articulación en el pulgar, lo cual es un poco extraño. Puedo hacer que cruja fuera de lugar. No es normal".', 
        dato_extra:'Su papá lo hacía entrenar corriendo en un campo de papas para luego sentirse "10 veces más rápido"' 
      },
      { 
        numero:21, nombre:'Noni Madueke', pos:'FWD', nacimiento:'10 mar 2002', club:'Arsenal', pais_club:'Inglaterra', foto:'', 
        bio:'Fichado por el Crystal Palace cuando tenía nueve años, cambió a los Spurs tres años después y, tras brillar en los niveles juveniles de Inglaterra, recibió una oferta del Manchester United. Pero la rechazó, optando en su lugar por dejar Inglaterra con solo 16 años para ir al PSV Eindhoven. "Solo quería integrarme en una configuración de primer equipo lo más rápido posible". Le dijo a GQ que aprendió holandés rápidamente porque "no quería que nadie hablara mierda de mí en el campo... En plan, \u0027¡sé exactamente lo que estás diciendo!\u0027". Brilló allí; el Chelsea lo fichó del PSV por 28,5 millones de libras en 2023, y el Arsenal pagó 48,5 millones por él en 2025: un acuerdo criticado por algunos fanáticos del Arsenal con una campaña #NoToMadueke debido a su forma mixta y la tarifa. "Me lo tomé con calma. Estás en el ojo público, la gente puede decir lo que quiera". Es otro de los aficionados a la moda del equipo de Inglaterra. "Siento que si te ves bien, te sientes bien, juegas bien. Fútbol, música, moda, todo está conectado para mí. Es cómo expreso quién soy, y cada uno alimenta al otro".', 
        dato_extra:'Aprendió holandés en Países Bajos porque no quería que hablaran a sus espaldas en la cancha' 
      },
      { 
        numero:11, nombre:'Phil Foden', pos:'FWD', nacimiento:'28 may 2000', club:'Manchester City', pais_club:'Inglaterra', foto:'', 
        bio:'Han pasado nueve años desde que Foden ganó el Balón de Oro cuando Inglaterra levantó el Mundial Sub-17. Dos ganadores anteriores del Balón de Oro de Mundiales Sub-17, Cesc Fàbregas y Toni Kroos, han pasado a ganar el Mundial absoluto. ¿Podrá igualarlos Foden?. Ha sido un habitual con Inglaterra desde 2020, pero su forma reciente en el club ha sido mixta. Es un gran aficionado a la pesca. "Es una pasión", le dijo a GQ. "Me aleja del mundo, a un lugar diferente que amo. A mis hijos les aburre, sin embargo. Solo quieren tirar todo el cebo y después de dos minutos se quieren ir a casa". Su hijo Ronnie, de siete años, tiene 4,1 millones de seguidores en Instagram tras haberse vuelto viral a los cuatro años por sus alegres apariciones en las celebraciones posteriores a los partidos del City. Apodado "El Wey". "Ronnie es todo un personaje, y es bastante famoso en su \u0027gram... es bastante avanzado para su edad". El padre de Ronnie también se volvió viral en 2022 después de que un fanático publicara una imagen en línea de su doble, un gato blanco y negro de aspecto distintivo.', 
        dato_extra:'Apasionado a la pesca y padre del famoso niño de Instagram apodado "El Wey"' 
      },
      { 
        numero:28, nombre:'Cole Palmer', pos:'MID', nacimiento:'6 may 2002', club:'Chelsea', pais_club:'Inglaterra', foto:'', 
        bio:'Talento enorme, gran personalidad. Se unió al Manchester City a los siete años, pero casi fue descartado debido a su complexión delgada a los 14. Pero el entonces director de la academia del club, Jason Wilcox, lo apoyó. "Cole era pequeño, no sabíamos qué tan grande iba a ser y ha sorprendido a todos ahí. Ahora mide 6 pies 2 pulgadas. Nadie habría visto venir eso", dijo al Telegraph. "Pero tenía características de élite. Para mí, era una obviedad quedarme con él". Palmer hizo su debut en el primer equipo en 2020 y se unió al Chelsea por 40 millones de libras iniciales en 2023. La familia de su padre Jermaine proviene de San Cristóbal y Nieves y Palmer luce la bandera de la isla en sus botines junto a una bandera de Inglaterra. El año pasado registró su celebración de temblor "Cold Palmer" (Palmer Frío) para su uso en juguetes, ropa y comida, pero no en vino después de que el enólogo francés Château Palmer lo impugnara. También protagonizó una foto viral del Chelsea levantando el trofeo del Mundial de Clubes, luciendo desconcertado ya que Donald Trump se quedó en el centro de atención. "Sabía que iba a estar aquí. Pero no sabía que iba a estar en el estrado cuando levantamos el trofeo. Estaba un poco confundido, sí".', 
        dato_extra:'Registró comercialmente su festejo de tiritar de frío bajo el apodo "Cold Palmer"' 
      },
      { 
        numero:19, nombre:'Marcus Rashford', pos:'FWD', nacimiento:'31 oct 1997', club:'Manchester United', pais_club:'Inglaterra', foto:'', 
        bio:'Poseedor de la Orden del Imperio Británico (MBE), autor y activista contra la pobreza que se enfrentó y venció a Boris Johnson dos veces. Llegó al Mundial en lo alto tras una etapa de préstamo restauradora en el Barcelona. En octubre pasado señaló a la alta rotación de entrenadores en el Manchester United como una razón para su inconsistencia allí: "Siento que he estado en un ambiente inconsistente durante mucho tiempo... Para ser consistente en cualquier cosa, no solo en el deporte, necesitas variables consistentes en tu vida. Simplemente hemos tenido demasiados cambios hasta ahora". Se crio en Wythenshawe, el menor de cinco hermanos, con su mamá, Mel, trabajando en tres empleos para sacar adelante a la familia. Sus experiencias informaron su trabajo fuera de la cancha desde entonces. Coescribió la serie de libros The Breakfast Club Adventures, y el éxito de ventas de autoayuda para niños You Are A Champion. Comienza con esta dedicatoria: "A cada joven que está tratando de encontrar su camino. A mi mamá, por ayudarme a creer que los sueños pueden hacerse realidad".', 
        dato_extra:'Activista contra la pobreza infantil, autor de libros y portador de la Orden del Imperio Británico' 
      },
      { 
        numero:29, nombre:'Eberechi Eze', pos:'FWD', nacimiento:'29 jun 1998', club:'Arsenal', pais_club:'Inglaterra', foto:'', 
        bio:'El verano pasado Eze estaba volando: ganador de una FA Cup con el Crystal Palace, un habitual emergente en Inglaterra y un nuevo fichaje de 60 millones de libras para su club de la infancia, el Arsenal. Pero, aparte de un memorable hat-trick en el derbi contra los Spurs, y dos en el partido de vuelta, ha tenido problemas para tener un impacto regular en el Emirates, poniendo en duda su lugar en el equipo del Mundial. Pero tiene mucha resiliencia a la que recurrir, habiendo pasado por el trauma de ser liberado por múltiples clubes, incluido el Arsenal, cuando era joven. Mirando hacia atrás, dijo que lo superó gracias a "mi confianza y fe en Dios, simplemente dejé que me alimentara y me llenara, lo cual fue importante. No significa que no fuera difícil. Todavía es difícil superar esos momentos. Recuerdo haber pensado: \u0027¿por qué esto es tan difícil?\u0027. Pero el amor por el fútbol nunca, nunca cambió". También es un aficionado jugador de ajedrez, habiendo aprendido a jugar por su ex compañero del Palace Michael Olise. Eze ganó el primer premio de 15.000 libras en un torneo amateur de Chess.com en mayo del año pasado, venciendo al YouTuber Sapnap en la final.', 
        dato_extra:'Gran jugador de ajedrez, derrotó al YouTuber Sapnap para ganar un torneo online en 2023' 
      },
      { 
        numero:30, nombre:'Anthony Gordon', pos:'FWD', nacimiento:'24 feb 2001', club:'Newcastle', pais_club:'Inglaterra', foto:'', 
        bio:'Liberado por el Liverpool a los 11 años, se unió al Everton y se quedó hasta 2023 cuando, a través de una controvertida solicitud de transferencia, se unió al Newcastle por 40 millones de libras. Su debut en la selección absoluta de Inglaterra se produjo contra Brasil en 2024. Es fanático de los libros de motivación, con favoritos que incluyen Winning: The Unforgiving Race to Greatness de Tim Grover y Never Finished: Unshackle Your Mind and Win the War Within del ultra-maratonista y Navy Seal retirado David Goggins. "Todo el mundo, naturalmente, duda de sí mismo para empezar", dice. "Pero la clave es notar eso, dándote cuenta de que estás teniendo una guerra en tu cabeza y en realidad no es real. Esa es la parte clave de cualquier buen atleta: tu resiliencia, cómo te recuperas". Durante la Eurocopa 2024 se presentó memorablemente a una conferencia de prensa regular de Inglaterra lleno de cortes al haberse caído de una bicicleta eléctrica mientras intentaba grabar un video con su teléfono, tras haber entendido mal el sistema de frenado. "La bicicleta no solo redujo la velocidad, sino que se detuvo por completo... y yo no".', 
        dato_extra:'Se cayó de una bicicleta eléctrica en la Euro 2024 al frenar para grabar un video con su teléfono' 
      },
      { 
        numero:31, nombre:'Ollie Watkins', pos:'FWD', nacimiento:'30 dic 1995', club:'Aston Villa', pais_club:'Inglaterra', foto:'', 
        bio:'Marcó el gol de último minuto que envió a Inglaterra a la final de la Eurocopa 2024. "No creo haber golpeado una pelota tan dulce antes". Dijo que se sentía surrealista para alguien que, unos años antes, había estado luchando por entrar en el equipo de Exeter en la League Two. "Nunca lo imaginé. Obviamente puedes soñar, pero soy realista". Su rutina previa al partido incluye música: "Cuanto más se acerca el saque inicial, me gusta escuchar hip-hop más pesado, como 50 Cent y su álbum de la vieja escuela Get Rich or Die Tryin\u0027 o Rick Ross, algo por el estilo". Pero eligió cantar Never Too Much de Luther Vandross como su canción de iniciación al firmar por el Villa. Obtuvo su amor por la música de su madre, Delsi-May, una cantante profesional, quien le contó al Times en 2021 cómo descubrió por primera vez el potencial futbolístico de Ollie junto al mar en su casa en Torquay. "Solíamos sacar a los niños, y había una maquinita en la que ponías una moneda de 2 peniques y salía una pelotita de goma. Él se paraba ahí, tú la dejabas caer y él la pateaba. Nunca solía fallar. Tenía solo nueve meses".', 
        dato_extra:'A los 9 meses de edad su madre ya veía su talento futbolístico al patear pelotitas de goma de una máquina' 
      },
      { 
        numero:32, nombre:'Morgan Rogers', pos:'FWD', nacimiento:'26 jul 2002', club:'Aston Villa', pais_club:'Inglaterra', foto:'', 
        bio:'Rogers dice que sus períodos de préstamo en Lincoln, Bournemouth y Blackpool (antes de su mudanza a Middlesbrough en 2023) "fueron todo para mí". Le dijo a The Times: "Tuve que pasar por muchas luchas, mucho dolor, muchos días duros... Tuve que encontrarme a mí mismo como jugador, y tuve que descubrirlo en las ligas inferiores, qué funciona en el juego profesional, porque lo que funciona en el fútbol de academia del [Man City] no es lo mismo en League One o en la Championship". Se mudó a Villa por 8 millones de libras en 2024. Dice que era "un poco friki del conocimiento del fútbol" cuando era niño: "Aprendiendo sobre jugadores, aprendiendo sobre equipos y cosas por el estilo. Mi papá y yo estábamos bastante metidos en eso: él me hacía preguntas y yo las respondía. Podría nombrar a jugadores aleatorios en todo el mundo y cosas por el estilo. Intentaba ser la persona más inteligente en la sala cuando se trataba de fútbol". Tiene varios tatuajes, incluido uno en su antebrazo izquierdo que enumera los cumpleaños de sus padres y sus tres hermanos. "Ese es mi favorito. Mi tatuaje más sentimental".', 
        dato_extra:'De niño era un "friki" de la información de fútbol y quería ser el más inteligente sobre el tema' 
      }] },
  croacia:       { nombre:'Croacia',        flag:'🇭🇷', dt:'', mundiales:'0', grupo:'L', subtitulo:'Vatreni',        jugadores:[{ 
        numero:1, nombre:'Dominik Livakovic', pos:'GK', nacimiento:'9 ene 1995', club:'Fenerbahce', pais_club:'Turquía', foto:'', 
        bio:'Ni siquiera es el futbolista más famoso de su (extensa) familia; a través de su madre Manuela está emparentado con Josip Skoblar, el ganador de la Bota de Oro europea de 1971, que marcó 44 goles para el Marsella esa temporada. Mientras Dominik, que también jugó al baloncesto de niño y se había matriculado en una universidad para estudiar relaciones internacionales, se abría camino en el fútbol absoluto, su padre Zdravko —político y secretario de estado en ese momento— pasó cinco meses en prisión preventiva por su presunta implicación en un gran caso de corrupción. En 2022, Livakovic se convirtió en apenas el tercer arquero en la historia de los Mundiales en atajar tres penales en una sola tanda; luego también atajó el tiro de Rodrygo en otra tanda contra Brasil en los cuartos de final.', 
        dato_extra:'Especialista en penales que de joven se matriculó para estudiar relaciones internacionales' 
      },
      { 
        numero:12, nombre:'Dominik Kotarski', pos:'GK', nacimiento:'10 feb 2000', club:'FC Copenhagen', pais_club:'Dinamarca', foto:'', 
        bio:'"No tengo arrepentimientos", dice el jugador de 26 años que ha tenido una trayectoria profesional un tanto peculiar. "Las cosas que no sucedieron no vale la pena pensarlas ni hablarlas". Producto de la cantera del Dinamo Zagreb, adonde llegó procedente de un equipo de ligas menores, el Tondach Bedekovcina, se negó a firmar un contrato profesional, y en su lugar se mudó al Ajax antes de cumplir los 18. Cuatro años después, estaba de vuelta en Croacia en el HNK Gorica, sin haber aparecido nunca para el Dinamo, el Ajax o cualquier otro club (sí jugó para el Jong Ajax, el equipo filial holandés). Una temporada realmente buena allí le valió un traspaso al PAOK en Grecia y luego, en medio de rumores de interés de varios grandes clubes europeos, eligió al FC Copenhague como su próximo destino.', 
        dato_extra:'Se negó a firmar contrato profesional en su país para marcharse al Ajax a los 17 años' 
      },
      { 
        numero:23, nombre:'Ivor Pandur', pos:'GK', nacimiento:'25 mar 2000', club:'Hull City', pais_club:'Inglaterra', foto:'', 
        bio:'La mayoría de los aficionados en Croacia solo recordarán vagamente al arquero cuyo apellido es uno de los términos del argot para un policía; dejó su Rijeka natal después de solo una temporada en el fútbol absoluto y desde entonces ha estado jugando en el extranjero: para el Verona, el Fortuna Sittard y ahora el Hull City. Y aunque fue parte de cada categoría de la selección nacional juvenil desde la Sub-15 hasta la Sub-21, al momento de escribir esto aún no ha hecho su debut con el equipo mayor de Croacia. Pandur es un practicante de yoga y una persona religiosa, y sus opiniones sobre la Championship, la liga donde juega actualmente, son bastante interesantes. "Es brutal, un poco como el rugby, te hace más duro", dice. "En cada partido te golpean ya sea con un codo o una rodilla. Mientras esté sano, lo estoy disfrutando".', 
        dato_extra:'Practicante de yoga que compara la rudeza del fútbol de segunda división inglesa con el rugby' 
      },
      { 
        numero:21, nombre:'Karlo Letica', pos:'GK', nacimiento:'11 feb 1997', club:'Lausanne-Sport', pais_club:'Suiza', foto:'', 
        bio:'Hace ocho años, Letica marcó el gol de la victoria para el Hajduk Split contra el Istra; un cabezazo en palomita en el tiempo de descuento. En su día, parecía que podía hacer cualquier cosa; ya estaba en la convocatoria preliminar para el Mundial de 2018, mientras que el interés de nada menos que el Real Madrid era real. Letica fue catalogado como la próxima gran promesa y los medios incluso le dieron un apodo, "Karlo Veliki" (Karlo el Grande, en croata por Carlomagno). Aterrizó en el Club Brugge, pero fue recién cuatro años después que su carrera dio otro giro para mejor, a pesar de que fue en el Hermannstadt, de la máxima categoría de Rumania. Y ahora, tras ganar el título de Arquero del Año de la Superliga suiza durante dos temporadas consecutivas, está de vuelta al borde del escenario internacional. Sus sueños son discretos, ya que dice que realmente le gustaría "tener más tiempo para pescar".', 
        dato_extra:'Apodado "Karlo el Grande", una vez marcó un gol de cabeza en el tiempo de descuento' 
      },
      { 
        numero:2, nombre:'Josip Stanisic', pos:'DEF', nacimiento:'2 abr 2000', club:'Bayern Munich', pais_club:'Alemania', foto:'', 
        bio:'El versátil defensor de 26 años nacido en Múnich ha ganado la liga en cada temporada de su carrera profesional desde su debut en abril de 2021 y, aunque eso puede no sonar tan extravagante dado que siempre ha tenido contrato con el Bayern, también vale la pena señalar que lo hizo en 2024 también, cuando estuvo a préstamo en el Bayer Leverkusen bajo el mando de Xabi Alonso. Stanisic jugó para la Sub-19 de Alemania pero se cambió a Croacia y todavía recuerda muy vívidamente su primera convocatoria. "Estábamos en el coche, toda la familia, y la llamada estaba en altavoz", recuerda. "Me reí, no podía creerlo, pero luego vi a mi hermana llorar. Mi papá también lloró, mi mamá lloró también. Fue uno de los momentos más hermosos de mi vida".', 
        dato_extra:'Nació en Múnich y ha ganado el título de liga en cada temporada de su carrera profesional' 
      },
      { 
        numero:22, nombre:'Josip Juranovic', pos:'DEF', nacimiento:'16 ago 1995', club:'Union Berlin', pais_club:'Alemania', foto:'', 
        bio:'Cuando, en 2014, ganó la etapa croata de una competición internacional para jugadores amateurs, Juranovic pudo disfrutar de su momento en el centro de atención y, tras tomarse una foto con Mario Mandzukic, le dijo a las cámaras: "Mi sueño es jugar para la selección nacional algún día". En ese momento era un jugador anónimo de tercera división y ganar ese concurso muy bien podría haber sido lo más destacado de su carrera, pero intrigó al Hajduk Split lo suficiente como para ficharlo para su equipo de reserva con un salario semanal de unas 150 libras. Dos años después su sueño se hizo realidad y debutó con Croacia, habiendo hecho la transición de mediocampista ofensivo a lateral. En el Union Berlin desde 2023, Juranovic fue uno de los héroes de Croacia en Qatar, donde anuló a Vinícius Júnior en la victoria de cuartos de final contra Brasil.', 
        dato_extra:'Era un jugador anónimo de tercera que se dio a conocer ganando un concurso amateur' 
      },
      { 
        numero:3, nombre:'Luka Vuskovic', pos:'DEF', nacimiento:'24 feb 2007', club:'Tottenham Hotspur', pais_club:'Inglaterra', foto:'', 
        bio:'Dos días después de su 16º cumpleaños, hizo su debut absoluto para el Hajduk Split en el derbi contra el Dinamo; una semana después, marcó su primer gol. Siempre ha sido tan dominante sin esfuerzo entre jugadores mayores que su debut con Croacia a los 18 años ya parecía demorado. Una verdadera fuerza no solo en defensa sino también en la construcción de juego y en ataque, anotó siete goles en Bélgica la temporada pasada y cinco para el HSV desde el verano pasado; entre ellos el Gol del Año de la Bundesliga 2025, una espectacular definición de escorpión. Proveniente de una familia de fútbol de múltiples generaciones (su hermano Mario también es jugador del HSV), Vuskovic ahora finalmente está listo para presentarse en el gran escenario y demostrar por qué todos piensan que será una superestrella durante muchos años. El Tottenham lo fichó por una ganga de 10 millones de libras en 2025 y, seguramente, ¿no lo volverán a ceder?.', 
        dato_extra:'Sensación adolescente que a los 18 años anotó el Gol del Año en Alemania con un "escorpión"'

      { 
        numero:6, nombre:'Josip Sutalo', pos:'DEF', nacimiento:'28 feb 2000', club:'FC Ajax', pais_club:'Países Bajos', foto:'', 
        bio:'Tenía solo 14 años cuando dejó su hogar en Metkovic para mudarse 320 millas hacia el norte y unirse a la cantera del Dinamo Zagreb, es un emocionante y rápido central que sabe jugar el balón y es tranquilo y muy profesional dentro y fuera de la cancha. Para la selección nacional, ha sido crucial para transformar la línea de fondo de Croacia, anteriormente envejecida. En el Mundial de 2022, el veterano Dejan Lovren fue elegido por delante de él, pero Sutalo ahora ha acumulado más de 30 partidos internacionales, casi nunca decepcionando. Su traslado al Ajax en 2023 no tuvo el mejor comienzo ya que estuvo entre los jugadores criticados por la mala forma del equipo, pero ahora ha hecho más de 100 apariciones para el famoso club y parece haber consolidado su lugar de titular también en el lado de Zlatko Dalic.',

      { 
        numero:5, nombre:'Duje Caleta-Car', pos:'DEF', nacimiento:'17 sep 1996', club:'Lyon', pais_club:'Francia', foto:'', 
        bio:'Por si se lo preguntan, "car" no significa automóvil en croata; en realidad significa "emperador". Tras abandonar su hogar a los 16 años para unirse a la academia del Red Bull Salzburg, fue el miembro más joven de la plantilla ganadora de la medalla de plata en el Mundial de 2018 y se convirtió en un defensor fuerte y duro que también es seguro con el balón. Es, sin embargo, propenso a cometer errores ocasionales. Recientemente concedió un penal que los medios de España llamaron "el más surrealista en 100 años". Jugando para la Real Sociedad contra el Alavés en la Copa, detuvo al delantero contrario Toni Martínez tirándole de la camiseta por encima de la cabeza, dejando al jugador dar vueltas desorientado en el área. Alavés, sin embargo, falló la pena máxima. La esposa de Caleta-Car, Adriana, una ex modelo y licenciada en derecho, es una popular influenciadora en redes sociales.',

      { 
        numero:24, nombre:'Martin Erlic', pos:'DEF', nacimiento:'24 ene 1998', club:'Midtjylland', pais_club:'Dinamarca', foto:'', 
        bio:'Pocos días después de jugar la final de la Liga de Naciones 2023 contra España, Erlic estaba en el campo ayudando en la granja de su familia. "Cuando era niño, vivíamos bajo el mismo techo con animales de granja, solo nos separaba una pared", dijo una vez en una reveladora entrevista. "Hubo tiempos difíciles y recogíamos botellas para venderlas... aunque no hay vergüenza en eso", agregó. Erlic dejó su país por Italia a la edad de 16 años y luchó con muchos cambios de club, préstamos y lesiones. Cuando hizo su debut internacional absoluto en junio de 2022, la convocatoria fue tan inesperada que tuvo que faltar a la boda de su hermano para poder jugar. "Lo sentí", dice. "Pero a esto es a lo que se reducen todos los entrenamientos y los sacrificios que hice".',

function buildPortada() {
  const wrap = document.getElementById('portadaWrap');
  wrap.innerHTML = '';

  // Contenedor grid para desktop
  const grid = document.createElement('div');
  grid.className = 'grupos-grid';

  GRUPOS.forEach((g, gi) => {
    const bloque = document.createElement('div');
    bloque.className = 'grupo-bloque' + (g.argentina ? ' argentina-grupo' : '');
    bloque.style.animationDelay = `${gi * 55}ms`;
    bloque.innerHTML = `<div class="grupo-titulo"><span class="grupo-letra">${g.letra}</span><span class="grupo-label">Grupo ${g.letra}</span></div>`;
    g.sels.forEach(id => {
      const sel = SELECCIONES[id];
      if (!sel) return;
      const tiene = sel.jugadores.length > 0;
      const fila = document.createElement('div');
      fila.className = 'sel-fila';
      const flagEl = FLAG_URLS[id]
        ? `<img src="${FLAG_URLS[id]}" alt="${sel.nombre}" loading="lazy" class="sel-fila-flag-img">`
        : sel.flag;
      fila.innerHTML = `
        <div class="sel-fila-flag">${flagEl}</div>
        <div class="sel-fila-info">
          <div class="sel-fila-nombre">${sel.nombre}</div>
        </div>
        <div class="sel-fila-badge ${tiene ? '' : 'vacio'}">${tiene ? 'Ver plantel ›' : ''}</div>`;
      if (tiene) fila.onclick = () => irSeleccion(id);
      bloque.appendChild(fila);
    });
    grid.appendChild(bloque);
  });

  wrap.appendChild(grid);
}

/* ══════════════════════════════════════
   NAVEGACIÓN
══════════════════════════════════════ */
function irSeleccion(id) {
  selActiva = id;
  document.getElementById('vistaPortada').style.display   = 'none';
  document.getElementById('vistaSeleccion').style.display = 'block';
  aplicarPaleta(id);
  buildSubNav(id);
  renderHero(id);
  renderTabs(id);
  renderSubhome(id);
  window.scrollTo({ top:0, behavior:'smooth' });
}

function irPortada() {
  selActiva = null;
  document.getElementById('vistaSeleccion').style.display = 'none';
  document.getElementById('vistaPortada').style.display   = 'block';
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* aplica los colores del país como CSS vars en :root */
function aplicarPaleta(id) {
  const p = PALETAS[id] || { c1:'#94BE1F', c2:'#111' };
  const root = document.documentElement;
  root.style.setProperty('--c1', p.c1);
  root.style.setProperty('--c2', p.c2);
  root.style.setProperty('--c1-alpha', hexAlpha(p.c1, .18));
  root.style.setProperty('--c2-alpha', hexAlpha(p.c2, .10));
  // Si c1 es muy oscuro (luminosidad < 35%) usamos c2 como color de texto
  // Si c2 también es oscuro, usamos el verde de Olé
  const lum1 = luminancia(p.c1);
  const lum2 = luminancia(p.c2);
  let textColor;
  if (lum1 >= 35) {
    textColor = p.c1;           // c1 es claro — úsalo directamente
  } else if (lum2 >= 35) {
    textColor = p.c2;           // c2 es más claro — úsalo
  } else {
    textColor = '#94BE1F';      // ambos oscuros — verde Olé como fallback
  }
  root.style.setProperty('--c1-text', textColor);
}

/* luminancia perceptual en escala 0-100 */
function luminancia(hex) {
  const r = parseInt(hex.slice(1,3),16) / 255;
  const g = parseInt(hex.slice(3,5),16) / 255;
  const b = parseInt(hex.slice(5,7),16) / 255;
  return (0.299 * r + 0.587 * g + 0.114 * b) * 100;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ══════════════════════════════════════
   SUB NAV (rivales del mismo grupo)
══════════════════════════════════════ */
function buildSubNav(id) {
  const nav = document.getElementById('subSelNav');
  nav.innerHTML = '';
  const grupo = GRUPOS.find(g => g.sels.includes(id));
  if (!grupo) return;
  grupo.sels.forEach(sid => {
    const s = SELECCIONES[sid];
    if (!s) return;
    const btn = document.createElement('button');
    btn.className = 'sub-nav-btn' + (sid === id ? ' active' : '');
    const navFlagEl = FLAG_URLS[sid]
      ? `<img src="${FLAG_URLS[sid]}" alt="${s.nombre}" class="sub-nav-flag-img" loading="lazy">`
      : `<span class="flag">${s.flag}</span>`;
    btn.innerHTML = `${navFlagEl}${s.nombre}`;
    btn.onclick = () => { if (sid !== selActiva) irSeleccion(sid); };
    nav.appendChild(btn);
  });
}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
function renderHero(id) {
  const sel = SELECCIONES[id];
  const p   = PALETAS[id] || { c1:'#94BE1F', c2:'#111' };
  const div = document.getElementById('selHero');
  const heroFlagUrl = FLAG_URLS[id];
  const heroBgEl = heroFlagUrl
    ? `<img src="${heroFlagUrl}" alt="${sel.nombre}" class="hero-flag-bg-img">`
    : `<div class="hero-flag-bg">${sel.flag}</div>`;
  const heroIconEl = heroFlagUrl
    ? `<img src="${heroFlagUrl}" alt="${sel.nombre}" class="hero-flag-img">`
    : `<div class="hero-flag">${sel.flag}</div>`;

  div.innerHTML = `
    <div class="sel-hero">
      <div class="hero-grid-pattern"></div>
      <div class="hero-glow" style="background:radial-gradient(ellipse at 90% 30%,${hexAlpha(p.c1,.2)} 0%,transparent 55%),radial-gradient(ellipse at 5% 80%,${hexAlpha(p.c2,.12)} 0%,transparent 50%)"></div>
      ${heroBgEl}
      <div class="hero-content">
        <div class="hero-label">Mundial 2026 · Grupo ${sel.grupo}</div>
        <div class="hero-top">
          ${heroIconEl}
          <div class="hero-titles">
            <h2><span>${sel.nombre}</span></h2>
            ${sel.subtitulo ? `<div class="hero-subtitulo">${sel.subtitulo}</div>` : ''}
          </div>
        </div>
        <div class="hero-stats">
          ${sel.dt ? `<div class="hero-stat"><span class="hero-stat-lbl">Director Técnico</span><span class="hero-stat-val">${sel.dt}</span></div>` : ''}
          <div class="hero-stat"><span class="hero-stat-lbl">Grupo</span><span class="hero-stat-val">${sel.grupo}</span></div>
          <div class="hero-stat"><span class="hero-stat-lbl">Convocados</span><span class="hero-stat-val">${sel.jugadores.length}</span></div>
          ${sel.mundiales && sel.mundiales !== '0' ? `<div class="hero-stat"><span class="hero-stat-lbl">Mundiales</span><span class="hero-stat-val">${sel.mundiales} 🏆</span></div>` : ''}
        </div>
      </div>
      <div class="hero-stripe"></div>
    </div>`;
}

/* ══════════════════════════════════════
   TABS DE POSICIÓN
══════════════════════════════════════ */
function renderTabs(id) {
  const sel = SELECCIONES[id];
  const wrap = document.getElementById('posTabs');
  wrap.innerHTML = '';
  if (!sel.jugadores.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';

  const btnAll = document.createElement('button');
  btnAll.className = 'pos-tab active';
  btnAll.dataset.pos = 'ALL';
  btnAll.innerHTML = `<span class="tab-chip" style="background:var(--negro)">ALL</span> Todos`;
  btnAll.onclick = () => scrollToPos(id, 'ALL', btnAll);
  wrap.appendChild(btnAll);

  PO.forEach(pos => {
    const cnt = sel.jugadores.filter(j => j.pos === pos).length;
    if (!cnt) return;
    const btn = document.createElement('button');
    btn.className = 'pos-tab';
    btn.dataset.pos = pos;
    btn.innerHTML = `<span class="tab-chip">${pos}</span> ${PL[pos]}s`;
    btn.onclick = () => scrollToPos(id, pos, btn);
    wrap.appendChild(btn);
  });
}

function scrollToPos(id, pos, btn) {
  document.querySelectorAll('.pos-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (pos === 'ALL') {
    document.getElementById('subContent').scrollIntoView({ behavior:'smooth', block:'start' });
  } else {
    const sec = document.getElementById(`sec-${id}-${pos}`);
    if (sec) sec.scrollIntoView({ behavior:'smooth', block:'start' });
  }
}

/* IntersectionObserver para actualizar el tab activo al scrollear */
let tabObserver = null;
function initTabObserver(id) {
  if (tabObserver) tabObserver.disconnect();
  const topH = (document.querySelector('.sub-topbar')?.offsetHeight    || 46) +
               (document.querySelector('.pos-tabs-wrap')?.offsetHeight  || 40) + 8;

  // Aplicar scroll-margin-top dinámico a cada sección
  PO.forEach(pos => {
    const sec = document.getElementById(`sec-${id}-${pos}`);
    if (sec) sec.style.scrollMarginTop = topH + 'px';
  });

  tabObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const pos = e.target.dataset.pos;
        document.querySelectorAll('.pos-tab').forEach(b => {
          b.classList.toggle('active', b.dataset.pos === pos);
        });
      }
    });
  }, { rootMargin: `-${topH}px 0px -60% 0px`, threshold: 0 });

  PO.forEach(pos => {
    const sec = document.getElementById(`sec-${id}-${pos}`);
    if (sec) { sec.dataset.pos = pos; tabObserver.observe(sec); }
  });
}

/* ══════════════════════════════════════
   RENDER SUBHOME
══════════════════════════════════════ */
function renderSubhome(id) {
  const sel = SELECCIONES[id];
  const p   = PALETAS[id] || { c1:'#444', c2:'#222' };
  const sc  = document.getElementById('subContent');
  sc.innerHTML = '';
  sc.classList.remove('animating');
  void sc.offsetWidth;
  sc.classList.add('animating');

  if (!sel.jugadores.length) {
    sc.insertAdjacentHTML('beforeend', `
      <div class="estado-vacio">
        <div class="icono">⚽</div>
        <h3>Plantel próximamente</h3>
        <p>La información de ${sel.nombre} estará disponible pronto en Olé.</p>
      </div>`);
    return;
  }

  const COLS = window.innerWidth >= 700 ? 4 : window.innerWidth >= 480 ? 3 : 2;

  PO.forEach(pos => {
    const grupo = sel.jugadores.filter(j => j.pos === pos);
    if (!grupo.length) return;
    const cls = PC[pos];

    const sec = document.createElement('div');
    sec.className = 'pos-section';
    sec.id = `sec-${id}-${pos}`;
    sec.innerHTML = `
      <div class="pos-title-bar ${cls}">
        <div class="pos-chip">${pos}</div>
        <span class="pos-label">${PL[pos]}s</span>
        <span class="pos-count-lbl">${grupo.length} jugadores</span>
      </div>`;

    // Detectar si ALGÚN jugador de este grupo tiene foto
    const hayFotos = grupo.some(j => j.foto);
    const colsActual = hayFotos ? COLS : 1; // compacto = 1 col (lista)

    const filas = [];
    for (let i = 0; i < grupo.length; i += colsActual) filas.push(grupo.slice(i, i + colsActual));
    let ci = 0;

    filas.forEach(fila => {
      const filaWrap = document.createElement('div');
      filaWrap.className = 'jugadores-grid' + (hayFotos ? ' con-foto' : '');

      const filaExpand = document.createElement('div');
      filaExpand.className = 'fila-expand';

      fila.forEach(j => {
        const uid  = `${id}-${j.numero}-${j.nombre.replace(/\s/g,'_')}`;
        const card = document.createElement('div');
        card.style.animationDelay = `${ci * 30}ms`;
        card.id = `c-${uid}`;
        ci++;

        if (j.foto) {
          // ── MODO FOTO (vertical) ──
          card.className = `jugador-card con-foto-card ${cls}`;
          const bioPreview = j.dato_extra
            ? j.dato_extra
            : (j.bio ? j.bio.substring(0, 80) + '…' : '');
          card.innerHTML = `
            <div class="card-stripe-top"></div>
            <div class="card-media"><img src="${j.foto}" alt="${j.nombre}" loading="lazy"></div>
            <div class="card-body">
              <div class="card-num-pos">Nº ${j.numero} · ${PL[j.pos]}</div>
              <div class="card-nombre">${j.nombre}</div>
              <div class="card-club">${j.club} · ${j.pais_club}</div>
              ${bioPreview ? `<div class="card-bio-preview">★ ${bioPreview}</div>` : ''}
              <div class="card-cta"><span>Leer biografía</span><span class="cta-arrow">▾</span></div>
            </div>`;
        } else {
          // ── MODO COMPACTO (horizontal) ──
          card.className = `jugador-card compacto ${cls}`;
          const datoLabel = j.dato_extra || '';
          const tieneBio = !!(j.bio || j.dato_extra);
          card.innerHTML = `
            <div class="card-stripe"></div>
            <div class="card-num-bubble">${j.numero}</div>
            <div class="card-body-compact">
              <div class="card-nombre-compact">${j.nombre}</div>
              <div class="card-club-compact">${j.club} · ${j.pais_club}</div>
              ${datoLabel ? `<div class="card-dato-compact">★ ${datoLabel}</div>` : ''}
              ${tieneBio ? `<div class="card-bio-cta">Leer biografía <span class="card-bio-cta-arrow">▾</span></div>` : ''}
            </div>`;
        }

        card.onclick = () => abrirExpand(card, filaExpand, j, cls, sel, p);
        filaWrap.appendChild(card);
      });

      sec.appendChild(filaWrap);
      sec.appendChild(filaExpand);
    });

    sc.appendChild(sec);
  });

  setTimeout(() => initTabObserver(id), 100);
}

/* ══════════════════════════════════════
   ABRIR EXPAND
══════════════════════════════════════ */
function abrirExpand(card, filaExpand, j, cls, sel, p) {
  const wasOpen = card.classList.contains('open');

  document.querySelectorAll('.jugador-card.open').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.fila-expand.open').forEach(e => { e.classList.remove('open'); e.innerHTML = ''; });

  if (!wasOpen) {
    card.classList.add('open');

    // Expand: con foto muestra imagen, sin foto muestra solo datos + bio
    const expandInnerHTML = j.foto
      ? `<div class="expand-inner">
           <div class="expand-foto"><img src="${j.foto}" alt="${j.nombre}" loading="lazy"></div>
           <div class="expand-info">
             <div class="expand-pos-badge ${cls}">${PL[j.pos]}</div>
             <div class="expand-nombre">${j.nombre}</div>
             <div class="expand-datos">
               ${j.nacimiento ? `<div class="expand-dato"><span class="lbl">Nacimiento</span><span class="val">${j.nacimiento}</span></div>` : ''}
               <div class="expand-dato"><span class="lbl">Club</span><span class="val">${j.club}</span></div>
               <div class="expand-dato"><span class="lbl">País</span><span class="val">${j.pais_club}</span></div>
             </div>
           </div>
         </div>`
      : `<div class="expand-info" style="padding:14px 14px 10px; border-bottom:1px solid #222;">
           <div class="expand-pos-badge ${cls}">${PL[j.pos]}</div>
           <div class="expand-nombre">${j.nombre}</div>
           <div class="expand-datos">
             ${j.nacimiento ? `<div class="expand-dato"><span class="lbl">Nacimiento</span><span class="val">${j.nacimiento}</span></div>` : ''}
             <div class="expand-dato"><span class="lbl">Club</span><span class="val">${j.club}</span></div>
             <div class="expand-dato"><span class="lbl">País del club</span><span class="val">${j.pais_club}</span></div>
           </div>
         </div>`;

    filaExpand.innerHTML = `
      ${expandInnerHTML}
      <div class="expand-bio-wrap">
        <div class="expand-bio-tit">Biografía</div>
        <div class="expand-bio">${j.bio || '<em style="color:#555">Biografía próximamente.</em>'}</div>
        ${j.dato_extra ? `<div class="expand-dato-extra">★ ${j.dato_extra}</div>` : ''}
      </div>
      <button class="expand-close" onclick="cerrarExpand()">▲ Cerrar</button>`;

    filaExpand.classList.add('open');

    setTimeout(() => {
      const topH = (document.querySelector('.sub-topbar')?.offsetHeight    || 46) +
                   (document.querySelector('.pos-tabs-wrap')?.offsetHeight  || 40) + 8;
      const top = filaExpand.getBoundingClientRect().top + window.scrollY - topH;
      window.scrollTo({ top, behavior:'smooth' });
    }, 60);
  }
}

function cerrarExpand() {
  document.querySelectorAll('.jugador-card.open').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.fila-expand.open').forEach(e => { e.classList.remove('open'); e.innerHTML = ''; });
}

init();
</script>
