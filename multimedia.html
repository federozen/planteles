  turquia: {
    nombre:'Turquía', flag:'🇹🇷', dt:'Vincenzo Montella', mundiales:'0', grupo:'D', subtitulo:'Ay-Yıldızlılar',
    jugadores:[
      { numero:1,  nombre:'Altay Bayindir',      pos:'GK',  nacimiento:'14 abr 1998', club:'Manchester United',    pais_club:'Inglaterra', foto:'', bio:'Bayindir empezó su carrera como delantero: "Crecí jugando en la calle y jugaba de delantero, pero después me ponía en el arco para proteger la ventaja después de marcar muchos goles porque era el más alto". Jugó en el Bursaspor y el Ankaragucu antes de cuatro años en el Fenerbahçe. En 2023 fichó por el Manchester United, pero el tiempo en cancha fue limitado. Primero estuvo detrás de André Onana, y luego fue reemplazado por Senne Lammens. Edwin van der Sar era uno de sus ídolos de infancia.', dato_extra:'Empezó su carrera de delantero — se puso de arquero para proteger ventajas' },
      { numero:12, nombre:'Mert Gunok',           pos:'GK',  nacimiento:'1 mar 1989',  club:'Besiktas',            pais_club:'Turquía',    foto:'', bio:'Su padre fue arquero y entrenador de arqueros, así que nunca hubo mucha duda sobre qué posición jugaría Mert Günok. Aun así, casi elige el básquet antes que el fútbol. Tiene 37 años y fue el titular indiscutido cuando Turquía llegó a los cuartos de final de la Eurocopa 2024. Su atajada con las puntas de los dedos contra Austria fue uno de los momentos clave: "Fue uno de los mejores momentos de mi vida. Tengo una foto de la atajada que voy a enmarcar y colgar en mi pared."', dato_extra:'La atajada contra Austria en la Euro 2024: "La enmarcaré y la pondré en mi pared"' },
      { numero:23, nombre:'Ugurcan Cakir',        pos:'GK',  nacimiento:'5 abr 1996',  club:'Galatasaray',         pais_club:'Turquía',    foto:'', bio:'Çakır tenía grandes guantes que llenar cuando llegó al Galatasaray en un acuerdo récord de 27,5 millones de euros en 2025, reemplazando al legendario Fernando Muslera, pero ha dado un paso adelante. Nacido en Antalya, empezó su carrera profesional en el Trabzonspor y acumuló casi 300 partidos antes de llegar al GS. El momento cumbre fue ganar la Süper Lig en 2021-22. "Ser parte de un equipo que ganó la liga por primera vez en 38 años, siendo capitán, fue muy especial. Nunca olvidaré esa sensación."', dato_extra:'"La bandera es mi motivación; la camiseta es mi armadura"' },
      { numero:22, nombre:'Muhammed Sengezer',    pos:'GK',  nacimiento:'5 ene 1997',  club:'Basaksehir',          pais_club:'Turquía',    foto:'', bio:'Un guardameta confiable que lleva en el Basaksehir desde 2019. Tuvo dos cesiones en el Adana Demirspor antes de consolidarse como el número 1 del Basaksehir. Acumula más de 100 partidos en la Süper Lig y, con 29 años, es uno de los porteros más respetados de la liga turca. Aún no había debutado en el equipo absoluto al comenzar este Mundial, pero tiene experiencia en torneos por haber sido llamado como reemplazo de emergencia en la Eurocopa 2024.', dato_extra:'Más de 100 partidos en la Süper Lig sin haber debutado aún en la selección mayor' },
      { numero:2,  nombre:'Mustafa Eskihellac',   pos:'DEF', nacimiento:'5 may 1997',  club:'Gaziantep FK',        pais_club:'Turquía',    foto:'', bio:'Un jugador que construyó su reputación por su generosidad durante la tragedia del terremoto de 2023, quedándose en el Gaziantep FK para ayudar a reconstruir la identidad del club, a pesar de haber perdido a un amigo muy cercano, Ahmet Eyup, que jugaba en el Yeni Malatyaspor. "Estoy listo para servir al equipo en cualquier posición que me dé el entrenador." Su versatilidad lo ha visto jugar como lateral izquierdo, extremo izquierdo y extremo derecho.', dato_extra:'Se quedó en Gaziantep tras el terremoto de 2023 para reconstruir el club' },
      { numero:4,  nombre:'Zeki Celik',           pos:'DEF', nacimiento:'17 feb 1997', club:'Roma',                pais_club:'Italia',     foto:'', bio:'El menor de nueve hermanos, creció en Bursa pero ha pasado la mayor parte de su carrera profesional en la Ligue 1 y la Serie A. Es un fanático confeso del fútbol que una vez admitió que pasó 45 días consecutivos durante el confinamiento de 2020 jugando videojuegos de fútbol para mantener su agudeza táctica. "Me duermo pensando en fútbol y me despierto pensando en fútbol." Sobre Mourinho, con quien coincidió en la Roma, dijo: "Visto desde afuera da la impresión de ser un personaje… y básicamente lo es. Pero desde adentro es alguien que trata muy bien a los jugadores."', dato_extra:'Pasó 45 días seguidos jugando videojuegos de fútbol durante el confinamiento' },
      { numero:3,  nombre:'Mert Muldur',          pos:'DEF', nacimiento:'3 abr 1999',  club:'Fenerbahce',          pais_club:'Turquía',    foto:'', bio:'Nacido en Viena de padres turcos, se abrió paso por las categorías del Rapid Vienna antes de debutar en el primer equipo a los 19 años. Empezó como delantero, pero un día su entrenador de sub-14 reubicó a todos los jugadores en un entrenamiento y Müldür acabó de central. Sobresalió y nunca miró atrás. Habla cinco idiomas: turco y alemán en casa, inglés en la escuela, y bosnio y serbio para comunicarse con su pareja. Antes del partido de Turquía contra Austria en la Euro 2024 dijo: "Crecí en Austria. Fui a la escuela en Austria. Aprendí a jugar al fútbol allí. Pero en Turquía pasé por las sub-17, sub-19 y luego la selección absoluta. No había otra opción."', dato_extra:'Habla cinco idiomas — empezó como delantero y se convirtió en defensa' },
      { numero:19, nombre:'Eren Elmali',          pos:'DEF', nacimiento:'7 jul 2000',  club:'Galatasaray',         pais_club:'Turquía',    foto:'', bio:'La vida sonreía a Elmali en 2025: en febrero había fichado por el Galatasaray y en mayo ya tenía su primera medalla de campeón de la Süper Lig. En noviembre, sin embargo, su mundo se derrumbó cuando fue suspendido 45 días por la federación turca tras una investigación sobre apuestas ilegales en el fútbol. Fue excluido de la selección. Explicó que había apostado cinco años atrás en un partido que no involucraba a su equipo. "No sabía que llegaría a ser este tipo de futbolista entonces." Y añadió: "Mi hermano me dijo que estaba prohibido para un profesional; salvó mi carrera antes de que realmente empezara."', dato_extra:'Su hermano le salvó la carrera advirtiéndole que las apuestas estaban prohibidas' },
      { numero:17, nombre:'Ferdi Kadioglu',       pos:'DEF', nacimiento:'7 oct 1999',  club:'Brighton',            pais_club:'Inglaterra', foto:'', bio:'Uno de los jugadores de la temporada del Brighton, Kadioglu ha sobresalido en la Premier League tras su llegada desde el Fenerbahçe en 2024. Su entrenador, Fabian Hürzeler, lo describió recientemente como el "futbolista total definitivo", señalando que "su comprensión del juego es tan de élite que hace que cada cambio táctico parezca fluido". Nacido en Arnhem de padre turco y madre holandés-canadiense, podía haber representado a cualquiera de los tres países. Se convirtió en el jugador más joven en debutar con el NEC Nijmegen en la Eredivisie con 16 años y 326 días.', dato_extra:'Podía jugar por Turquía, Países Bajos o Canadá — eligió Turquía' },
      { numero:5,  nombre:'Abdulkerim Bardakci',  pos:'DEF', nacimiento:'7 sep 1994',  club:'Galatasaray',         pais_club:'Turquía',    foto:'', bio:'Un tardío que se ha convertido en el pilar de la defensa turca. Es difícil creer que pasó años en el ostracismo futbolístico antes de su ascenso. Después de muchos años yendo de club en club, el Galatasaray apostó por él en 2022 y no lo ha lamentado. Ahora es el vicecapitán del club: dominante en el juego aéreo y sorprendentemente hábil con el balón para un jugador de su envergadura. "No hay nada que no podamos lograr con este equipo. Nos hemos vuelto como una familia."', dato_extra:'De pasar años en el ostracismo a vicecapitán del Galatasaray' },
      { numero:6,  nombre:'Merih Demiral',        pos:'DEF', nacimiento:'5 mar 1998',  club:'Al-Ahli',             pais_club:'Arabia S.',  foto:'', bio:'Demiral ha recuperado su forma y confianza tras un período difícil que incluyó una rotura de ligamentos en la Juventus en enero de 2020. El defensor de 1,90 m es un líder natural: el tipo de central que celebra un tackle deslizante como si hubiera marcado el gol más importante de su vida. Supone además una amenaza en los balones parados y marcó los dos goles en el cuarto de final de la Eurocopa 2024 contra Austria, el primero a los 57 segundos. También protagonizó controversias por celebraciones con el "saludo militar" y el "saludo del lobo", que le valieron una suspensión de dos partidos de la UEFA y la convocatoria del embajador turco en Berlín.', dato_extra:'Dos goles contra Austria en la Euro 2024 — el primero a los 57 segundos' },
      { numero:15, nombre:'Kaan Ayhan',           pos:'DEF', nacimiento:'10 nov 1994', club:'Galatasaray',         pais_club:'Turquía',    foto:'', bio:'Ayhan puede jugar de central, lateral derecho o mediocampista defensivo, y su versatilidad es una de las principales razones por las que está en el plantel. Es famoso por su estrecha relación con su familia y cuando fichó por el Galatasaray en 2023 admitió que sigue consultando a su padre en casi cada movimiento importante de su carrera. "Mi padre siempre ha sido mi crítico más honesto." Montella dijo en una ocasión que "entiende el juego mejor que la mayoría de los entrenadores".', dato_extra:'Consulta a su padre antes de cada decisión importante de carrera' },
      { numero:21, nombre:'Ahmetcan Kaplan',      pos:'DEF', nacimiento:'16 ene 2003', club:'Ajax',                pais_club:'P. Bajos',   foto:'', bio:'Un defensor tranquilo y sereno que sobresale al romper líneas con sus pases. Surgido de la cantera del Trabzonspor, el Ajax lo fichó por 9,5 millones de euros en 2022. Tras sufrir varias lesiones, tardó 18 meses en debutar en el primer equipo y nunca llegó a consolidarse como titular. Dato curioso: Kaplan era un talentoso bailarín tradicional de la danza Horon en su juventud en Trabzon.', dato_extra:'Era un talentoso bailarín de la danza tradicional Horon en su juventud' },
      { numero:13, nombre:'Ozan Kabak',           pos:'DEF', nacimiento:'25 mar 2000', club:'Hoffenheim',          pais_club:'Alemania',   foto:'', bio:'"He aprendido algo de cada liga en la que he jugado", dice Kabak. Ha jugado en Alemania (Stuttgart), la Premier League (Liverpool en préstamo), el Championship (Norwich) y ahora el Hoffenheim. Bajo Klopp, a pesar de llegar en medio de una crisis de lesiones, se convirtió en favorito de los aficionados que hasta le compusieron una canción al ritmo del Tetris: "Es Ozan. Es Ozan. Es Ozan Kabak. Juega de central. Juega de central para el Liverpool." Habla cuatro idiomas y ha actuado como traductor no oficial del equipo.', dato_extra:'Los hinchas del Liverpool le dedicaron una canción al ritmo del Tetris' },
      { numero:14, nombre:'Caglar Soyuncu',       pos:'DEF', nacimiento:'23 may 1996', club:'Fenerbahce',          pais_club:'Turquía',    foto:'', bio:'Hace no mucho, el hombre con el mentón más reconocible del fútbol —y un corte de cabello igual de distintivo— era un titular indiscutido en el corazón de la defensa turca, pero hoy Montella raramente lo convoca. Estuvo en la cima de su carrera en el Leicester entre 2018 y 2023, ganando la FA Cup. En 2022 le contó al Times sobre cómo dejó su casa a los 11 años para internarse y jugar en el Bucaspor: "Dejar el hogar a los 11 fue muy doloroso. Las luces se apagaban a las 9pm. Éramos como huérfanos."', dato_extra:'Dejó su casa a los 11 años para internarse en una academia — "éramos como huérfanos"' },
      { numero:16, nombre:'Samet Akaydin',        pos:'DEF', nacimiento:'13 mar 1994', club:'Caykur Rizespor',     pais_club:'Turquía',    foto:'', bio:'Su ascenso fue tan improbable que, cuando finalmente llegó a lo grande con el Adana Demirspor, admitió que había guardado sus camisetas de las ligas inferiores como recordatorio de la lucha. "Nunca olvido de dónde vine; esos campos en la tercera división me hicieron el defensa que soy hoy." Con 32 años, actualmente está en el Çaykur Rizespor tras temporadas en el Panathinaikos y el Fenerbahçe. Sigue siendo una figura polarizante entre los aficionados por sus ocasionales errores de concentración, pero Montella lo convoca regularmente.', dato_extra:'Guardó sus camisetas de la tercera división como recordatorio de la lucha' },
      { numero:8,  nombre:'Atakan Karazor',       pos:'MID', nacimiento:'13 oct 1996', club:'Stuttgart',           pais_club:'Alemania',   foto:'', bio:'Un tardío que pasó años en el limbo internacional, el capitán del Stuttgart finalmente se comprometió con Turquía a finales de 2024. No proporciona la magia en el campo; proporciona la red de seguridad que permite que la magia suceda. Nacido en Essen, pasó por el Essen, el Bochum, la reserva del Borussia Dortmund y el Holstein Kiel antes de aterrizar en el Stuttgart en 2019, cuando estaban en la segunda división. Siete años después es el orgulloso capitán del club y campeón de la Copa de Alemania. "No podría haber imaginado este desarrollo cuando me uní. Al principio, solo quieres establecerte en el equipo. Con los años me convertí en líder. Ser capitán me llena de orgullo."', dato_extra:'Tardío que pasó del Stuttgart en segunda división a capitán y campeón de Copa' },
      { numero:10, nombre:'Orkun Kokcu',          pos:'MID', nacimiento:'29 dic 2000', club:'Besiktas',            pais_club:'Turquía',    foto:'', bio:'Kökçü dio el sorpresivo paso del Benfica al Besiktas este verano, diciendo: "Por fin juego para el equipo de los sueños de mi infancia." Y ha brillado en Estambul. El dinamo del mediocampo es uno de los héroes anónimos de su equipo: mucho de lo que aporta pasa desapercibido, pero trabaja mucho y mantiene el ritmo. Como Kadioglu, nació en los Países Bajos. Las cosas no salieron bien en el Benfica, y todo llegó a un punto crítico con un tremendo enfrentamiento con el entrenador Bruno Lage en el Mundial de Clubes 2025, cuando Lage lo sustituyó ganando 2-0 y terminó mandándole callar.', dato_extra:'Fichó por el Besiktas: "Por fin juego para el equipo de los sueños de mi infancia"' },
      { numero:20, nombre:'Hakan Calhanoglu',     pos:'MID', nacimiento:'8 feb 1994',  club:'Inter',               pais_club:'Italia',     foto:'', bio:'Nunca reticente a la autoadulación, Çalhanoğlu se describe a sí mismo como "el mejor mediocampista de posición en el mundo ahora mismo". En su lista, Rodri era segundo y Toni Kroos tercero. "Puede que esté más lejos del área ahora, pero tengo un mayor control del juego." Fue instrumental cuando el Inter llegó a la final de la Champions League en 2025. Aunque nunca ha replicado del todo su forma de club en la selección, el hecho de que los focos estén en Güler y Yıldız este verano podría tener un efecto liberador.', dato_extra:'Se proclamó "el mejor mediocampista de posición del mundo" — con Rodri de segundo' },
      { numero:18, nombre:'Can Uzun',             pos:'MID', nacimiento:'11 nov 2005', club:'Eintracht Frankfurt', pais_club:'Alemania',   foto:'', bio:'Otro miembro de la generación dorada del 2005, Uzun tiene el potencial de unirse a Güler y Yıldız como otra auténtica estrella de este equipo. En 2025-26 mostró destellos de su talento, aunque la campaña también estuvo limitada por lesiones. Nacido en Regensburg, la federación alemana estaba ansiosa por convencerle de jugar para la Nationalmannschaft, pero Uzun optó por representar a Turquía. "Escuché a mi corazón", dijo. Montella es un gran admirador: "Nuestra fe en su potencial es inmensa." Un atacante sedoso y versátil que puede jugar como falso nueve o mediapunta clásico.', dato_extra:'Alemania lo quería, eligió Turquía: "Escuché a mi corazón"' },
      { numero:7,  nombre:'Ismail Yuksek',        pos:'MID', nacimiento:'26 ene 1999', club:'Fenerbahce',          pais_club:'Turquía',    foto:'', bio:'Hace no mucho, Yüksek jugaba al fútbol semiprofesional en la tercera división turca. "Me aseguraré de que los jugadores más talentosos no tengan que preocuparse por el balón." Es feliz haciendo el trabajo sucio para que sus compañeros más técnicos tengan más tiempo y espacio. Fichó por el Fenerbahçe en 2020, pero tuvo que ir a varios préstamos antes de establecerse. El sueño de su vida sería un contrato en Europa, y específicamente mencionó al Manchester United: "Ese club es el sueño de mi infancia."', dato_extra:'Pasó de la tercera división turca a la Süper Lig — sueña con el Manchester United' },
      { numero:11, nombre:'Salih Ozcan',          pos:'MID', nacimiento:'11 ene 1998', club:'Borussia Dortmund',   pais_club:'Alemania',   foto:'', bio:'Un detalle curioso: Özcan es un luchador amateur muy hábil, lo cual encaja con su estilo de juego. Un mediocampista disciplinado y combativo con años de experiencia en la Bundesliga, creció en Colonia y representó a Alemania en categorías juveniles antes de cambiar a Turquía, impulsado por el deseo de representar su herencia. Es conocido por su profesionalismo: suele ser el primero en llegar al entrenamiento y el último en irse. Apodado "El limpiador" en Alemania, hizo casi 130 apariciones con el Colonia antes del salto al Dortmund en 2025.', dato_extra:'Luchador amateur apodado "El limpiador" — fue el primero en el Dortmund en llegar y el último en irse' },
      { numero:9,  nombre:'Irfan Can Kahveci',    pos:'MID', nacimiento:'15 jul 1995', club:'Fenerbahce',          pais_club:'Turquía',    foto:'', bio:'Para salvar sus opciones mundialistas, Kahveci se fue cedido al Kasımpaşa en enero, donde recuperó su forma. A pesar de su temperamento fogoso, sigue siendo un jugador técnicamente dotado y, escuchen esto, es uno de los solo tres jugadores en la historia —junto a Ronaldo R9 y Gareth Bale— en marcar un hat-trick en la Champions League y aun así perder el partido. Celebra sus goles con un gesto de "tomar café" y su apellido significa literalmente "cafetero". En noviembre fue excluido del Fenerbahçe junto a Cenk Tosun.', dato_extra:'Uno de solo 3 jugadores en la historia con hat-trick en Champions y perder el partido — junto a R9 y Bale' },
      { numero:24, nombre:'Arda Guler',           pos:'FWD', nacimiento:'25 feb 2005', club:'Real Madrid',         pais_club:'España',     foto:'', bio:'"La última vez que fuimos al Mundial, yo ni siquiera existía", dijo Güler tras la clasificación de Turquía para el torneo por primera vez desde 2002. Y el hombre del Real Madrid es la cara indiscutible de esta selección. "Estamos hablando de un talento de élite mundial indiscutible", lo describió Thierry Henry recientemente. El mediocampista de 21 años puede tener cara de bebé, pero no es un jugador de lujo. Estuvo involucrado en un asombroso 44% de los goles de Turquía en los partidos que jugó durante la clasificación. En la Champions, marcó un golazo de larga distancia en el primer minuto ante el Bayern antes de ser expulsado en el tiempo añadido por protestar.', dato_extra:'Involucrado en el 44% de los goles de Turquía en la clasificación' },
      { numero:25, nombre:'Deniz Gul',            pos:'FWD', nacimiento:'2 jul 2004',  club:'Porto',               pais_club:'Portugal',   foto:'', bio:'Nacido en Estocolmo y formado en el Hammarby, Gul fue habitual en las categorías juveniles de Suecia hasta que una llamada telefónica de Vincenzo Montella a altas horas de la noche a finales de 2024 cambió su rumbo. Es un número 9 moderno y móvil de 1,90 m que sobre el papel es exactamente lo que la selección echaba en falta en ataque. Desde su llegada al Porto por apenas 4,5 millones de euros, su desarrollo se ha acelerado. "Seguí a mi corazón; representar a Turquía es un sueño para mi familia."', dato_extra:'Una llamada de Montella a medianoche cambió su vida — eligió Turquía sobre Suecia' },
      { numero:22, nombre:'Enes Unal',            pos:'FWD', nacimiento:'10 may 1997', club:'Bournemouth',         pais_club:'Inglaterra', foto:'', bio:'El talentoso delantero ha pasado gran parte de la temporada en el banquillo del Bournemouth, regresando de una lesión de ligamentos. Su carrera ha pasado por el Manchester City, Villarreal, Twente, Getafe y el Bournemouth. Ünal reveló en el sitio oficial del Manchester City en 2016 que es un gran lector: "Cuando no entreno, me gusta estar en casa leyendo e investigando sobre el mundo y sobre la vida. Luego, cuando tengo días libres, hago viajes. Realmente quiero ver todo el mundo."', dato_extra:'Bookworm confeso: "Leo para ser mejor persona"' },
      { numero:11, nombre:'Yunus Akgun',          pos:'FWD', nacimiento:'7 jul 2000',  club:'Galatasaray',         pais_club:'Turquía',    foto:'', bio:'Un extremo incansable con una velocidad electrizante. Es uno de los favoritos de Montella desde que coincidieron en el Adana Demirspor. No es titular indiscutido, pero es un jugador en quien Montella confía. Tuvo 26 participaciones en goles en 2024-25. Cuando estuvo cedido en el Leicester, su entrenador Enzo Maresca dijo: "Yüksek tiene dificultades con el ritmo porque en Turquía el ritmo es algo más bajo. Aquí es más rápido y más físico. Me gusta Yunus, pero necesita adaptarse."', dato_extra:'26 participaciones en goles en 2024-25 con el Galatasaray' },
      { numero:10, nombre:'Kenan Yildiz',         pos:'FWD', nacimiento:'4 may 2005',  club:'Juventus',            pais_club:'Italia',     foto:'', bio:'Todos los ojos estarán puestos en Güler, pero Yıldız podría terminar robando el espectáculo este verano. Alessandro Del Piero, cuya icónica celebración con la lengua afuera ha adoptado Yıldız, ha elogiado al jugador: "Tiene una personalidad que desafía su edad. Cuando lo veo jugar, me veo un poco a mí mismo, pero tiene su propia magia única." Nacido en Alemania de padre turco y madre alemana, marcó en su debut con Turquía contra Alemania en Berlín en un triunfo 3-2. "Mi papá estaba allí, lo que significó mucho. Mi mamá no pudo venir porque tenemos un perro pequeño y tuvo que quedarse en casa."', dato_extra:'Su madre no fue a su debut porque tenía que cuidar al perro — su padre estaba en el estadio' },
      { numero:7,  nombre:'Kerem Akturkoglu',     pos:'FWD', nacimiento:'21 oct 1998', club:'Fenerbahce',          pais_club:'Turquía',    foto:'', bio:'Conocido por los aficionados como "Harry Potter" por su celebración de gol con una varita mágica imaginaria, Aktürkoğlu es uno de los pocos futbolistas que ha jugado para el Galatasaray y el Fenerbahçe. "Quiero demostrar al mundo que los jugadores turcos tienen magia en los pies." Ha jugado de delantero centro para Turquía a pesar de ser un extremo tradicional, porque Montella ha carecido de opciones en esa posición por lesiones.', dato_extra:'Ha jugado para el Galatasaray y el Fenerbahçe — uno de los muy pocos que lo logró' },
      { numero:14, nombre:'Oguz Aydin',           pos:'FWD', nacimiento:'27 oct 2000', club:'Fenerbahce',          pais_club:'Turquía',    foto:'', bio:'El extremo es uno de varios jugadores del plantel nacidos en los Países Bajos, junto a Kadioglu y Kökçü. Tras un productivo paso por el Alanyaspor, se ganó un fichaje en el Fenerbahçe en 2024. Su desarrollo dio otro paso al jugar bajo José Mourinho. "Mourinho siempre me decía que fuera \'paso a paso\'." Directo, ambidiestro y sin ego, Aydın es un jugador de plantel confiable que Montella puede llamar cuando lo necesita.', dato_extra:'Nacido en Países Bajos, fue un hijo futbolístico de Mourinho en el Fenerbahçe' },
      { numero:17, nombre:'Baris Alper Yilmaz',  pos:'FWD', nacimiento:'23 may 2000', club:'Galatasaray',         pais_club:'Turquía',    foto:'', bio:'Le llaman "El Tanque" y trabaja incansablemente por la banda. Es fuerte, rápido y hábil para ser un jugador tan físico. Atribuye su poder bruto a sus raíces en Rize y al oficio de su padre. "Mi padre era carnicero. Crecí comiendo mucha carne por él; y creo que ahí viene mi fuerza." Puede carecer de la finura de algunos de los jugadores más técnicos del equipo, lo que en ocasiones frustra a los aficionados, pero cuando está en su mejor versión es prácticamente imposible de parar.', dato_extra:'"Mi padre era carnicero. Crecí comiendo mucha carne — de ahí viene mi fuerza"' },
      { numero:19, nombre:'Semih Kilicsoy',       pos:'FWD', nacimiento:'15 ago 2005', club:'Cagliari',            pais_club:'Italia',     foto:'', bio:'El joven delantero es un jugador de la vieja escuela, construido con un físico poderoso que supone una amenaza en el área. Tras una temporada de revelación en el Beşiktaş, se marchó cedido al Cagliari en 2025. Su nombre, Kılıçsöy, significa "descendiente de una espada". Le contó al Corriere dello Sport: "Mi padre Şenol y mi madre Aysel siempre siguieron el fútbol. En Turquía, la gente vive para el fútbol. Mi familia es mi fuente de inspiración. Viven en Estambul y siempre me siento cerca de ellos. Y echo de menos todo lo que cocinaba mi madre."', dato_extra:'Su apellido significa "descendiente de una espada"' },
    ]
  },

  /* ═══ GRUPO E ═══ */
  alemania: {
    nombre:'Alemania', flag:'🇩🇪', dt:'Julian Nagelsmann', mundiales:'4', grupo:'E', subtitulo:'Die Mannschaft',
    jugadores:[
      { numero:1,  nombre:'Oliver Baumann',      pos:'GK',  nacimiento:'2 jun 1990',   club:'Hoffenheim',          pais_club:'Alemania',   foto:'', bio:'El nuevo número 1 de Alemania es mejor conocido por ser, relativamente, desconocido, a pesar de haber acumulado más de 500 apariciones en la Bundesliga. Esto se debe en parte a que jugó la mayoría de esos partidos en el Hoffenheim, pero también porque estuvo como suplente durante aproximadamente 18 meses, tomando el lugar del propenso a lesiones Marc-André ter Stegen. Baumann es fiable, lo que demostró durante la a veces difícil campaña clasificatoria de Alemania. Es diferente de muchos de sus predecesores, que tenían grandes personalidades, como Toni Schumacher, Oliver Kahn y el "Loco" Jens Lehmann. "No soy de grandes discursos", dice. "Creo que mis acciones en el campo deben hablar por sí solas."', dato_extra:'"No soy de grandes discursos. Mis acciones hablan por mí"' },
      { numero:12, nombre:'Alexander Nübel',      pos:'GK',  nacimiento:'30 sep 1996',  club:'Stuttgart',           pais_club:'Alemania',   foto:'', bio:'Nübel lleva seis años en el Bayern Munich, habiendo fichado para estar listo cuando Manuel Neuer se retirara. Y desde entonces ha esperado, y esperado, y esperado. Ha habido cesiones, al Mónaco y a largo plazo al Stuttgart, pero es discutible si alguna vez será el número 1 del Bayern. Nübel es sobresaliente en los mano a mano y en los disparos de cerca, pero a veces tiene dificultades con los esfuerzos desde más lejos. Por eso Nagelsmann hizo de Baumann su número 1, con quizás menos altibajos. Nagelsmann ha elogiado a Nübel por apoyar a Baumann. En otras palabras: un buen portero suplente.', dato_extra:'Seis años esperando ser el titular del Bayern Munich' },
      { numero:22, nombre:'Jonas Urbig',          pos:'GK',  nacimiento:'8 ago 2003',   club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'En enero de 2025 Urbig pasó del banquillo del Colonia al banquillo del Bayern —seguramente más cálido—. "El FC Colonia es mi club de casa. Crecí en el Geissbockheim, así que no es una despedida fácil", dijo Urbig, considerado el mayor talento alemán bajo los palos. El Bayern habría pagado 7 millones de euros por él y espera que tenga lo necesario para ser el nuevo Manuel Neuer. Su capacidad de salto es impresionante, no se deja empujar en los córneres y sus pases son casi tan precisos como los de Neuer. "Tiene todo lo necesario", dijo el coordinador de porteros del DFB.', dato_extra:'El Bayern pagó 7M€ esperando que sea el nuevo Neuer' },
      { numero:1,  nombre:'Manuel Neuer',         pos:'GK',  nacimiento:'27 mar 1986',  club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'El debate sobre su regreso parecía terminado. Pero luego, a principios de abril, en la ida de los cuartos de final de la Champions League en Madrid, el Neuer de 40 años fue el mejor del partido, asegurando la victoria de su equipo por 2-1. Como en los viejos tiempos. A pesar de un error temprano en el partido de vuelta, nadie discute que Neuer es mejor portero que Oliver Baumann, que pronto tendrá 36 años. Eso llevó a los aficionados alemanes a preguntarse: "¿Somos el único país que deja en casa a su mejor número 1?" Al fin y al cabo, Ronaldo, Modrić y Messi siguen jugando. Y entonces llegó la decisión: Neuer estaba de vuelta.', dato_extra:'40 años y sigue siendo el mejor portero de Alemania' },
      { numero:4,  nombre:'Jonathan Tah',         pos:'DEF', nacimiento:'11 feb 1996',  club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'Líder defensivo en el Bayern y líder defensivo de la selección nacional. Por fin. A los 19 años, Tah fue nombrado el mejor joven futbolista de Alemania pero, con el paso del tiempo, muchos abandonaron la idea de que este enorme talento defensivo llegaría a ser un internacional importante. "Hubo lesiones, bajones de forma, momentos difíciles. La gente esperaba que asumiera responsabilidades pronto. Quizás me puse demasiada presión", le contó a Die Zeit hace dos años. Bajo Xabi Alonso en el Leverkusen, sin embargo, Tah se convirtió en el mejor central de la Bundesliga: fuerte en los duelos, bueno en el juego aéreo, difícil de superar en el regate y con pocos errores. Alonso puede haber salvado, de hecho, la carrera de Tah.', dato_extra:'Xabi Alonso salvó su carrera en el Leverkusen' },
      { numero:5,  nombre:'Nico Schlotterbeck',   pos:'DEF', nacimiento:'1 dic 1999',   club:'Borussia Dortmund',   pais_club:'Alemania',   foto:'', bio:'El tipo de defensa que muchos aficionados al fútbol alemán aman: siempre se lanza de lleno a los desafíos, es fuerte en el juego aéreo, le encanta el tackle deslizante y celebra después de ganar los duelos. Jugar contra Schlotterbeck duele. También marca goles de vez en cuando, tras lo cual muestra al público sus impresionantes bíceps. A veces puede trabajarse hasta la exaltación y entonces no siempre está bajo control, convirtiéndose en un riesgo de seguridad en su propia área. Quizás le ayudaría aprender del libro de Fabio Cannavaro sobre la defensa inteligente; el italiano era su modelo a seguir. El único zurdo entre los centrales de Alemania, está en el once inicial precisamente por eso.', dato_extra:'El único zurdo entre los centrales alemanes' },
      { numero:2,  nombre:'Antonio Rüdiger',      pos:'DEF', nacimiento:'3 mar 1993',   club:'Real Madrid',         pais_club:'España',     foto:'', bio:'El internacional alemán más criticado en la actualidad. Nagelsmann ha admitido que Rüdiger es una figura polarizante. Eso tiene poco que ver con sus actuaciones y mucho más con su comportamiento en ciertos casos. Hubo el gesto de cortar el cuello hacia los aficionados del Atlético de Madrid, por el que fue multado, y la rabieta tras la final de la Copa del Rey 2025 contra el Barcelona cuando intentó lanzar hielo al árbitro. Fue suspendido seis partidos. Notablemente, en más de 80 partidos con Alemania nunca ha sido expulsado. Tah y Schlotterbeck están por delante de él en el orden de preferencia para el Mundial.', dato_extra:'Más de 80 partidos con Alemania sin ser expulsado' },
      { numero:3,  nombre:'Waldemar Anton',       pos:'DEF', nacimiento:'20 jul 1996',  club:'Borussia Dortmund',   pais_club:'Alemania',   foto:'', bio:'"La torre defensiva", como se le conoce en los medios alemanes, es muy popular, salvo en la región metropolitana de Stuttgart. Los aficionados del VfB no le han perdonado que se fuera al Dortmund tras la Eurocopa 2024, aunque acababa de renovar su contrato en el Stuttgart poco antes. "En principio no tenía intención de cambiar de club, pero luego llegó el Borussia Dortmund. Un club de primera categoría que acababa de llegar a la final de la Champions League", explicó. Juega de forma sólida, sin espectacularidad, y casi siempre bien. Nació en Uzbekistán como Wladimir Anton pero cuando sus padres se mudaron a Alemania en 1998, su nombre de pila cambió a Waldemar. Apodo: Wowa.', dato_extra:'Nació en Uzbekistán como Wladimir — sus amigos le dicen Wowa' },
      { numero:19, nombre:'David Raum',           pos:'DEF', nacimiento:'22 abr 1998',  club:'RB Leipzig',          pais_club:'Alemania',   foto:'', bio:'Raum ostenta con certeza un título: el del internacional alemán con más tatuajes. En su pecho se lee "Living the dream", porque puede ser futbolista profesional. En un momento casi abandonó ese sueño: como no siempre jugaba en el Greuther Fürth, pensó: "OK, quizás el fútbol no va a funcionar para mí". Pero su carrera despegó al fichar por el Hoffenheim en 2021, y el RB Leipzig pagó 26 millones de euros por él un año después. Jugó todos los partidos de Alemania en el Mundial de Qatar, luego perdió su puesto, luego lo recuperó. Después de su carrera, no quiere saber nada del fútbol. En su lugar, podría imaginarse trabajando como DJ.', dato_extra:'Después del fútbol, quiere ser DJ' },
      { numero:6,  nombre:'Joshua Kimmich',       pos:'DEF', nacimiento:'8 feb 1995',   club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'Es una pena que no haya dos Joshua Kimmichs: uno para el centro del campo, otro para la defensa. Así se evitaría el interminable debate sobre qué posición le viene mejor. Para el entrenador del Bayern, Vincent Kompany, es el primer centrocampista defensivo. Bajo Nagelsmann fue primero lateral derecho, luego volvió brevemente al centro del campo, y ahora debe hacer de todo a la vez como mediapunta defensivo. Recientemente superó a Jürgen Kohler y entró en el top 10 de jugadores alemanes con más apariciones. Con el Bayern ha ganado la Champions League y 10 títulos de Bundesliga, pero nada todavía con la selección. Es el capitán, principal motivador y defensor del "camiseta bien metida".', dato_extra:'10 Bundesligas con Bayern, pero nada aún con la selección' },
      { numero:23, nombre:'Nathaniel Brown',      pos:'DEF', nacimiento:'16 jun 2003',  club:'Eintracht Frankfurt', pais_club:'Alemania',   foto:'', bio:'"Ya se sitúa entre los mejores laterales de Europa", dijo el director deportivo del Frankfurt en abril. Puede ser algo exagerado, pero es cierto que Brown ha tenido una temporada muy, muy buena para un Eintracht que en general ha decepcionado. Brown es muy rápido, fuerte en el regate, una amenaza de gol y —no del todo sin importancia para un defensor— muy difícil de superar. Con padre americano podría haber jugado para EE.UU., pero tras hacer su debut internacional en 2025, parece que Alemania ha encontrado una futura solución para la problemática posición de lateral izquierdo. "Espero muchísimo de él", dice Nagelsmann.', dato_extra:'Con padre americano, eligió Alemania sobre EE.UU.' },
      { numero:15, nombre:'Malick Thiaw',         pos:'DEF', nacimiento:'8 ago 2001',   club:'Newcastle',           pais_club:'Inglaterra', foto:'', bio:'Thiaw puede hacer algo que casi con toda seguridad ningún otro internacional alemán puede: hablar finlandés. Su madre es finlandesa y su padre proviene de Senegal. Fue su padre quien le enseñó: "Debemos ser agradecidos por todo lo que tenemos". Se fue al Milan con 21 años y allí —sin sorpresa— desarrolló un interés por la moda. El Newcastle pagó 35 millones de euros por él el año pasado y se estableció de inmediato como titular. Un líder tranquilo. Su entrenador Eddie Howe lo describe como "muy, muy tranquilo, bastante callado, pero muy, muy concentrado." Según su compañero Nick Woltemade, no sabe cabecear, pero anotó dos goles de cabeza en un mismo partido de Premier League esta temporada.', dato_extra:'Habla finlandés — su madre es de Finlandia' },
      { numero:8,  nombre:'Leon Goretzka',        pos:'MID', nacimiento:'6 feb 1995',   club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'El mediocampista del Bayern de 31 años tiene posiblemente la relación más turbulenta de amor y odio con Julian Nagelsmann en el fútbol alemán. En Munich formaron un dúo de peso y, aunque el técnico lo seleccionó inicialmente para la selección, lo sorprendió dejándolo fuera de la Eurocopa 2024 con el omnipotente Toni Kroos regresando al equipo. Luego hubo conversaciones de paz. "Una discusión era necesaria; fue la base para una mayor cooperación", le contó Goretzka a Die Zeit. Goretzka ya no es titular en el Bayern y está listo para dejar el club al final de la temporada, así que para lograr algo con Alemania en el verano necesita redescubrir su verdadera fortaleza: marcar goles.', dato_extra:'La relación más tormentosa del fútbol alemán con Nagelsmann' },
      { numero:28, nombre:'Aleksandar Pavlovic',  pos:'MID', nacimiento:'3 may 2004',   club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'Hijo de madre alemana y padre serbio, es oriundo de Munich y lleva vistiendo la camiseta del Bayern desde los siete años. Desde que Thomas Tuchel lo promovió al primer equipo hace tres años, ha sido parte del once inicial del Bayern. Hoy también es titular en la selección. Su modelo a seguir es Sergio Busquets. "Busquets era muy fuerte con y sin el balón. Siempre estaba disponible para un pase y siempre tenía un ojo puesto en sus alrededores. Además era muy sólido en defensa y cubría mucho terreno." También admira a Rodri. Pavlovic claramente se ve a sí mismo como un número 6, pero para convertirse en un jugador de clase mundial en esa posición necesita mejorar defensivamente.', dato_extra:'Viste la camiseta del Bayern desde los 7 años' },
      { numero:10, nombre:'Florian Wirtz',        pos:'MID', nacimiento:'3 may 2003',   club:'Liverpool',           pais_club:'Inglaterra', foto:'', bio:'En Alemania, Wirtz es conocido como el jugador que hizo posible el milagroso doblete de liga y copa del Bayer Leverkusen en 2024, poniendo fin a la larga hegemonía del Bayern Munich. Ha brillado también con Alemania, incluyendo una actuación sensacional en la victoria 4-3 contra Suiza en marzo, pero su gran consagración aún está por llegar. Tuvo una primera temporada de altibajos en el Anfield tras su fichaje de 100 millones de libras el pasado verano. Cuando su ranking de platos de patatas en el TikTok de la federación alemana antes de la Eurocopa 2024 se hizo viral —puso una patata "normal" en el número 1—, respondió: "A mí no me parece entretenido en absoluto."', dato_extra:'Puso la patata "normal" en el número 1 y se hizo viral' },
      { numero:42, nombre:'Jamal Musiala',        pos:'MID', nacimiento:'26 feb 2003',  club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'A los 17 años marcó en la Champions League y, a los 19, fue uno de los pocos jugadores alemanes que salieron del Mundial con su reputación intacta, o incluso mejorada. Los tres goles que marcó en la Eurocopa 2024 lo convirtieron en una estrella internacional. Pero luego, en el Mundial de Clubes 2025, todo se detuvo bruscamente con una lesión brutal sufrida en una colisión con Gianluigi Donnarumma. Estuvo seis meses fuera mientras Alemania se clasificaba para el Mundial y el Bayern arrancaba casi de manera perfecta. Gana más en el Bayern que el capitán de Inglaterra Harry Kane y debe tener cuidado de no ser superado por Lennart Karl, que es cinco años más joven.', dato_extra:'Gana más que Harry Kane en el Bayern' },
      { numero:18, nombre:'Anton Stach',          pos:'MID', nacimiento:'15 nov 1998',  club:'Leeds United',        pais_club:'Inglaterra', foto:'', bio:'Quizás el jugador menos conocido del plantel alemán para el Mundial. El de 27 años no había jugado en ningún gran club de la Bundesliga antes de mudarse al Leeds de la Premier League hace un año, donde ha actuado como escudo protector frente a la defensa. Al momento de escribir esto, solo ha hecho tres apariciones como suplente con Alemania. Su padre Matthias es reportero deportivo y una vez, cuando Anton se preparaba para entrar como sustituto, le dijo: "¡No me avergüences ahora, chico!" Stach puede no tener el aura de otros en el plantel, pero hay un hueco que llenar en el mediocampo defensivo.', dato_extra:'Su padre periodista le dijo: "¡No me avergüences ahora!"' },
      { numero:14, nombre:'Felix Nmecha',         pos:'MID', nacimiento:'10 oct 2000',  club:'Borussia Dortmund',   pais_club:'Alemania',   foto:'', bio:'Nacido en Hamburgo, criado en Inglaterra y formado en el Manchester City. A pesar de eso, y de que el inglés es su primer idioma, la federación alemana aseguró su futuro internacional temprano, junto con el de su hermano Lukas. Felix renovó recientemente su contrato en el Dortmund y se espera que sea uno de los pilares del futuro del club. Se ha convertido en uno de los mediocampistas centrales más físicamente dominantes de la liga, combinando eso con buena técnica y buen disparo. Nmecha habla con gusto de su religión y ha dicho que "Jesús es mi todo". Hace tres años le gustó y compartió contenido tránsfobo y homófobo en redes sociales, lo que llevó a protesta de algunos aficionados del Dortmund.', dato_extra:'Nacido en Hamburgo, criado en Inglaterra, formado en el Man City' },
      { numero:16, nombre:'Angelo Stiller',       pos:'MID', nacimiento:'4 abr 2001',   club:'Stuttgart',           pais_club:'Alemania',   foto:'', bio:'Inicialmente no fue incluido en el plantel para los amistosos de marzo, que Nagelsmann dijo darían una clara indicación de quién iría al Mundial. Sin embargo, tras las lesiones de Aleksandar Pavlović y Felix Nmecha, no solo fue convocado, sino que empezó los dos triunfos ante Suiza y Ghana. ¿Extraño? No en el mundo del técnico. "Stiller es un futbolista extraordinariamente bueno con un enorme potencial y actuaciones muy consistentes", dice Nagelsmann. Pavlović entra al Mundial como favorito para el puesto, pero ¿quién sabe qué pasará?', dato_extra:'No estaba en la lista y terminó jugando los dos amistosos de marzo' },
      { numero:20, nombre:'Jamie Leweling',       pos:'MID', nacimiento:'26 feb 2001',  club:'Stuttgart',           pais_club:'Alemania',   foto:'', bio:'Leweling casi no juega para Alemania. Su padre es de Ghana y la federación de ese país lo abordó temprano, pero el joven rechazó cortésmente. "Porque soy alemán", dijo tras hacer su debut con la Nationalmannschaft en 2024. "Claro que tengo raíces allí, pero crecí aquí en Alemania y eso me hace alemán." Nacido en Nuremberg, tiene experiencia en la Bundesliga con el Greuther Fürth, el Union Berlin y el Stuttgart. Llega al Mundial tras su mejor temporada. Conocido por trabajar muy duro y por hacer siempre sesiones extra, es rápido y ha decidido partidos de la Bundesliga prácticamente en solitario. Marcó el único gol del partido en su debut internacional ante los Países Bajos.', dato_extra:'Ghana lo quiso, eligió Alemania: "Soy alemán"' },
      { numero:11, nombre:'Pascal Gross',         pos:'MID', nacimiento:'15 jun 1991',  club:'Brighton',            pais_club:'Inglaterra', foto:'', bio:'Volvió "a casa" en enero, no a Mannheim, donde nació, sino al pueblo costero inglés de Brighton. Jugó allí durante siete años antes de mudarse al Dortmund, su primer gran club europeo. Al final, sin embargo, no pudo tener impacto en el equipo de la Bundesliga y regresó. Un dato curioso: sufre de alergia al pasto, bastante inconveniente para un futbolista. Para evitar sarpullidos, siempre juega con mangas largas. "En realidad también entreno con una capa base en las piernas, sin importar el clima", dice. Para este Mundial, podría hacer mucho calor para el mediocampista.', dato_extra:'Tiene alergia al pasto — siempre juega con mangas largas' },
      { numero:17, nombre:'Chris Führich',        pos:'FWD', nacimiento:'9 ene 1998',   club:'Stuttgart',           pais_club:'Alemania',   foto:'', bio:'Führich es el tipo de jugador que la selección nacional ha echado en falta durante algún tiempo: un extremo con un perfil definido. Puede que no sea el más rápido, pero demuestra una comprensión del juego, tiene buena visión y sabe cómo encontrar a sus compañeros. Y quizás lo más importante: no deriva constantemente hacia el centro. Führich lleva cinco años en el Stuttgart, siendo fundamental para llevar al club de pelear por la permanencia —descendieron dos veces en la década de 2010— a ganar la Copa de Alemania y jugar en la Champions League. Un excelente sustituto: capaz de dar un chispazo inmediato cuando entra, pero no exige jugar de inicio.', dato_extra:'Cinco años en Stuttgart: del descenso a la Champions League' },
      { numero:25, nombre:'Leroy Sané',          pos:'FWD', nacimiento:'11 ene 1996',   club:'Galatasaray',         pais_club:'Turquía',    foto:'', bio:'La creencia general en Alemania era que Sané probablemente había perdido su oportunidad de ir al Mundial al mudarse al Galatasaray en 2025, pero aquí está. No ha sido sobresaliente en Turquía, pero se ganó su puesto con dos goles y una asistencia en el crucial clasificatorio contra Eslovaquia. Posee todo lo que necesita un jugador de clase mundial, salvo quizás su pierna más débil, la derecha. Ha sido criticado por no sacar el máximo partido a su carrera, pero aun así ha acumulado dos títulos de la Premier League y cuatro de la Bundesliga. Al principio de su carrera se tatuó una imagen grande de sí mismo en la espalda. "Hoy no lo hubiera hecho", admitió a Der Spiegel.', dato_extra:'Se tatuó a sí mismo en la espalda al principio de su carrera' },
      { numero:38, nombre:'Lennart Karl',         pos:'FWD', nacimiento:'22 feb 2008',  club:'Bayern Munich',       pais_club:'Alemania',   foto:'', bio:'La estrella revelación de esta temporada tiene el talento para ser también uno de los jugadores sorpresa del Mundial. El jugador de 18 años juega para el Bayern Munich con esa rara mezcla de despreocupación y buena dosis de autoconfianza. "Por supuesto que pueden compararme con Messi", dijo Karl tras uno de sus primeros partidos con el Bayern, aunque hay que decir que no lo quiso decir exactamente así. Hace no mucho tomaba el autobús para ir a entrenarse. Todavía no tiene carné de conducir, así que el Bayern tiene que llevarlo a entrenar. Cuando Nagelsmann intentó llamarlo para decirle que estaba en la selección alemana por primera vez, el jugador no pudo contestar: estaba en una clase de matemáticas.', dato_extra:'Nagelsmann le llamó para darle la convocatoria — estaba en clase de mates' },
      { numero:9,  nombre:'Kevin Schade',         pos:'FWD', nacimiento:'27 nov 2001',  club:'Brentford',           pais_club:'Inglaterra', foto:'', bio:'El único jugador del plantel nacido en la Alemania del Este y sigue siendo en gran medida desconocido para el público alemán porque marca sus goles en Inglaterra con el Brentford. Schade se beneficia principalmente de su velocidad y capacidad de finalización, así como de la calidad de la Premier League. "Tienes un partido de primera prácticamente cada semana, eso es una locura para mí", dice. Preguntado por el equipo de medios del Brentford sobre su celebración de gol este año, respondió: "Bakugo, es un personaje del anime My Hero Academia y tiene manos explosivas. En el nuevo episodio que salió tuvo una gran pelea, y por eso lo hice. Me gusta que es muy seguro en sus peleas. Siempre gana y siempre es muy seguro de sí mismo."', dato_extra:'El único del plantel nacido en la ex Alemania del Este' },
      { numero:27, nombre:'Karim Adeyemi',        pos:'FWD', nacimiento:'18 ene 2002',  club:'Borussia Dortmund',   pais_club:'Alemania',   foto:'', bio:'Adeyemi causó revuelo a finales del año pasado cuando se supo que había pedido una llamada "caja misteriosa" en línea. Contenía artículos que dieron lugar a un aviso de penalización por posesión ilegal de armas. "He aprendido de ese incidente más de lo que puedo expresar con palabras", dijo. Su juego, mientras tanto, también puede ser algo irregular. Dotado de talento, velocidad y habilidad excepcionales, Adeyemi no siempre ha demostrado su pleno potencial. No ha sido titular habitual en el Dortmund esta campaña y cuando le sustituyen, su esposa, la rapera suiza Loredana, ocasionalmente expresa su descontento en las redes sociales. Incluso le dedicó la canción "27", el número que lleva en la camiseta.', dato_extra:'Su esposa, la rapera Loredana, le dedica canciones cuando lo sustituyen' },
      { numero:29, nombre:'Kai Havertz',          pos:'FWD', nacimiento:'11 jun 1999',  club:'Arsenal',             pais_club:'Inglaterra', foto:'', bio:'El delantero del Arsenal ama a los burros. De verdad los ama. "Empezó cuando era joven, de alguna manera desarrollé un amor por ellos. Los chicos también lo saben y algunos bromean al respecto", confesó una vez. "En general, el burro es un gran animal." Llega al Mundial tras otra campaña interrumpida por lesiones, habiendo jugado con regularidad solo en primavera. Este delantero inteligente se siente cómodo en muchas posiciones. Nagelsmann puede usarlo como centrodelantero, pero valora su versatilidad. Marcó el gol de la victoria en la final de la Champions League 2021 para el Chelsea contra el Manchester City.', dato_extra:'Ama a los burros. De verdad. "El burro es un gran animal"' },
      { numero:19, nombre:'Nick Woltemade',       pos:'FWD', nacimiento:'14 feb 2002',  club:'Newcastle',           pais_club:'Inglaterra', foto:'', bio:'El ascenso de Woltemade ha sido vertiginoso. En un año pasó de ser jugador del plantel en el Stuttgart a ser un fichaje de 70 millones de euros en la Premier League y un internacional alemán. Su estilo poco convencional —con 1,98 m de altura, algo torpe— lo convirtió rápidamente en favorito de los aficionados. "A veces me acuesto por la noche y pienso: vaya, todo esto es una locura", le dijo a Zeit Campus. En Newcastle vive en un piso compartido con su mejor amigo. "Desayunamos juntos, nos relajamos por la noche y vemos fútbol cuando no estoy jugando."', dato_extra:'1,98m, se fue al Newcastle por 70M€ y vive en piso compartido' },
      { numero:13, nombre:'Deniz Undav',          pos:'FWD', nacimiento:'19 jul 1996',  club:'Stuttgart',           pais_club:'Alemania',   foto:'', bio:'Undav fue con diferencia el delantero alemán más clínico esta temporada pero, por alguna razón, Nagelsmann no parece valorarlo. Marcó el gol de la victoria en el amistoso de marzo contra Ghana, pero después el técnico no ofreció elogios, sino una crítica velada: "No estuvo muy involucrado en el partido, no tuvo acciones antes [del gol]. No creo que su actuación fuera buena." Los comentarios del técnico pueden haber surgido de que Undav dijera antes del partido que sentía que debía ser titular en lugar de sustituto. Alguien tiene que meter el balón en la red y, en un equipo sin muchos finalizadores naturales, Undav —un Gerd Müller moderno— es una excepción.', dato_extra:'El máximo goleador alemán de la temporada, pero Nagelsmann lo ignora' },

  egipto: {

    jugadores:[
      { numero:1,  nombre:"Mostafa 'Oufa' Shobeir", pos:'GK',  nacimiento:'17 mar 2000', club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'Al crecer, Shobeir difícilmente podría haber escapado de la gravedad del fútbol. Su padre, Ahmed Shobeir, es uno de los arqueros más celebrados de Egipto como el hombre bajo los tres palos en el Mundial de 1990 y en el Al Ahly durante una carrera de 13 años. Su hijo ha seguido esos pasos, uniéndose a la academia del Al Ahly antes de hacer su debut profesional en 2020. Desde entonces, se ha establecido como una presencia confiable que siempre está tranquilo bajo presión. Mantuvo nueve vallas invictas consecutivas en la Liga de Campeones de la CAF — un récord de la competencia — y la FIFA lo describió antes del Mundial de Clubes como inexpugnable.', dato_extra:'De familia de arqueros — la FIFA lo describió como inexpugnable' },
      { numero:16, nombre:'Mohamed El-Shenawy',     pos:'GK',  nacimiento:'18 dic 1988', club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'El-Shenawy regresó al Al Ahly en 2016 y acumula más de 350 apariciones. Fue el número 1 de Egipto en el Mundial de Rusia 2018 y ha mantenido 40 vallas invictas en 75 partidos. Tras ganar el premio al Jugador del Partido contra Sudáfrica en la Copa Africana de Naciones 2025, dijo: Este premio no es solo para mí. Es para los 28 jugadores del plantel. Jugamos como el corazón de un solo hombre para una sola nación. Con 37 años, su experiencia lo convierte en un miembro invaluable del plantel.', dato_extra:'Jugamos por Egipto juntos y representamos a 120 millones de personas' },
      { numero:23, nombre:'El Mahdy Soliman',       pos:'GK',  nacimiento:'8 jun 1987',  club:'Zamalek',         pais_club:'Egipto',          foto:'', bio:'Un veterano experimentado de 39 años que comenzó su carrera con el Enppi en 2008 y pasó por varios clubes antes de unirse al Zamalek en 2025. Con 1,89 metros, Soliman es una presencia serena elogiada por su compostura y su habilidad para jugar con los pies, rasgos que lo han llevado a ser comparado con los arqueros líberos modernos.', dato_extra:'Estadista mayor elogiado por su habilidad para jugar con los pies' },
      { numero:24, nombre:'Mohamed Alaa',           pos:'GK',  nacimiento:'1 sep 1999',  club:'El Gouna',        pais_club:'Egipto',          foto:'', bio:'El más joven de los arqueros, Alaa se estableció como uno de los atajadores más capaces fuera de los tres gigantes del país en El Gouna. La temporada pasada fue la razón principal por la que El Gouna se salvó del descenso, manteniendo dos vallas invictas en tres partidos de eliminatoria. Su inclusión por primera vez en marzo refleja la disposición de Hossam Hassan de buscar talento más allá de los clubes grandes.', dato_extra:'Salvó a El Gouna del descenso — convocado por primera vez en marzo' },
      { numero:2,  nombre:'Mohamed Abdelmonem',     pos:'DEF', nacimiento:'1 feb 1999',  club:'Nice',            pais_club:'Francia',         foto:'', bio:'Empecé como atacante. Cuando tenía 10 años, mi entrenador me dijo que jugara hombre a hombre contra el número 9 del rival... Jugué un partido realmente bueno y desde entonces el entrenador me vio como defensor. Yo llamaba a mi papá, llorando, diciéndole que quería jugar como número 10. Ahora trato de ser el mejor defensor que puedo ser. Abdelmonem fichó por el Niza desde el Al Ahly en 2024, convirtiéndose en el primer egipcio en representar al club. A los ocho meses se rompió el ligamento cruzado anterior.', dato_extra:'Empezó de delantero — lloraba porque quería ser el número 10' },
      { numero:3,  nombre:'Hossam Abdelmaguid',     pos:'DEF', nacimiento:'30 abr 2001', club:'Zamalek',         pais_club:'Egipto',          foto:'', bio:'Con 1,94 m, es una presencia aérea dominante que puede salir jugando desde atrás. Ganó su primer título de liga en 2020-21 y brilló cuando el Zamalek ganó la Copa Confederación y la Supercopa de la CAF en 2024. Siempre trabajo y hago lo que tengo que hacer. Con solo 24 años es considerado uno de los mejores prospectos defensivos de Egipto. Su agente reportó interés del West Brom y el Anderlecht.', dato_extra:'1,94 m de altura — prospecto seguido por West Brom y Anderlecht' },
      { numero:4,  nombre:'Ramy Rabia',             pos:'DEF', nacimiento:'20 may 1993', club:'Al Ain',          pais_club:'Emiratos Árabes', foto:'', bio:'Rabia debutó en el Al Ahly con solo 17 años en 2010. Durante sus dos etapas en el club ganó 10 títulos de la Premier League egipcia, seis trofeos de la Liga de Campeones de la CAF y cuatro Supercopas. Con más de 40 partidos con Egipto, 2025 marcó su año más activo para la selección. Es un líder vocal con fuerza física y compostura en momentos de alta presión.', dato_extra:'Líder vocal y ganador de seis Ligas de Campeones de la CAF' },
      { numero:5,  nombre:'Yasser Ibrahim',         pos:'DEF', nacimiento:'10 feb 1993', club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'Ibrahim tiene la habilidad de aparecer con algún gol importante: un doblete contra el Al Hilal en el Mundial de Clubes 2021 y el gol de la victoria de Egipto en el tiempo extra contra Benín en la Copa Africana de Naciones 2025. A los 33 años se encuentra entre los defensores más experimentados del plantel, con un florecimiento internacional tardío: solo 16 partidos en la selección mayor al momento de escribir esto.', dato_extra:'Florecimiento internacional tardío — gol decisivo contra Benín en la AFCON 2025' },
      { numero:6,  nombre:'Ahmed Fatouh',           pos:'DEF', nacimiento:'22 mar 1998', club:'Zamalek',         pais_club:'Egipto',          foto:'', bio:'Producto de la academia del Zamalek, fue parte vital del equipo que ganó títulos de liga consecutivos en 2021 y 2022. En agosto de 2024 recibió una sentencia de prisión suspendida y una licencia revocada después de un accidente automovilístico fatal, confirmado que conducía bajo la influencia de drogas. Pagué toda la compensación yo mismo. Fue mi error. El caso dejó su carrera en el limbo durante meses y está intentando reconstruir su reputación.', dato_extra:'Intentando reconstruir su carrera y su vida tras un trágico accidente' },
      { numero:12, nombre:'Mohamed Hany',           pos:'DEF', nacimiento:'2 feb 1996',  club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'Hany ha pasado toda su carrera en el Al Ahly. Fue promovido al primer equipo en 2014-15 y desde entonces acumula más de 390 apariciones, ganando ocho títulos de liga, cuatro Ligas de Campeones de la CAF y seis Supercopas de Egipto. Su estilo se define por su ritmo y resistencia que le permiten operar como amenaza ofensiva por la banda derecha.', dato_extra:'One-club man — toda su carrera en Al Ahly con más de 390 partidos' },
      { numero:13, nombre:'Tarek Alaa',             pos:'DEF', nacimiento:'5 ene 2002',  club:'Pyramids FC',     pais_club:'Egipto',          foto:'', bio:'Uno de los miembros más jóvenes del plantel, Alaa puede operar como lateral derecho o mediocampista defensivo. Los reportes sugieren que el Al Ahly lo busca como eventual reemplazo de Mohamed Hany. Con solo un partido internacional a su nombre, el Mundial representa su gran oportunidad de mostrarse en el escenario más grande.', dato_extra:'Jugador versátil que Al Ahly busca como futuro sucesor de Hany' },
      { numero:14, nombre:'Khaled Sobhi',           pos:'DEF', nacimiento:'3 may 1995',  club:'Al Masry',        pais_club:'Egipto',          foto:'', bio:'Producto del Ismaily, Sobhi debutó en 2015 y transitó varios clubes antes de ganar la Copa de la Liga Egipcia 2023-24 con el Ceramica Cleopatra. Debutó con Egipto en el mismo mes que fichó por el Al Masry. Su camino hacia la máxima categoría fue largo y poco convencional, pero su forma ha justificado un lugar en el plantel mundialista.', dato_extra:'Camino largo y poco convencional hacia la máxima categoría y la selección' },
      { numero:15, nombre:'Amr El Gazzar',          pos:'DEF', nacimiento:'20 sep 1999', club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'Enfrentó desafíos tempranos: una enfermedad autoinmune que provocó la pérdida permanente del cabello y un período trabajando en una gasolinera cuando estuvo a punto de abandonar el fútbol. Construyó su carrera en el Ghazl El Mahalla y el National Bank antes del Al Ahly. Mi mayor objetivo era la selección nacional. Creí en mí mismo. Todo mi arduo trabajo no fue en vano. Nunca olvidaré ese día. Si trabajé duro 100 veces para ese momento, lo haría de nuevo y trabajaría un millón de veces más duro.', dato_extra:'Superó una enfermedad autoinmune y trabajó en una gasolinera antes de triunfar' },
      { numero:22, nombre:'Ahmed Eid',              pos:'DEF', nacimiento:'2 ene 2001',  club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'El camino de Eid es un viaje por las mayores rivalidades de Egipto. Comenzó en la academia del Al Ahly, se mudó al Zamalek donde logró su irrupción, y regresó al Al Ahly en enero de 2026. El lateral derecho de 25 años debutó internacionalmente en 2024 y acumula seis partidos. Rápido, técnicamente sólido y cómodo con el balón, es considerado uno de los laterales más dinámicos de Egipto.', dato_extra:'Viajó entre las mayores rivalidades: jugó en Zamalek y volvió al Al Ahly' },
      { numero:7,  nombre:'Mohamed Shehata',        pos:'MID', nacimiento:'8 feb 2001',  club:'Zamalek',         pais_club:'Egipto',          foto:'', bio:'Shehata pasó por el Talea El Gaish con 98 apariciones antes de que el Zamalek lo fichara en enero de 2024. Un mediocampista compuesto y disciplinado, su juego se basa en la conciencia posicional y la capacidad de proteger la defensa sin perder el balón. Ganó la Copa Confederación y la Supercopa de la CAF con el Zamalek, y representó a Egipto en los Juegos Olímpicos de París.', dato_extra:'Mediocampista disciplinado que brilló en los Juegos Olímpicos de París' },
      { numero:8,  nombre:'Hamdy Fathy',            pos:'MID', nacimiento:'29 sep 1994', club:'Al-Wakrah',       pais_club:'Qatar',           foto:'', bio:'Un mediocampista defensivo combativo que pasó por el Damanhour, Enppi y Petrojet antes de unirse al Al Ahly en 2019, donde ganó tres Premier Leagues, tres Copas de Egipto y tres Ligas de Campeones de la CAF. El Al Ahly lo trajo de vuelta a préstamo para el Mundial de Clubes 2025. Con 62 apariciones internacionales, dice: Puedo jugar de 6, de central en línea de 3 o de 2. Lo que quiera el entrenador, lo haré.', dato_extra:'Puedo jugar de 6, de central en línea de 3 o de 2. Lo que quiera el DT lo haré' },
      { numero:17, nombre:'Marwan Attia',           pos:'MID', nacimiento:'1 ago 1998',  club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'Surgió del Al Ittihad Alexandria siendo incluso capitán. He estado jugando al fútbol desde que tenía siete años, y mi sueño siempre fue vestir esa camiseta roja. Cuando supe que Al Ahly me quería, no lo pensé dos veces. Fuera del campo mostró una determinación silenciosa al perder a su padre en 2023 pero regresando inmediatamente para jugar un papel clave en asegurar el triplete del Al Ahly.', dato_extra:'Jugó para asegurar el triplete del Al Ahly justo después de perder a su padre' },
      { numero:18, nombre:'Mohanad Lasheen',        pos:'MID', nacimiento:'29 may 1996', club:'Pyramids FC',     pais_club:'Egipto',          foto:'', bio:'Lasheen marcó el gol del ascenso del Alassiouty cinco semanas antes del final de la temporada. Es un mediocampista central versátil con gran visión para el pase. Cuando se unió a las eliminatorias mundialistas batallaba contra una lesión: estaba corriendo contra el tiempo para estar en forma. Fue considerado apto justo a tiempo para el Mundial.', dato_extra:'Corrió contra el tiempo para superar una lesión y jugar las eliminatorias' },
      { numero:19, nombre:'Ahmed Nabil Koka',       pos:'MID', nacimiento:'4 jul 2001',  club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'La carrera de Koka casi había terminado antes de empezar: en 2020 su equipo juvenil en el Al Ahly fue disuelto. Se abrió paso al primer equipo a base de pura garra y desde entonces se ha convertido en un pilar. Destacado en los Juegos Olímpicos de París. El Mundial es uno de los torneos en los que más quiero jugar. Si logro jugarlo, habré participado en casi todos los torneos importantes a una edad muy joven, lo que me enorgullecería muchísimo.', dato_extra:'Su equipo juvenil fue disuelto, pero llegó al primer equipo a pura garra' },
      { numero:20, nombre:'Mahmoud Saber',          pos:'MID', nacimiento:'30 jul 2001',  club:'Pyramids FC',    pais_club:'Egipto',          foto:'', bio:'Saber tomó una ruta sinuosa a través del fútbol egipcio: del Nogoom al Pyramids, luego préstamos con ZED y Smouha. A los 24 años ya ha jugado para la selección mayor 14 veces a pesar de haber debutado recién en 2024. Es conocido por su habilidad para encontrar espacio en mediocampos poblados y sus precisos pases filtrados.', dato_extra:'14 partidos en la selección mayor a pesar de haber debutado recién en 2024' },
      { numero:21, nombre:'Emam Ashour',            pos:'MID', nacimiento:'20 feb 1998', club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'De niño casi dejó el juego cuando los entrenadores juveniles lo pasaron por alto. Eventualmente ganó la promoción al Ghazl El Mahalla, luego fichó por el Zamalek y pasó brevemente por el Midtjylland de Dinamarca antes de unirse al Al Ahly en 2023, donde se convirtió en el máximo goleador de la liga en 2024-25. Es desplegado como número 10 ofensivo para Egipto, deambulando entre líneas en un rol libre.', dato_extra:'De casi dejar el fútbol en juveniles a ser máximo goleador de la liga' },
      { numero:9,  nombre:'Ibrahim Adel',           pos:'FWD', nacimiento:'23 abr 2001', club:'Al Jazira',       pais_club:'Emiratos Árabes', foto:'', bio:'Un extremo izquierdo rápido como un rayo. Fichó por el Pyramids en 2018 y los ayudó a ganar sus dos primeros trofeos históricos. Su explosividad y tiros de larga distancia le ganaron el apodo de Baby Hulk. Getafe intentó ficharlo y lo llevó en avión a España, pero Pyramids se mantuvo firme. Fue nombrado mejor jugador en la Copa Africana de Naciones Sub-23 de 2023 y acumula 21 partidos internacionales absolutos.', dato_extra:'Apodado Baby Hulk por su explosividad y remates de larga distancia' },
      { numero:10, nombre:"Mahmoud Hassan Trezeguet", pos:'FWD', nacimiento:'1 oct 1994', club:'Al Ahly',        pais_club:'Egipto',          foto:'', bio:'El apodo, tomado del legendario David Trezeguet, ha definido una carrera tan colorida como la de cualquier futbolista egipcio. Irrumpió en el Al Ahly a los 18 años y logró su mayor impacto europeo en el Kasimpasa de Turquía. El Aston Villa lo fichó en 2019 donde sus goles ayudaron a evitar el descenso. He jugado en la mejor liga del mundo. Renunciaría a todo eso si fuera necesario. Nunca renunciaría a representar a Egipto.', dato_extra:'Renunciaría a la Premier League antes que a representar a Egipto' },
      { numero:11, nombre:"Ahmed Sayed Zizo",       pos:'FWD', nacimiento:'10 ene 1996', club:'Al Ahly',         pais_club:'Egipto',          foto:'', bio:'Zizo terminó como máximo goleador de la liga en 2021-22 con el Zamalek con 19 goles. Cuando expiró su contrato, el Al Ahly, el rival más feroz, lo fichó con un contrato de cuatro años en una de las transferencias más controvertidas del fútbol egipcio. El ex arquero Nader El-Sayed dijo: Como podría el Al Ahly no fichar al mejor jugador de Egipto siendo agente libre. Es el mejor jugador de Africa y llego gratis. Al Ahly es similar al Real Madrid.', dato_extra:'Protagonizó una transferencia histórica de Zamalek al máximo rival, Al Ahly' },
      { numero:25, nombre:'Haissem Hassan',         pos:'FWD', nacimiento:'8 feb 2002',  club:'Real Oviedo',     pais_club:'España',          foto:'', bio:'Nacido en París de padre egipcio y madre tunecina, representó a Francia a nivel juvenil y fue buscado por Túnez y Egipto. Eligió a Egipto el 15 de marzo de 2026. Lanzó su carrera con el Chateauroux con solo 16 años, pasó por el Villarreal y en agosto de 2024 se unió al Real Oviedo donde ascendieron a La Liga. Es un atacante por la derecha, rápido y cómodo en situaciones de uno contra uno.', dato_extra:'Nacido en París, buscado por Francia y Túnez antes de elegir a Egipto' },
      { numero:26, nombre:'Mohamed Salah',          pos:'FWD', nacimiento:'15 jun 1992', club:'Liverpool',        pais_club:'Inglaterra',      foto:'', bio:'El Rey Egipcio. En diciembre se convirtió en el jugador con más participaciones de gol en un solo club en la historia de la Premier League con 277, superando a Wayne Rooney. Nadie ha ganado más premios Bota de Oro que sus cuatro, empatado con Thierry Henry. Su momento definitorio en la selección fue el penal en el descuento contra el Congo en octubre de 2017 que envió a Egipto al Mundial de 2018, poniendo fin a 28 años de ausencia. Como capitán, sigue siendo el jugador alrededor del cual los entrenadores construyen sus planes.', dato_extra:'El Rey Egipcio — máximo goleador extranjero de la Premier League' },
      { numero:27, nombre:'Omar Marmoush',          pos:'FWD', nacimiento:'7 feb 1999',  club:'Manchester City',  pais_club:'Inglaterra',      foto:'', bio:'Canadá me contactó. El entrenador me llamó personalmente. Pero mi decision ya estaba tomada. La seleccion nacional egipcia para mi esta por encima de cualquier otra cosa. Pasó por el Stuttgart y St. Pauli antes de que sus actuaciones en el Eintracht Frankfurt le aseguraran un traspaso al Manchester City, donde Guardiola dijo: Sin el no sería posible clasificarnos a la Champions. Es un jugador especial. Con Salah, es uno de los primeros nombres en la planilla.', dato_extra:'Canadá lo buscó, pero la selección de Egipto está por encima de todo' },
      { numero:28, nombre:'Mostafa Mohamed',        pos:'FWD', nacimiento:'28 nov 1997', club:'Nantes',           pais_club:'Francia',         foto:'', bio:'Pasó por el sistema del Zamalek antes de abrirse camino por préstamos. El Galatasaray ejerció su opción de compra en 2021 y Nantes lo compró de forma permanente en 2023. El número 9 titular de Egipto ha tenido problemas para marcar con su país y no anotó entre enero de 2024 y el anuncio del plantel para el Mundial. En mayo de 2025, por tercer año consecutivo, se negó a jugar en el partido dedicado a combatir la homofobia por razones religiosas.', dato_extra:'El 9 titular que brilló en Galatasaray antes de llegar al Nantes francés' },
      { numero:29, nombre:'Nasser Mansy',           pos:'FWD', nacimiento:'16 nov 1997', club:'Zamalek',          pais_club:'Egipto',          foto:'', bio:'Mansy es mejor conocido por anotar el icónico gol del empate en la Supercopa de la CAF 2024 contra el Al Ahly, llevando al Zamalek a su quinto título. Es un corredor incansable que hace el trabajo defensivo que muchos delanteros evitan. Acumula más de 190 apariciones en la Premier League egipcia. Khaled El Ghandour dijo: A Mansi se le debería dar una oportunidad como el número 9 titular de Egipto.', dato_extra:'Corredor incansable y autor del icónico gol en la Supercopa de la CAF 2024' },
      { numero:30, nombre:'Salah Mohsen',           pos:'FWD', nacimiento:'1 sep 1998',  club:'Al Masry',         pais_club:'Egipto',          foto:'', bio:'Un finalizador clínico que se estableció como la principal amenaza ofensiva del Al Masry. Su notable capacidad para correr a la espalda de las defensas lo convierte en un sustituto de impacto ideal para Egipto. A sus 27 años está entrando en sus años de mayor esplendor y es una figura popular por su estilo directo y su habilidad para anotar desde ángulos difíciles.', dato_extra:'Sustituto de impacto por su habilidad para correr a la espalda de la defensa' }
    ]
  },

  uruguay: {
    nombre:'Uruguay', flag:'🇺🇾', dt:'Marcelo Bielsa', mundiales:'2', grupo:'H',
    jugadores:[
      { numero:1,  nombre:'Fernando Muslera',       pos:'GK',  nacimiento:'16 jun 1986', club:'Estudiantes de La Plata', pais_club:'Argentina', foto:'', bio:'Muslera nacio en Buenos Aires el dia que Argentina vencio a Uruguay en los octavos de final del Mundial de 1986, pero nunca hubo dudas sobre su lealtad: fue nombrado en honor al delantero uruguayo Fernando Morena. Su vida cambio a los ocho anos cuando no se presento el arquero de su equipo. Como cualquier chico solo queria jugar, pero cada vez que recibia un gol, me ponia a llorar. Ahora hace historia como el primer uruguayo en participar en cinco Mundiales.', dato_extra:'Primer uruguayo en la historia en participar en cinco Mundiales' },
      { numero:12, nombre:'Sergio Rochet',          pos:'GK',  nacimiento:'23 mar 1993', club:'Internacional',           pais_club:'Brasil',    foto:'', bio:'Era bastante desconocido cuando aparecio en las celebraciones del titulo de liga de Danubio en 2014 como tercer arquero a los 21 anos. Pronto partio a los Paises Bajos y el AZ Alkmaar. En 2019 Nacional lo trajo de vuelta a Uruguay. La madre de Sergio dijo que el traspaso a Nacional era el sueno de su hijo. Ella apenas podia creerlo cuando jugo en el Mundial de 2022: El dia que lo vi en el primer partido fue un shock. Me detuve frente al televisor y solo llore.', dato_extra:'Su madre no paro de llorar al verlo debutar en el Mundial de 2022' },
      { numero:23, nombre:'Santiago Mele',          pos:'GK',  nacimiento:'6 sep 1997',  club:'Monterrey',               pais_club:'Mexico',    foto:'', bio:'Mele aparecio en todas las portadas uruguayas cuando hizo dos atajadas en penales contra Portugal en el Mundial Sub-20 de 2017. Los estaba observando, queria hacer juegos mentales porque eso tiene una gran influencia. Despues le costo tiempo de juego en Turquia y Espana. Esos tres anos en Turquia fueron dificiles, al igual que volver a Uruguay para tomar las riendas de mi carrera. Junto con entregarme a Dios, estas son las razones por las que estoy donde estoy.', dato_extra:'Atajo dos penales clave contra Portugal haciendo juegos mentales' },
      { numero:24, nombre:'Franco Israel',          pos:'GK',  nacimiento:'22 abr 2000', club:'Torino',                  pais_club:'Italia',    foto:'', bio:'Entusiasta jugador de basquetbol, Israel solo se inclino por el futbol tras ver a Uruguay en el Mundial de 2010. Impresiono en Nacional cuando ganaron la Copa Libertadores Sub-20 en 2018, consiguio un traspaso a la Juventus sin haber jugado un partido en primera y pudo aprender de Gianluigi Buffon. Ha sido mi heroe desde que era chico. Entrenar con el es un sueno. Despues de tres anos en Lisboa con el Sporting, esta de vuelta en Turin. Se espera que sea el numero 1 de Bielsa en este Mundial.', dato_extra:'Se espera que sea el arquero numero 1 de Marcelo Bielsa en el Mundial' },
      { numero:2,  nombre:'Ronald Araujo',          pos:'DEF', nacimiento:'7 mar 1999',  club:'Barcelona',               pais_club:'Espana',    foto:'', bio:'Hacia finales del ano pasado, tras una tarjeta roja contra el Chelsea en la Liga de Campeones, decidio alejarse del juego para recibir tratamiento por depresion que lo habia estado afectando por mas de un ano. Tenemos que entender que ademas de ser futbolistas, somos personas, dijo cuando regreso 47 dias despues. En Qatar una lesion le impidio jugar. Bicampeon de La Liga, es parte del grupo de capitanes del Barcelona.', dato_extra:'Roca defensiva del Barcelona que hablo abiertamente sobre la salud mental' },
      { numero:3,  nombre:'Jose Maria Gimenez',     pos:'DEF', nacimiento:'20 ene 1995', club:'Atletico Madrid',         pais_club:'Espana',    foto:'', bio:'Cuando jugaba en la academia de Danubio a los 17 anos, su hermana Agustina de 14 quedo embarazada. Con los ojos llenos de lagrimas les dijo a sus padres que el mantendria al bebe. Penso en dejar el futbol pero Danubio lo ayudo. A los 18 firmo por el Atletico y en su debut enfrentando a Radamel Falcao le pregunto durante un ataque si tenia auto en Madrid para distraerlo. Dias despues Gimenez se tatuo esa pregunta en el cuerpo. Ahora capitan con mas de 100 partidos y tres Mundiales.', dato_extra:'El capitan que a los 18 anos distrajo a Falcao preguntandole por su auto' },
      { numero:4,  nombre:'Sebastian Caceres',      pos:'DEF', nacimiento:'18 ago 1999', club:'America',                 pais_club:'Mexico',    foto:'', bio:'Dias antes de una final, Caceres tenia una oferta del America de Mexico. En lugar de aceptar el traspaso, decidio quedarse en Liverpool de Montevideo. Queria ser campeon con Liverpool. Queria jugar ese partido por el club que me formo. La final termino en gloria. El America regreso al ano siguiente y el central gano tres titulos de liga alli. Ha jugado para Uruguay en todas las categorias desde la sub-17.', dato_extra:'Rechazo millones del futbol mexicano para ser campeon con el club de su infancia' },

══════════════════════════════════════ */
function init() {
  buildPortada();
}

/* ══════════════════════════════════════
   PORTADA
══════════════════════════════════════ */
function buildPortada() {
  const wrap = document.getElementById('portadaWrap');
  wrap.innerHTML = '';

  // Contenedor grid para desktop
  const grid = document.createElement('div');
  grid.className = 'grupos-grid';

  GRUPOS.forEach((g, gi) => {
    const bloque = document.createElement('div');
    bloque.className = 'grupo-bloque' + (g.argentina ? ' argentina-grupo' : '');
    bloque.style.animationDelay = `${gi * 55}ms`;
    bloque.innerHTML = `<div class="grupo-titulo"><span class="grupo-letra">${g.letra}</span><span class="grupo-label">Grupo ${g.letra}</span></div>`;
    g.sels.forEach(id => {
      const sel = SELECCIONES[id];
      if (!sel) return;
      const tiene = sel.jugadores.length > 0;
      const fila = document.createElement('div');
      fila.className = 'sel-fila';
      const flagEl = FLAG_URLS[id]
        ? `<img src="${FLAG_URLS[id]}" alt="${sel.nombre}" loading="lazy" class="sel-fila-flag-img">`
        : sel.flag;
      fila.innerHTML = `
        <div class="sel-fila-flag">${flagEl}</div>
        <div class="sel-fila-info">
          <div class="sel-fila-nombre">${sel.nombre}</div>
        </div>
        <div class="sel-fila-badge ${tiene ? '' : 'vacio'}">${tiene ? 'Ver plantel ›' : ''}</div>`;
      if (tiene) fila.onclick = () => irSeleccion(id);
      bloque.appendChild(fila);
    });
    grid.appendChild(bloque);
  });

  wrap.appendChild(grid);
}

/* ══════════════════════════════════════
   NAVEGACIÓN
══════════════════════════════════════ */
function irSeleccion(id) {
  selActiva = id;
  document.getElementById('vistaPortada').style.display   = 'none';
  document.getElementById('vistaSeleccion').style.display = 'block';
  aplicarPaleta(id);
  buildSubNav(id);
  renderHero(id);
  renderTabs(id);
  renderSubhome(id);
  window.scrollTo({ top:0, behavior:'smooth' });
}

function irPortada() {
  selActiva = null;
  document.getElementById('vistaSeleccion').style.display = 'none';
  document.getElementById('vistaPortada').style.display   = 'block';
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* aplica los colores del país como CSS vars en :root */
function aplicarPaleta(id) {
  const p = PALETAS[id] || { c1:'#94BE1F', c2:'#111' };
  const root = document.documentElement;
  root.style.setProperty('--c1', p.c1);
  root.style.setProperty('--c2', p.c2);
  root.style.setProperty('--c1-alpha', hexAlpha(p.c1, .18));
  root.style.setProperty('--c2-alpha', hexAlpha(p.c2, .10));
  // Si c1 es muy oscuro (luminosidad < 35%) usamos c2 como color de texto
  // Si c2 también es oscuro, usamos el verde de Olé
  const lum1 = luminancia(p.c1);
  const lum2 = luminancia(p.c2);
  let textColor;
  if (lum1 >= 35) {
    textColor = p.c1;           // c1 es claro — úsalo directamente
  } else if (lum2 >= 35) {
    textColor = p.c2;           // c2 es más claro — úsalo
  } else {
    textColor = '#94BE1F';      // ambos oscuros — verde Olé como fallback
  }
  root.style.setProperty('--c1-text', textColor);
}

/* luminancia perceptual en escala 0-100 */
function luminancia(hex) {
  const r = parseInt(hex.slice(1,3),16) / 255;
  const g = parseInt(hex.slice(3,5),16) / 255;
  const b = parseInt(hex.slice(5,7),16) / 255;
  return (0.299 * r + 0.587 * g + 0.114 * b) * 100;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
