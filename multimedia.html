<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planteles Mundial 2026 – Especial Olé</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --verde: #94BE1F;
  --verde-oscuro: #7a9e18;
  --negro: #111111;
  --gris-claro: #f2f2f2;
  --gris-medio: #e0e0e0;
  --blanco: #ffffff;
  --pos-gk:  #c84b00;
  --pos-def: #1255a0;
  --pos-mid: #1e6e28;
  --pos-fwd: #a81010;
  /* colores dinámicos del país — se sobreescriben por JS */
  --c1: #94BE1F;
  --c2: #111111;
}

body {
  font-family: 'Barlow', sans-serif;
  background: var(--gris-claro);
  color: var(--negro);
  -webkit-tap-highlight-color: transparent;
}

/* ═══════════════════════════
   KEYFRAMES
═══════════════════════════ */
@keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes slideR   { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
@keyframes barGrow  { from{transform:scaleX(0)} to{transform:scaleX(1)} }
@keyframes cardIn   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse    { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
@keyframes scanline { 0%{left:-60%} 100%{left:120%} }
@keyframes sd       { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════════
   SITE HEADER
═══════════════════════════ */
.site-header {
  background: var(--negro);
  color: var(--blanco);
  padding: 26px 18px 22px;
  position: relative;
  overflow: hidden;
}
.site-header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:4px;
  background:var(--verde); transform-origin:left;
  animation: barGrow .7s cubic-bezier(.4,0,.2,1) .2s both;
}
.site-header::before {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(148,190,31,.04),transparent);
  animation: scanline 3.5s ease-in-out 1s infinite;
}
.editorial-label {
  display:inline-block; background:var(--verde); color:var(--negro);
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:10px;
  letter-spacing:2px; text-transform:uppercase; padding:3px 8px; margin-bottom:10px;
  animation: slideR .5s ease both;
}
.site-header h1 {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:clamp(26px,7vw,50px); line-height:1; text-transform:uppercase;
  margin-bottom:7px; animation: fadeUp .5s ease .1s both;
}
.site-header h1 span{color:var(--verde)}
.site-header p { font-size:15px; line-height:1.55; color:#fff; animation: fadeUp .5s ease .2s both; }
.live-dot {
  display:inline-flex; align-items:center; gap:7px; margin-top:12px;
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px;
  color:var(--verde); letter-spacing:1px; text-transform:uppercase;
  animation: fadeIn .6s ease .4s both;
}
.live-dot .dot { width:7px; height:7px; border-radius:50%; background:var(--verde); animation:pulse 1.6s infinite; }

/* ═══════════════════════════
   VISTAS
═══════════════════════════ */
#vistaPortada   { display:block; }
#vistaSeleccion { display:none; }

/* ═══════════════════════════
   PORTADA — GRUPOS
═══════════════════════════ */
.portada-wrap {
  padding:16px 12px 48px;
  max-width:900px;
  margin:0 auto;
}

@media(min-width:640px) {
  .portada-wrap {
    padding:24px 24px 56px;
  }
  /* En desktop: grilla de 2 columnas de grupos */
  .grupos-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
  }
  .grupo-bloque { margin-bottom:0; }
}

@media(min-width:960px) {
  .portada-wrap { max-width:1100px; padding:28px 32px 64px; }
  .grupos-grid { grid-template-columns:repeat(3,1fr); }
}

.grupo-bloque {
  margin-bottom:16px; background:#1a1a1a; border-radius:8px;
  overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.18);
  opacity:0; animation: fadeUp .45s ease both;
}
.grupo-bloque.argentina-grupo {
  box-shadow:0 2px 16px rgba(148,190,31,.25);
  border:2px solid #94BE1F;
}
.grupo-bloque.argentina-grupo .grupo-titulo {
  background: #94BE1F;
}
.grupo-bloque.argentina-grupo .grupo-letra {
  color: var(--negro);
}
.grupo-bloque.argentina-grupo .grupo-label {
  color: var(--negro);
}
.grupo-titulo {
  display:flex; align-items:center; gap:10px;
  background:var(--negro); padding:9px 14px;
}
.grupo-letra {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:26px; color:var(--verde); line-height:1; width:24px; flex-shrink:0;
}
.grupo-label {
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:13px; text-transform:uppercase; letter-spacing:1.5px; color:#fff;
}

/* Fila selección en portada */
.sel-fila {
  display:flex; align-items:center; gap:12px; padding:11px 14px;
  cursor:pointer; border-bottom:1px solid #2a2a2a;
  transition:background .18s, padding-left .18s; color:var(--blanco);
  background:#1a1a1a;
  position:relative;
}
.sel-fila::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--verde); transform:scaleY(0); transform-origin:center;
  transition:transform .2s ease;
}
.sel-fila:last-child { border-bottom:none; }
.sel-fila:hover { background:#2a2a2a; padding-left:18px; }
.sel-fila:hover::before { transform:scaleY(1); }
.sel-fila:hover .sel-fila-flag { transform:scale(1.12); }
.sel-fila:active { background:#333; }

.sel-fila-flag {
  flex-shrink:0; width:44px; height:30px;
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s ease;
  overflow:hidden;
}
.sel-fila-flag img,
.sel-fila-flag-img {
  width:44px; height:30px;
  object-fit:cover; border-radius:3px;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
  display:block;
}
@media(min-width:640px) {
  .sel-fila-flag { width:52px; height:35px; }
  .sel-fila-flag img,
  .sel-fila-flag-img { width:52px; height:35px; }
  .sel-fila-nombre { font-size:22px; }
  .sel-fila-sub { font-size:13px; }
  .sel-fila-badge { font-size:12px; }
  .sel-fila { padding:13px 16px; }
}

/* ═══════════════════════════
   BANDERAS REALES — HERO & SUBNAV
═══════════════════════════ */
/* Imagen bandera grande en el hero */
.hero-flag-img {
  flex-shrink:0;
  width:72px; height:48px;
  border-radius:5px;
  object-fit:cover;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  display:block;
}
@media(min-width:640px) {
  .hero-flag-img { width:90px; height:60px; }
}

/* Bandera de fondo translúcida en el hero */
.hero-flag-bg-img {
  position:absolute; right:-20px; top:50%;
  transform:translateY(-50%);
  width:260px; height:auto;
  opacity:.07; z-index:1;
  user-select:none; pointer-events:none;
  border-radius:6px;
  object-fit:cover;
}
@media(min-width:640px) {
  .hero-flag-bg-img { width:340px; }
}
@media(min-width:960px) {
  .hero-flag-bg-img { width:420px; }
}

/* Bandera en subnav */
.sub-nav-flag-img {
  width:22px; height:15px;
  object-fit:cover; border-radius:2px;
  display:block; flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
@media(min-width:640px) {
  .sub-nav-flag-img { width:26px; height:18px; }
}
.sel-fila-info { flex:1; min-width:0; }
.sel-fila-nombre {
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:20px;
  text-transform:uppercase; line-height:1; margin-bottom:1px; color:var(--blanco);
}
.sel-fila-sub { font-size:12px; color:#999; font-weight:600; }
.sel-fila-badge {
  font-size:11px; font-weight:700; color:var(--verde);
  text-transform:uppercase; letter-spacing:.5px; flex-shrink:0;
}
.sel-fila-badge.vacio { color:#555; }

/* ═══════════════════════════
   TOPBAR STICKY
═══════════════════════════ */
.sub-topbar {
  background:#1a1a1a; display:flex; align-items:center;
  padding:0 4px; border-bottom:3px solid var(--verde);
  position:sticky; top:0; z-index:100; min-height:46px;
}
.btn-volver {
  display:flex; align-items:center; gap:5px; padding:11px 10px;
  background:none; border:none; color:var(--verde);
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:15px; text-transform:uppercase; letter-spacing:.5px;
  cursor:pointer; flex-shrink:0; white-space:nowrap;
}
.btn-volver:active { opacity:.7; }
.sub-sel-nav { flex:1; display:flex; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.sub-sel-nav::-webkit-scrollbar { display:none; }
.sub-nav-btn {
  display:inline-flex; align-items:center; gap:5px; padding:11px 13px;
  border:none; background:none; color:#666;
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:14px; text-transform:uppercase; cursor:pointer; flex-shrink:0;
  border-bottom:3px solid transparent; margin-bottom:-3px; white-space:nowrap;
  transition:color .15s;
}
.sub-nav-btn.active { color:var(--blanco); border-color:var(--verde); }
.sub-nav-btn .flag { font-size:16px; }

/* ═══════════════════════════
   HERO SELECCIÓN
═══════════════════════════ */
.sel-hero {
  background:var(--negro); color:var(--blanco);
  position:relative; overflow:hidden; padding:0;
  animation: fadeIn .3s ease both;
}
/* patrón de grilla sutil */
.hero-grid-pattern {
  position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.02) 39px,rgba(255,255,255,.02) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.02) 39px,rgba(255,255,255,.02) 40px);
  z-index:0;
}
/* glow con colores del país */
.hero-glow {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 90% 30%, var(--c1-alpha,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 5%  80%, var(--c2-alpha,.10) 0%, transparent 50%);
  z-index:0;
}
/* bandera gigante de fondo */
.hero-flag-bg {
  position:absolute; right:-10px; top:0; bottom:0;
  font-size:220px; line-height:1;
  display:flex; align-items:center;
  opacity:.08; z-index:1; user-select:none; pointer-events:none;
}
.hero-content { position:relative; z-index:2; padding:28px 18px 24px; }
.hero-label {
  display:inline-block; background:var(--verde); color:var(--negro);
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:10px;
  letter-spacing:2px; text-transform:uppercase; padding:3px 8px; margin-bottom:13px;
}
.hero-top { display:flex; align-items:flex-start; gap:16px; margin-bottom:16px; }
.hero-flag { font-size:52px; line-height:1; flex-shrink:0; }
.hero-titles {}
.hero-titles h2 {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:clamp(32px,8vw,58px); line-height:.92; text-transform:uppercase;
  letter-spacing:-1px; color:var(--blanco);
}
/* el span usa el color del país — si es muy oscuro se sobreescribe inline desde JS */
.hero-titles h2 span { color:var(--c1-text, var(--verde)); }
.hero-subtitulo {
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:13px; letter-spacing:2px; text-transform:uppercase;
  color:var(--c1-text, var(--verde)); margin-top:5px;
}
/* stats también en blanco */
.hero-stat-val { color:var(--blanco); }
.hero-stats {
  display:flex; flex-wrap:wrap; gap:0;
  border-top:1px solid #222; padding-top:13px;
}
.hero-stat {
  display:flex; flex-direction:column; gap:2px;
  padding:6px 16px 6px 0; margin-right:16px;
  border-right:1px solid #2a2a2a;
}
.hero-stat:last-child { border-right:none; margin-right:0; padding-right:0; }
.hero-stat-lbl {
  font-size:8px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--c1,#94BE1F);
}
.hero-stat-val {
  font-family:'Barlow Condensed',sans-serif; font-size:17px;
  font-weight:900; color:var(--blanco);
}
/* línea inferior del hero con color del país */
.hero-stripe {
  height:3px; width:100%;
  background:linear-gradient(90deg, var(--c1,#94BE1F), var(--c2,#111));
}

/* ═══════════════════════════
   TABS POSICIÓN (sticky bajo topbar)
═══════════════════════════ */
.pos-tabs-wrap {
  background:#fff; border-bottom:2px solid var(--gris-medio);
  position:sticky; top:46px; z-index:90;
  display:flex; overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; white-space:nowrap;
}
.pos-tabs-wrap::-webkit-scrollbar { display:none; }
.pos-tab {
  display:inline-flex; align-items:center; gap:6px; padding:12px 16px;
  border:none; background:none; cursor:pointer; flex-shrink:0;
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:15px; text-transform:uppercase; letter-spacing:.5px;
  color:#888; border-bottom:2px solid transparent; margin-bottom:-2px;
  transition:color .15s;
}
.pos-tab.active { color:var(--negro); border-color:var(--negro); }
.pos-tab .tab-chip {
  width:22px; height:22px; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:900; color:#fff;
}
.pos-tab[data-pos="GK"]  .tab-chip { background:var(--pos-gk); }
.pos-tab[data-pos="DEF"] .tab-chip { background:var(--pos-def); }
.pos-tab[data-pos="MID"] .tab-chip { background:var(--pos-mid); }
.pos-tab[data-pos="FWD"] .tab-chip { background:var(--pos-fwd); }
.pos-tab[data-pos="ALL"] .tab-chip { background:var(--negro); }

/* ═══════════════════════════
   CONTENIDO SELECCIÓN
═══════════════════════════ */
.sub-content {
  padding:14px 12px 56px;
  max-width:1100px;
  margin:0 auto;
}
.sub-content.animating { animation: fadeUp .3s ease both; }

/* Sección posición */
.pos-section { margin-bottom:20px; scroll-margin-top:92px; }
.pos-title-bar {
  display:flex; align-items:center; gap:8px;
  margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid;
}
.pos-title-bar.gk  { color:var(--pos-gk);  border-color:var(--pos-gk); }
.pos-title-bar.def { color:var(--pos-def); border-color:var(--pos-def); }
.pos-title-bar.mid { color:var(--pos-mid); border-color:var(--pos-mid); }
.pos-title-bar.fwd { color:var(--pos-fwd); border-color:var(--pos-fwd); }
.pos-chip {
  width:30px; height:30px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:12px; color:#fff; flex-shrink:0;
}
.gk  .pos-chip { background:var(--pos-gk); }
.def .pos-chip { background:var(--pos-def); }
.mid .pos-chip { background:var(--pos-mid); }
.fwd .pos-chip { background:var(--pos-fwd); }
.pos-label {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:20px; text-transform:uppercase;
}
.pos-count-lbl { margin-left:auto; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; opacity:.5; }

/* ═══════════════════════════
   GRID — modo compacto (1 col, lista)
   modo foto: 2/3/4 col grid vertical
═══════════════════════════ */

/* MODO COMPACTO: una columna, filas horizontales */
.jugadores-grid {
  display:flex; flex-direction:column;
  gap:5px; margin-bottom:5px;
}
.jugadores-grid:last-of-type { margin-bottom:0; }

/* MODO FOTO: grilla vertical */
.jugadores-grid.con-foto {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:9px; margin-bottom:9px;
}
@media(min-width:480px){ .jugadores-grid.con-foto{ grid-template-columns:repeat(3,1fr); } }
@media(min-width:700px){ .jugadores-grid.con-foto{ grid-template-columns:repeat(4,1fr); } }

/* ── BASE card ── */
.jugador-card {
  background:var(--blanco); border-radius:6px; overflow:hidden;
  cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.08);
  transition:box-shadow .2s ease, background .15s;
  opacity:0; animation: cardIn .38s ease both;
  position:relative;
}
.jugador-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.13); }
.jugador-card.open  { box-shadow:0 3px 12px rgba(0,0,0,.15); }

/* ── MODO COMPACTO — layout horizontal ── */
.jugador-card.compacto {
  display:flex; align-items:stretch;
  border-radius:5px;
}

/* barra lateral de color por posición */
.jugador-card.compacto .card-stripe {
  width:4px; min-height:100%; flex-shrink:0; border-radius:0;
  align-self:stretch;
}
.gk  .jugador-card.compacto .card-stripe { background:var(--pos-gk); }
.def .jugador-card.compacto .card-stripe { background:var(--pos-def); }
.mid .jugador-card.compacto .card-stripe { background:var(--pos-mid); }
.fwd .jugador-card.compacto .card-stripe { background:var(--pos-fwd); }

/* número de camiseta */
.card-num-bubble {
  flex-shrink:0; width:44px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:20px; color:#bbb; background:#f5f5f5;
  border-right:1px solid #eee;
}
.jugador-card.open .card-num-bubble { background:#efefef; }

/* zona de texto central */
.card-body-compact {
  flex:1; min-width:0;
  padding:11px 10px 11px 13px;
  display:flex; flex-direction:column; justify-content:center; gap:3px;
}
.card-nombre-compact {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:19px; text-transform:uppercase; line-height:1.1;
  color:var(--negro); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-club-compact {
  font-size:12px; color:#888; font-weight:600; line-height:1.3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-dato-compact {
  font-size:12px; color:var(--verde); font-weight:700; line-height:1.4;
  margin-top:3px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
/* invitación a leer bio — siempre visible */
.card-bio-cta {
  display:inline-flex; align-items:center; gap:4px;
  margin-top:5px;
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:12px; text-transform:uppercase; letter-spacing:.6px;
  color:#aaa; transition:color .15s;
}
.jugador-card:hover .card-bio-cta { color:var(--negro); }
.jugador-card.open  .card-bio-cta { color:var(--verde); }
.card-bio-cta-arrow { font-size:13px; transition:transform .2s; display:inline-block; }
.jugador-card.open .card-bio-cta-arrow { transform:rotate(180deg); }

/* hover compacto */
.jugador-card.compacto:hover { background:#fafafa; }
.jugador-card.compacto.open  { background:#f5f9ec; }

/* ── MODO FOTO — card vertical (existente) ── */
.jugador-card.con-foto-card {
  transform-origin: center;
}
.jugador-card.con-foto-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:3px; opacity:0; transition:opacity .22s;
}
.gk  .jugador-card.con-foto-card::after { background:var(--pos-gk); }
.def .jugador-card.con-foto-card::after { background:var(--pos-def); }
.mid .jugador-card.con-foto-card::after { background:var(--pos-mid); }
.fwd .jugador-card.con-foto-card::after { background:var(--pos-fwd); }
.jugador-card.con-foto-card:hover { transform:translateY(-4px); box-shadow:0 8px 22px rgba(0,0,0,.13); }
.jugador-card.con-foto-card:hover::after { opacity:1; }

/* franja de color superior — solo modo foto */
.card-stripe-top { height:3px; width:100%; display:none; }
.con-foto-card .card-stripe-top { display:block; }
.gk  .card-stripe-top { background:var(--pos-gk); }
.def .card-stripe-top { background:var(--pos-def); }
.mid .card-stripe-top { background:var(--pos-mid); }
.fwd .card-stripe-top { background:var(--pos-fwd); }

/* zona imagen */
.card-media {
  width:100%; aspect-ratio:3/4; overflow:hidden; position:relative;
}
.card-media img {
  width:100%; height:100%; object-fit:cover; object-position:top center; display:block;
  transition:transform .4s ease;
}
.jugador-card:hover .card-media img { transform:scale(1.07); }

/* cuerpo de la card foto */
.card-body { padding:9px 10px 11px; }
.card-num-pos {
  font-size:9px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:#aaa; margin-bottom:2px;
}
.card-nombre {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:16px; text-transform:uppercase; line-height:1.15; margin-bottom:2px;
}
.card-club { font-size:11px; color:#888; font-weight:600; margin-bottom:6px; }
.card-bio-preview {
  font-size:12px; color:#777; line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden; margin-bottom:8px;
}
.card-cta {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--negro); color:var(--blanco);
  margin:0 -10px -11px; padding:8px 11px;
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:12px; text-transform:uppercase; letter-spacing:.8px;
  transition:background .15s;
}
.jugador-card:hover .card-cta { background:#222; }
.jugador-card.open .card-cta  { background:var(--verde-oscuro); }
.card-cta .cta-arrow { font-size:12px; transition:transform .22s; display:inline-block; }
.jugador-card.open .card-cta .cta-arrow { transform:rotate(180deg); }

/* ═══════════════════════════
   EXPAND (debajo de cada fila)
═══════════════════════════ */
.fila-expand {
  display:none; background:var(--negro); border-radius:6px;
  overflow:hidden; animation: sd .22s ease; margin-bottom:9px;
}
.fila-expand.open { display:block; }

.expand-inner { display:flex; min-height:130px; }
.expand-foto { width:95px; flex-shrink:0; background:#1a1a1a; overflow:hidden; }
.expand-foto img { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }
.sin-foto-exp { width:100%; min-height:130px; display:flex; align-items:center; justify-content:center; font-size:40px; color:#2a2a2a; }
.expand-info { flex:1; padding:12px 11px; min-width:0; }
.expand-pos-badge {
  display:inline-block; padding:2px 7px; border-radius:3px;
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:9px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; color:#fff;
}
.expand-pos-badge.gk  { background:var(--pos-gk); }
.expand-pos-badge.def { background:var(--pos-def); }
.expand-pos-badge.mid { background:var(--pos-mid); }
.expand-pos-badge.fwd { background:var(--pos-fwd); }
.expand-nombre { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:clamp(18px,4.5vw,26px); text-transform:uppercase; line-height:1.05; color:var(--blanco); margin-bottom:8px; }
.expand-datos { display:flex; flex-wrap:wrap; gap:9px; }
.expand-dato { display:flex; flex-direction:column; gap:1px; }
.expand-dato .lbl { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--verde); }
.expand-dato .val { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; color:#ccc; }
.expand-bio-wrap { background:#181818; border-top:2px solid var(--verde); padding:14px 15px 16px; }
.expand-bio-tit { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--verde); margin-bottom:8px; }
.expand-bio { font-size:15px; line-height:1.75; color:#bbb; }
.expand-dato-extra { display:inline-flex; align-items:flex-start; gap:5px; background:rgba(148,190,31,.1); border:1px solid rgba(148,190,31,.22); border-radius:4px; padding:5px 9px; margin-top:9px; font-size:11px; font-weight:600; color:var(--verde); line-height:1.4; }
.expand-close {
  display:block; width:100%; padding:11px;
  background:var(--verde-oscuro); border:none; color:#fff;
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:12px; text-transform:uppercase; letter-spacing:1px;
  cursor:pointer; text-align:center; transition:background .15s;
}
.expand-close:hover  { background:var(--verde); }
.expand-close:active { background:#2d7a10; }

/* ═══════════════════════════
   VACÍO
═══════════════════════════ */
.estado-vacio { background:var(--blanco); border-radius:6px; padding:36px 18px; text-align:center; border:2px dashed var(--gris-medio); }
.estado-vacio .icono { font-size:36px; margin-bottom:10px; opacity:.3; }
.estado-vacio h3 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:17px; text-transform:uppercase; color:#999; margin-bottom:5px; }
.estado-vacio p { font-size:13px; color:#bbb; line-height:1.5; }

/* ═══════════════════════════
   FOOTER
═══════════════════════════ */
.especial-footer { background:var(--negro); color:var(--blanco); padding:20px 16px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; }
.footer-brand { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:18px; text-transform:uppercase; }
.footer-brand span { color:var(--verde); }
.footer-meta { font-size:11px; color:#555; }

    jugadores:[
      { numero:1,  nombre:'Johny Placide',        pos:'GK',  nacimiento:'29 ene 1988', club:'Bastia',                       pais_club:'Francia',       foto:'', bio:'La carrera de Johny Placide se ha construido sobre la paciencia, la resiliencia y la autoridad ganadas a pulso. Desarrollado en Le Havre, se abrio camino en el futbol frances antes de convertirse en una confiable ultima linea de defensa para el Bastia. Poco llamativo pero ferozmente confiable, es conocido por sus agudos reflejos, fuerte posicionamiento y manos seguras, cualidades que le valieron el apodo de El Guardian. Pilar desde 2011 y a menudo capitan, ha guiado a sus companeros mas jovenes a traves de campanas exigentes. Al clasificarse al Mundial declaro: Estaremos alli para disfrutarlo y enorgullecer a la gente.', dato_extra:'Apodado El Guardian, es el pilar y capitan historico del equipo desde 2011' },
      { numero:12, nombre:'Josue Duverger',        pos:'GK',  nacimiento:'27 abr 2000', club:'Cosmos Koblenz',               pais_club:'Alemania',      foto:'', bio:'Nacido en Montreal y perfeccionado en las academias de Portugal, Duverger combina la tecnica latina con el fuego caribeno. Rapidez, valentía en el aire y resortes en los mano a mano. Habia representado a Canada a nivel sub-17, el pais de su nacimiento, pero a los 17 anos eligio jugar por Haiti. Ha habido lecciones dolorosas, incluyendo un humillante gol en contra tras pifiar el balon dos veces contra Canada. Pero la historia de Duverger no se trata de errores sino de respuesta: lanzarse, levantarse, repetir.', dato_extra:'Nacio en Canada y lo represento en juveniles, pero a los 17 anos eligio jugar por Haiti' },
      { numero:21, nombre:'Alexandre Pierre',      pos:'GK',  nacimiento:'25 feb 2001', club:'Sochaux',                      pais_club:'Francia',       foto:'', bio:'En las jaulas de Aubervilliers, justo al norte de Paris, Pierre aprendio a volar. Hijo de herencia haitiana, se lanzaba por las canchas mucho antes de tener guantes adecuados. Hoy, con 1,91 m, comanda su area con autoridad. Rapido para salir de su linea y bendecido con reflejos felinos. Su camino serpenteo a traves del Stade Lavallois, Angers y Estrasburgo, donde firmo su primer contrato profesional en 2021. Para Haiti se ha convertido en parte de una nueva generacion que se atreve a pensar en grande.', dato_extra:'Aprendio a volar en las canchas de asfalto de los suburbios de Paris' },
      { numero:2,  nombre:'Ricardo Ade',           pos:'DEF', nacimiento:'21 may 1990', club:'LDU Quito',                    pais_club:'Ecuador',       foto:'', bio:'Lo llaman El Muro por una razon. Ade no solo defiende; el comanda el juego desde atras, apagando los ataques antes de que comiencen. Al principio de su carrera, se quedo varado en Tailandia tras un fichaje fallido, sobreviviendo con poco mas que pan y leche condensada durante una semana; una dura prueba que forjo la resiliencia detras del jugador. En Liga de Quito, sus potentes cabezazos y tranquila distribucion le valieron cuatro trofeos nacionales. Defender se trata de leer el juego y estar listo para la batalla.', dato_extra:'El Muro sobrevivio a base de pan y leche condensada en Tailandia tras un fichaje fallido' },
      { numero:3,  nombre:'Carlens Arcus',         pos:'DEF', nacimiento:'28 jun 1996', club:'Angers',                       pais_club:'Francia',       foto:'', bio:'Desde las calles de Puerto Principe hasta el rugido de las finales de la Copa Oro de la Concacaf, Arcus ha lucido los desafios con orgullo. Rapido, intrepido en ataque y con tremenda resistencia, encarna al lateral moderno. Pilar de la seleccion desde 2016, entrego el centro que sello el primer boleto de Haiti a un Mundial desde 1974, poniendo fin a una sequia de 51 anos. Siempre tuve dos suenos: ya habia logrado el primero, que era firmar un contrato profesional. El segundo se acaba de hacer realidad.', dato_extra:'Dio la asistencia clave que clasifico a Haiti al Mundial despues de 51 anos' },
      { numero:4,  nombre:'Jean-Kevin Duverne',    pos:'DEF', nacimiento:'12 jul 1997', club:'Nantes',                       pais_club:'Francia',       foto:'', bio:'La historia de Duverne es de una tenacidad silenciosa y respeto ganado con esfuerzo. La culminacion de anos en las implacables ligas de Francia, donde aprendio a mezclar su ritmo puro con una inquebrantable determinacion defensiva. Ha ejercido su oficio en Belgica con el Gent a prestamo del Nantes. Este intrepido y atletico defensor se siente tan comodo organizando la linea de fondo como iniciando ataques desde lo profundo.', dato_extra:'Llego al equipo en 2024 tras anos de formacion en las implacables ligas de Francia' },
      { numero:5,  nombre:'Martin Experience',     pos:'DEF', nacimiento:'9 mar 1999',  club:'AS Nancy',                    pais_club:'Francia',       foto:'', bio:'Hay algo apropiado en el apellido de Martin Experience. En la cancha, juega con una experiencia que supera sus anos. Nacido en Francia pero orgullosamente atado a sus raices haitianas, se labro su camino a traves de las divisiones inferiores antes de ganarse su lugar con el Nancy, que logro el ascenso a la Ligue 2 en 2025. Cuando Haiti sello su lugar en el Mundial, Experience apenas pudo contenerse. Jugar en un Mundial es extraordinario, no importa a quien enfrentemos, dijo, antes de que el sorteo los emparejara con Brasil, la seleccion de su idolo Neymar.', dato_extra:'Lateral moderno que jugara contra Brasil, la seleccion de su idolo de la infancia, Neymar' },
      { numero:6,  nombre:'Delentz Pierre',        pos:'DEF', nacimiento:'16 nov 2000', club:'FC Tulsa',                     pais_club:'EEUU',          foto:'', bio:'Delentz Pierre crecio bajo el sol de Florida pero su juego lleva el acero de sus raices haitianas. A los 14 anos viajo mas de 2.000 millas para asistir a una prueba en la Academia del Real Salt Lake, pero no entro. Un ano despues regreso, y asi comenzo su viaje. Eligio el futbol universitario en la Universidad de Portland donde se convirtio en mas que un defensor: era alguien que marcaba la pauta. Alto, rapido y dominante en el aire, su enfoque esta en hacer de mis debilidades y mis errores mis fortalezas.', dato_extra:'A los 14 anos viajo 2.000 millas para una prueba, fue rechazado y volvio al ano siguiente' },
      { numero:13, nombre:'Hannes Delcroix',       pos:'DEF', nacimiento:'28 feb 1999', club:'Lugano',                       pais_club:'Suiza',         foto:'', bio:'Nacido en Haiti y criado en Belgica, Delcroix crecio entre dos culturas futbolisticas, el espiritu caribeno y la precision europea. En el Anderlecht pulio su oficio; en el Burnley aprendio el magullador arte de la supervivencia y la necesidad de tener paciencia. Mis caracteristicas son ser alguien tranquilo, fuera de la cancha y tambien en la cancha. Busco un club que me garantizara mucho tiempo de juego, dijo al mudarse al Lugano, donde rapidamente se convirtio en titular regular de Haiti.', dato_extra:'Nacido en Haiti y criado en Belgica; combina el espiritu caribeno con la precision europea' },
      { numero:22, nombre:'Miguel Joseph',         pos:'DEF', nacimiento:'14 sep 2009', club:'Haiti national team',          pais_club:'Haiti',         foto:'', bio:'Un minuto estaba anclando las selecciones juveniles de Haiti, y al siguiente subia a un vuelo hacia Canada, convocado de emergencia para reemplazar al lesionado Carlens Arcus. Con solo 16 anos, porta la autoridad silenciosa de un veterano: rapido sobre el terreno, dominante en el aire y sorprendentemente habil para un central. Los entrenadores hablan de un jugador que lee el peligro temprano y trata al balon como a un aliado. En la busqueda de Haiti por su proxima piedra angular defensiva, Joseph se siente menos como una apuesta y mas como una promesa.', dato_extra:'Convocado de emergencia a la seleccion mayor cuando solo tenia 16 anos' },
      { numero:23, nombre:'Wilguens Paugain',      pos:'DEF', nacimiento:'24 ago 2001', club:'Zulte Waregem',                pais_club:'Belgica',       foto:'', bio:'Nacido en la pobreza extrema en Thomazeau, fue adoptado a los cinco anos por una familia en la Francia rural y fue descubierto por el Nancy-Lorraine a los 12 anos. Sufrio una grave lesion a los 18 que lo obligo a salir del juego ocho meses y le costo un contrato profesional, empujandolo a trabajar un tiempo repartiendo pizzas. Se defendio y se abrio camino por Chipre, Letonia y Austria hasta llegar a Belgica. Esta es una oportunidad para que el mundo deje de descuidar a Haiti. Espero que el Mundial le devuelva el respeto a nuestro equipo y a nuestro pais.', dato_extra:'Fue adoptado en Francia, sufrio una lesion, repartio pizzas y resurgio en el futbol' },
      { numero:24, nombre:'Duke Lacroix',          pos:'DEF', nacimiento:'14 oct 1993', club:'Colorado Springs Switchbacks', pais_club:'EEUU',          foto:'', bio:'Antes de merodear por la banda para Haiti, Lacroix era un estudiante atleta en la Universidad de Pensilvania, obteniendo una licenciatura en sociologia y una maestria en psicologia deportiva. Rapido, intrepido y con motor de velocista, juega de lateral izquierdo como un extremo disfrazado. Desde que se comprometio con Haiti en 2023 ha vestido los colores con orgullo. Fuera del futbol es vicepresidente de United Black Players, presidente de la Asociacion de Jugadores de la USL y trabaja para una organizacion de salud mental para atletas.', dato_extra:'Tiene maestrias universitarias, es presidente sindical y activista social' },
      { numero:25, nombre:'Stephane Lambese',      pos:'DEF', nacimiento:'10 nov 1995', club:'FC Fleury 91',                 pais_club:'Francia',       foto:'', bio:'Un producto de la academia del Paris Saint-Germain e internacional de Francia Sub-16 como centrodelantero, pero la eleccion de representar a la patria de su madre fue al final una decision natural y rapida. Rapido, agresivo en el aire y engaosamente habil con el balon, Lambese aporta la garra de un defensor y la vision de un extremo a la banda derecha. Su apodo es Bisonte, porque soy fornido, rapido y duro en los duelos. De joven gano un titulo regional junto al actual capitan del Milan, Mike Maignan.', dato_extra:'Apodado Bisonte, es un ex delantero de la academia del PSG reconvertido a lateral' },
      { numero:7,  nombre:'Jean-Ricner Bellegarde', pos:'MID', nacimiento:'27 jun 1998', club:'Wolves',                     pais_club:'Inglaterra',    foto:'', bio:'Si el mediocampo fuera un tablero de ajedrez, Bellegarde seria la reina: rapido, versatil e imposible de contener. Nacido en Colombes, Francia, se gano una reputacion en el Estrasburgo por carreras veloces, vision aguda y quites intrepidos, rasgos que lo llevaron al Wolverhampton en la Premier League. Apodado El Arquitecto, prospera dictando el ritmo y filtrando pases que parecen imposibles. Cambio la lealtad a Haiti despues de representar a Francia a nivel juvenil. Tiene una habilidad natural para acelerar y lastimar al oponente, dijo su ex entrenador del Estrasburgo.', dato_extra:'Apodado El Arquitecto; fue internacional juvenil con Francia antes de elegir a Haiti' },
      { numero:8,  nombre:'Leverton Pierre',       pos:'MID', nacimiento:'9 mar 1998',  club:'Vizela',                      pais_club:'Portugal',      foto:'', bio:'Hay una historia que cuentan en Tabarre, Haiti, de un nino flaco persiguiendo balones sobre concreto agrietado. Ese nino se convirtio en Leverton Pierre, un mediocampista incansable que rompe lineas con un pase nitido y lee el juego como un veterano. En 2017 firmo su primer contrato en Francia con el Bastia. Tiene un titulo de la Ligue 2 y es pilar de Haiti en tres Copas Oro. Dato curioso: una vez persiguio a un perro que robo la pelota del partido por todo el vecindario, deteniendose solo cuando la entierro en el jardin de alguien.', dato_extra:'De nino, una vez persiguio por todo el barrio a un perro que se habia robado la pelota' },
      { numero:14, nombre:'Carl Sainte',           pos:'MID', nacimiento:'9 ago 2002',  club:'El Paso Locomotive',          pais_club:'EEUU',          foto:'', bio:'En el Grand-Goave de Haiti, mucho antes de acostumbrarse a los reflectores de los estadios, Sainte aprendio a jugar en canchas polvorientas donde la pelota rebotaba como una pregunta. Alto, elegante y engaosamente rapido, cubre terreno sin esfuerzo y filtra pases a traves del trafico. Ayudo al Violette a un titulo haitiano, levanto la corona de la MLS NEXT Pro con el North Texas y escalo a la MLS con Dallas. Sus companeros lo llaman El Metronomo. No solo nos clasificamos, llevamos el latido de una nacion a la cancha, escribio al sellarse la clasificacion.', dato_extra:'El Metronomo del equipo; aprendio a jugar en las polvorientas canchas de Grand-Goave' },
      { numero:15, nombre:'Woodensky Pierre',      pos:'MID', nacimiento:'30 dic 2004', club:'Real Hope FA',                pais_club:'Haiti',         foto:'', bio:'En el ruido de Cite Soleil en Haiti, donde el futbol se juega por instinto y supervivencia, Pierre aprendio pronto que la vacilacion es costosa. Sus amigos recuerdan a un nino flaco persiguiendo partidos desde el amanecer hasta las farolas, que ya ladraba instrucciones como un veterano. Ahora en Real Hope FA, es un ancla en el mediocampo con filo y elegancia. Ascendio a traves del Violette recolectando honores domesticos. Trabaja duro y cree en ti mismo, dice, una mentalidad moldeada por su crianza en uno de los barrios mas exigentes de Haiti.', dato_extra:'Forjo su actitud en el barrio Cite Soleil, donde el futbol se juega por supervivencia' },
      { numero:16, nombre:'Danley Jean Jacques',   pos:'MID', nacimiento:'20 may 2000', club:'Philadelphia Union',          pais_club:'EEUU',          foto:'', bio:'En las canchas de Petit-Goave, Jean Jacques entraba al quite como si la supervivencia estuviera en juego. Sus amigos juran que odiaba tanto la derrota que reproducía los partidos en su cabeza antes de dormir. Ese fuego lo llevo del Don Bosco al Metz y luego a Filadelfia en 2024. Para Haiti ha marcado goles vitales. Cinco anos despues de dejar Haiti no ha perdido su amor por la cocina haitiana; su favorito es el diri ak sos pwa, arroz con pure de frijoles negros, especialmente cuando lo cocina su madre. Jugara el partido del Mundial contra Brasil en el estadio de su propio club.', dato_extra:'Jugara el partido del Mundial contra Brasil en el estadio de su propio club' },
      { numero:17, nombre:'Christopher Attys',     pos:'MID', nacimiento:'13 mar 2001', club:'Triestina',                   pais_club:'Italia',        foto:'', bio:'Un dinamo nacido en Francia de herencia haitiana, Attys lleva ambas culturas a su juego: el talento del futbol juvenil frances y la garra que lo ha visto forjarse un camino profesional desde la academia del Inter hasta el Triestina en la Serie C sin perder nunca su mordida. Alto y engaosamente rapido, no teme conducir hacia el espacio o lanzar un pase milimetrico. Anoto tres goles para su pais en la Liga de Naciones 2024-25 y en las eliminatorias. Fuera de la cancha, es un aficionado al cafe y un coleccionista de zapatillas retro.', dato_extra:'Surgido de la academia del Inter de Milan; coleccionista de zapatillas retro' },
      { numero:9,  nombre:'Duckens Nazon',         pos:'FWD', nacimiento:'7 abr 1994',  club:'Esteghlal',                   pais_club:'Iran',          foto:'', bio:'Conocido como La Bestia, Nazon ciertamente no deambula por los partidos, choca contra ellos. Criado en los suburbios de Paris, ha jugado en once equipos a lo largo de su carrera en cinco continentes, incluyendo el Coventry, Oldham y St Mirren. Antes de la eliminatoria decisiva contra Nicaragua, dio un discurso en el vestuario: Aqui en Haiti, algunas personas solo tienen unos pocos dolares. No tienen nada mas. Solo nos tienen a nosotros. Si no ganamos, no les queda nada. Hoy podemos darles una sonrisa. Confian en nuestros pies. Sus palabras hicieron el truco.', dato_extra:'La Bestia motivo al equipo diciendo: si no ganamos, a la gente de Haiti no le queda nada' },
      { numero:10, nombre:'Louicius Deedson',      pos:'FWD', nacimiento:'11 feb 2001', club:'FC Dallas',                   pais_club:'EEUU',          foto:'', bio:'Lo primero que notas de Deedson es la rapidez: para cuando los defensores reaccionan, el ya se ha ido. De Haiti a los Estados Unidos adonde se mudo a los 15 anos pasando por los campos de Dinamarca, para Deedson cada sprint se siente personal. Juega al borde del caos: habil, siempre yendo hacia adelante. Marco el gol inicial en el partido contra Nicaragua que sello la clasificacion de Haiti al Mundial. Este es el mejor sentimiento de mi carrera, dijo. Es mi sentimiento, y luego el de los fanáticos, y luego el de mi familia en casa.', dato_extra:'Marco el gol historico que le dio la clasificacion a Haiti al Mundial contra Nicaragua' },
      { numero:11, nombre:'Frantzdy Pierrot',      pos:'FWD', nacimiento:'29 mar 1995', club:'AEK Athens',                  pais_club:'Grecia',        foto:'', bio:'Cuando Pierrot se lanza al aire, el tiempo parece detenerse. Luego la red se agita. Apodado La Montana, el delantero haitiano hace que los cabezazos parezcan inevitables, dominando a los defensores en el aire mientras los sorprende en el cesped con toques suaves. Nacido en Cap-Haitien pero criado en Massachusetts, su viaje a Europa fue de todo menos sencillo, pasando por el futbol universitario estadounidense antes de prosperar en Belgica, Francia, Israel y Grecia. Con un impresionante promedio de 1,5 partidos por gol, conlleva las expectativas de su pais con orgullo silencioso.', dato_extra:'La Montana, un temible cabeceador que se formo en el futbol universitario de EEUU' },
      { numero:18, nombre:'Wilson Isidor',         pos:'FWD', nacimiento:'27 ago 2000', club:'Sunderland',                  pais_club:'Inglaterra',    foto:'', bio:'Isidor perseguia el futbol como si le debiera algo, lanzandose entre autos en canchas callejeras improvisadas. Alto y rapido con instinto de depredador, es igual de peligroso en el aire que girando. Su viaje lo llevo de Monaco a ganar titulos de liga y copa en Rusia con el Zenit de San Petersburgo. Habia representado a Francia en todas las categorias inferiores pero finalmente Haiti consiguio a su hombre. He visto todos sus mensajes, me pidieron, me esperaron, y aqui estoy, confirmo en redes sociales. Debuto y anoto en el mismo partido.', dato_extra:'Multicampeon en Rusia con el Zenit; represento a Francia en juveniles antes de elegir Haiti' },
      { numero:19, nombre:'Derrick Etienne Jr',    pos:'FWD', nacimiento:'25 nov 1996', club:'Toronto FC',                  pais_club:'Canada',        foto:'', bio:'Nacido en Virginia pero criado con una dieta de orgullo haitiano, Etienne siguio a su padre, tambien llamado Derrick, a la seleccion nacional, y a su vez fue seguido por su hermana Danielle. Rapido, habil y sorprendentemente fuerte en el aire, se nutre de los grandes momentos. Solo estoy emocionado. Creo que tendre la oportunidad de ser parte de algo especial, dijo cuando se comprometio con Haiti. Con el Columbus Crew levanto la Copa MLS en 2020, uno de varios honores en un viaje por la MLS moldeado por la resiliencia.', dato_extra:'Toda su familia es de seleccion: su padre y su hermana tambien jugaron por Haiti' },
      { numero:20, nombre:'Josue Casimir',         pos:'FWD', nacimiento:'24 sep 2001', club:'AJ Auxerre',                  pais_club:'Francia',       foto:'', bio:'En las soleadas canchas de Guadalupe, Casimir aprendio a jugar a la fuerza. Sin espacio, sin tiempo, solo instinto. Para cuando llego a la academia del Le Havre, ya jugaba con rebeldia. Es electrico: rapido en cinco yardas, valiente en el aire y bendecido con la arrogancia de un extremo. No solo vence a los defensores; se burla de ellos. Juega con una sonrisa que casi se puede escuchar. Jugo al futbol juvenil para Guadalupe, por quienes su hermano Stevenson juega en defensa, pero elegir a Haiti, la tierra natal de sus padres, le dio a su carrera un latido diferente.', dato_extra:'Electrico extremo que jugo en juveniles para Guadalupe, el pais de su hermano Stevenson' },
      { numero:26, nombre:'Ruben Providence',      pos:'FWD', nacimiento:'7 jul 2001',  club:'Almere City FC',              pais_club:'Paises Bajos',  foto:'', bio:'En las canchas de la academia del Paris Saint-Germain, Providence era el tipo de extremo que convertia el entrenamiento en teatro: bicicletas, explosiones de ritmo y defensores persiguiendo sombras. Ese instinto se moldeo, pero para cuando se mudo a la Roma en 2019, el estilo crudo habia encontrado estructura en uno de los entornos mas exigentes de Europa. Su etapa en el TSV Hartberg le anaidio acero a su seda. En 2025 eligio representar a Haiti, una decision arraigada en el orgullo mas que en la conveniencia.', dato_extra:'Graduado de las exigentes academias del PSG y la AS Roma; juega con libertad callejera' },
      { numero:27, nombre:'Yassin Fortune',        pos:'FWD', nacimiento:'30 ene 1999', club:'Vizela',                      pais_club:'Portugal',      foto:'', bio:'Se cuenta una historia en el Arsenal sobre un adolescente Fortune que dejaba a los defensores persiguiendo sombras. Criado en los suburbios de Paris en una familia muy unida, el Arsenal lo ficho del Lens a los 16 anos pero nunca jugo para el primer equipo, pasando al Sion de Suiza tres anos despues. El verano pasado se unio al Vizela y en un mes se convirtio en internacional absoluto, habiendo representado a Francia en varias categorias juveniles. Explosivo, habil y sorprendentemente fuerte en el aire, pero mas probable que pase tiempo con sus seres queridos a que persiga los titulares.', dato_extra:'Fichado a los 16 anos por el Arsenal, explosivo y muy apegado a su familia' },
      { numero:28, nombre:'Woobens Pacius',        pos:'FWD', nacimiento:'24 may 2001', club:'Nashville',                   pais_club:'EEUU',          foto:'', bio:'El viaje de Pacius hacia la seleccion nacional de Haiti comenzo en Quebec, donde nacio de padres haitianos. Recibio su primera convocatoria apenas en octubre pasado. Estoy muy orgulloso. Cuando eres nino siempre suenas con jugar en estos partidos internacionales. Creci en un hogar haitiano; poder representar las raices de nuestra familia es especial, dijo. Hay algo crudo e implacable en el: no solo corre, el caza. Los companeros de equipo bromean diciendo que nunca deja de presionar, incluso en los entrenamientos.', dato_extra:'Nacido en Quebec, es conocido porque no solo corre sino que caza e impacable al presionar' },
      { numero:29, nombre:'Fabrice Picault',       pos:'FWD', nacimiento:'23 feb 1991', club:'Atlanta United',              pais_club:'EEUU',          foto:'', bio:'Cuando Haiti sello su regreso al Mundial, Picault no estaba en la cancha. Una lesion lo mantuvo fuera, y el estaba llorando. Super emocionado, super feliz. Cada vez que piso el campo, represento a algo mas que a mi mismo, dijo. Criado en Nueva York por padres haitianos, se mudo a Italia a los 16 anos para unirse al Cagliari quedandose cinco anos. Lo llaman Fafa, pero los defensores a menudo lo llaman de otra manera una vez que se ha ido. Gano dos partidos con Estados Unidos antes de cambiar a Haiti. Habla cinco idiomas con fluidez, escribe poesia y disfruta del tiro con pistola.', dato_extra:'Fafa habla cinco idiomas con fluidez, escribe poesia y disfruta del tiro con pistola' }
    ]
  },
  escocia:{ nombre:'Escocia', flag:'🏴󠁧󠁢󠁳󠁣󠁴󠁿', dt:'', mundiales:'0', grupo:'C', subtitulo:'The Tartan Army', jugadores:[{ 
        numero:1, nombre:'Craig Gordon', pos:'GK', nacimiento:'31 dic 1982', club:'Hearts', pais_club:'Escocia', foto:'', 
        bio:'El Mundial parece un final apropiado para una carrera extraordinaria que en términos de Escocia comenzó en mayo de 2004. Los años intermedios vieron a Gordon mudarse por un récord de transferencia británico para un arquero (£9m en 2007) y encontrarse con una lesión grave que parecía acortar su carrera. Gordon se recuperó para prolongar su carrera; ganando una gran cantidad de honores en el Celtic, regresando al club de su infancia Hearts y prolongando su participación internacional por mucho más tiempo del que nadie anticipó razonablemente. Su atajada insana para el Hearts en Dundee en enero pasará a la historia no solo como la mejor de él, sino como una de las mejores que el fútbol nacional escocés ha presenciado en la memoria viva. "Ese es un momento que atesoraré", dijo Gordon. Así también, una de las pocas casillas que le quedaban por marcar; un lugar en el Mundial.', 
        dato_extra:'Veterano incombustible que volvió de una grave lesión para atajar pasados los 40 años' 
      },
      { 
        numero:12, nombre:'Liam Kelly', pos:'GK', nacimiento:'23 ene 1996', club:'Rangers', pais_club:'Escocia', foto:'', 
        bio:'Tomó un riesgo al cambiar el Motherwell por el Rangers en el verano de 2024, dado que estaba cambiando el fútbol garantizado en el primer equipo por una probable posición de suplente en Ibrox. Kelly de hecho ha jugado un papel secundario detrás de Jack Butland pero se ha mantenido involucrado en la escena de Escocia. Es un personaje enormemente popular dentro del vestuario de Escocia. Nunca fue probable que jugara en la Eurocopa 2024, pero se ganó un lugar en el equipo de la fase final, como ahora de nuevo, en parte por el papel que desempeña en la camaradería del equipo. Los dos hermanos de Kelly, Sean y Shay, también juegan fútbol de liga en Escocia. El debut de Liam con Escocia, contra Francia en un amistoso a la edad de 27 años, fue un momento emotivo para todos los involucrados.', 
        dato_extra:'Personaje muy popular en el vestuario; sus dos hermanos también son futbolistas' 
      },
      {

      {

      {

        bio:'Surgieron dudas sobre la participación de Hanley en el Mundial después de que se perdiera los amistosos de marzo mientras se recuperaba de una lesión. Sin embargo, el central ha sido un habitual bajo el mando de Steve Clarke y rara vez ha defraudado a su país: fue titular en dos de los tres partidos de Escocia en la Eurocopa 2024. Hanley fue fundamental en un alboroto a principios de la última campaña. El entrenador del Motherwell, Jens Berthel Askou, fue acusado de falta de respeto hacia el veterano después de que los Hibs fueran derrotados por 2-0 en Lanarkshire. Askou dijo que el Motherwell prevaleció después de "cortar el suministro de sus mediocampistas dejando a Hanley para sacar el balón jugado". Esto dio pie a sugerencias de que Askou había destacado innecesariamente las deficiencias de Hanley.',

      {

        bio:'Brendan Rodgers pronosticó grandes cosas para Hendry en 2018. "Tiene la calidad para jugar en el Celtic y en el equipo internacional durante los próximos 10 años", dijo Rodgers. "Su perfil se adapta al más alto nivel. Es rápido y puede defender, y es importante que sepas manejar el balón". El camino de Hendry no ha sido exactamente como predijo Rodgers, pero un traslado a Arabia Saudita no ha disminuido la fe de Steve Clarke en el central. Las palabras de Rodgers parecieron resonar en Steven Gerrard, quien se llevó a Hendry al club. Hendry había sobresalido anteriormente en la liga belga. Cuando Escocia abrió la última Eurocopa, Hendry estaba en el corazón de la defensa. Si bien la oportunidad internacional ha sido limitada desde entonces, sería una sorpresa si Hendry no figura en absoluto en el Mundial.',

      {

        bio:'Robertson sigue muy de cerca el récord de 102 apariciones con Escocia de Kenny Dalglish. La historia del lateral izquierdo es muy conocida; después de haber sido liberado por el Celtic, apiló estantes en Asda y jugó como aficionado para Queen\'s Park. "La vida es una basura a esta edad sin dinero", publicó Robertson en las redes sociales en 2012. Siete años después, era campeón de la Liga de Campeones. La carrera de Robertson despegó en el Dundee United y el Hull City, pero fue puesta en otro nivel por Jürgen Klopp. La capitanía de Escocia inicialmente parecía una carga pesada para Robertson, pero se le ha visto cómodo en el papel desde hace mucho tiempo. Uno de los varios jugadores de Escocia que pueden percibir en privado que esta marca su última oportunidad mundialista.',

      { 
        numero:16, nombre:'Scott McKenna', pos:'DEF', nacimiento:'12 nov 1996', club:'Dinamo Zagreb', pais_club:'Croacia', foto:'', 
        bio:'Uno de los varios jugadores de Escocia de esta época que han optado por tomar caminos menos transitados. Con su etapa en el Nottingham Forest llegando a su fin, McKenna aceptó irse cedido al Copenhague. Han seguido etapas en Las Palmas y Dinamo Zagreb. "Es como un anciano gruñón. Yo lo llamo mi abuelo, mi abuelito", dijo el ex compañero de McKenna en Las Palmas, Oli McBurnie. Un central imponente y zurdo con más velocidad de la que a menudo se le reconoce, McKenna posiblemente ha sido infrautilizado en el esquema escocés. Un oficial de Zagreb insistió en que el Dinamo había rechazado ofertas superiores a los 10 millones de libras por McKenna en enero. Hace una década, McKenna estaba intercambiando un préstamo en el Alloa Athletic por el mismo en el Ayr United.',

      {

        bio:'Un jugador perseguido por el Bayern Múnich después de irrumpir en la escena a los 16 años en el Hearts. Hickey tiene una tendencia a hacer las cosas a su manera. Habiéndose mudado de la academia del Hearts a la del Celtic, regresó a Tynecastle por la creencia de que tendría más oportunidades de jugar en el primer equipo en Edimburgo. Se demostró que Hickey tenía razón entonces y se demostró que tenía razón una vez más; rechazó a los gigantes bávaros para fichar por el Bologna, donde continuó su ascenso. Si no fuera por las lesiones, apenas es una señal de falta de respeto para el Brentford sugerir que estaría en uno de los clubes más grandes de la Premier League. Igualmente cómodo con el pie izquierdo o el derecho. Se ha consolidado como la mejor opción para Escocia en el lateral derecho. Un defensor tenaz, ahora poderoso, con una técnica que casi se siente desperdiciada en la defensa.',

      { 
        numero:17, nombre:'Kenny McLean', pos:'MID', nacimiento:'8 ene 1992', club:'Norwich City', pais_club:'Inglaterra', foto:'', 
        bio:'Es difícil imaginar a McLean haciendo algo en este Mundial, de hecho durante el resto de su carrera, que iguale los eventos del 18 de noviembre en Hampden Park. Los escoceses estaban destinados al torneo principal pero una nación se mordía las uñas mientras McLean avanzaba durante un contraataque, divisó a Kasper Schmeichel adelantado y soltó un disparo desde la mitad de la cancha que hizo volar el techo del famoso y antiguo estadio. McLean había coronado una noche de drama épico con el gol de su vida. Esta fue la justa recompensa para uno de los héroes anónimos de Steve Clarke. McLean, sin embargo, tiene antecedentes de dar un paso al frente en la gran ocasión; anotó los penales ganadores en partidos separados mientras Escocia llegaba a la Eurocopa 2020. Un mediocampista sin complicaciones y de bajo mantenimiento tenido en alta estima tanto por Clarke como por sus compañeros.',

        bio:'Irving dejó el Hearts, el club de su juventud, por el Türkgücü München en medio de la pandemia de Covid. Los modestos alemanes posteriormente quebraron. "Es difícil cuando estás solo en otro país. Pensás de todo, incluyendo: \'¿Cómo pudo pasar esto?\'", recordó Irving. Se encontró de vuelta en Edimburgo, entrenando solo o uniéndose a partidos de fútbol 5 con sus amigos. El "Pirlo de Portobello" (llamado así por la zona de Edimburgo donde asistió a la escuela secundaria, en lugar del mercado de Londres) estaba en otra encrucijada. La siguiente parada fue Austria, donde Irving se unió al Klagenfurt antes de que el West Ham interviniera para comprar al mediocampista. Inicialmente, Irving fue cedido nuevamente a Austria, pero formó parte de los planteles del primer equipo del West Ham antes de cambiar al Sparta de Praga en enero. Un mediocampista de la vieja escuela, buen pasador, con una zurda maravillosa.',

      {

        bio:'¿Se lanzó a sí mismo 8 pies, 18 pies u 88 pies en el aire antes de plantar una escandalosa chilena fuera del alcance de Kasper Schmeichel?. ¿A quién le importa?. El gol inicial de McTominay contra Dinamarca marcó la pauta para una noche notable mientras Escocia ponía fin a casi tres décadas de dolor mundialista. El mayor regalo de Alex McLeish a su nación durante un segundo período como entrenador de Escocia fue convencer a McTominay de vestir el azul marino. Sin la negativa de McLeish de aceptar un no por respuesta, McTominay, nacido en Lancaster, podría ser un jugador de Inglaterra a estas alturas. En cambio, es idolatrado por el Ejército del Tartán. También hay alabanzas en Nápoles, después de que formara parte de la plantilla ganadora del Scudetto 2024-25. "Si Diego era Dios, entonces Scott es Jesús", insistió Diego Maradona Jnr, en referencia al estatus que tanto su padre como McTominay han asegurado a los ojos de los fanáticos del Napoli. McTominay llegará al Mundial con algo que demostrar, habiendo decepcionado en la Eurocopa 2024.',

      { 
        numero:19, nombre:'Lennon Miller', pos:'MID', nacimiento:'25 ago 2006', club:'Udinese', pais_club:'Italia', foto:'', 
        bio:'La tragedia golpeó a Miller a la edad de solo cinco años cuando su madre, Donna, murió de cáncer en 2012. "Al pasar por eso a una edad tan temprana, el fútbol ha sido mi escape", dice. "Sentía que cada vez que estaba en la casa me alcanzaba y cada vez que estaba en la cancha me olvidaba de ello". Baste decir que Donna estaría orgullosa de su muchacho. Miller fue una estrella adolescente en el Motherwell, que se tomó un tiempo y consideración cuidadosa antes de hacer su inevitable próximo movimiento. Se unió a la afluencia de escoceses en la Serie A al unirse al Udinese en 2025, lo que le valió al Motherwell una tarifa récord para el club en el proceso. Miller llamó la atención cuando se involucró por primera vez en la escena de Escocia. "Obviamente no voy a entrar y ser el mejor jugador ahí, pero creo que tal vez podría serlo en un par de meses", dijo el mediocampista. No importan los chasquidos de lengua; esta fue una arrogancia verbal entrañable.',

      { 
        numero:10, nombre:'Ryan Christie', pos:'MID', nacimiento:'22 feb 1995', club:'Bournemouth', pais_club:'Inglaterra', foto:'', 
        bio:'El padre de Christie, Charlie, fue un mediocampista enormemente talentoso que nunca jugó en el escenario que su habilidad merecía a pesar de un breve paso por el Celtic. Charlie y Ryan se destacan en el dominio de provenir de Inverness, una ciudad escocesa que curiosamente ha ofrecido poco a modo de futbolistas de primer nivel durante varias décadas. Un pilar en los equipos de Steve Clarke y una útil amenaza de gol, la propia carrera de Christie en el Celtic parecía terminada antes de que las circunstancias le ofrecieran una oportunidad que aprovechó con alegría a finales de 2018. Tres años después, la Premier League llamó a su puerta. Fue memorablemente reducido a lágrimas durante una entrevista de televisión en vivo mientras Escocia alcanzaba la Eurocopa 2020. Charlie, tan cautivado por la representación de ese momento en una tira cómica del Guardian, ordenó una copia enmarcada para el cumpleaños de su hijo.',

      { 
        numero:20, nombre:'Lewis Ferguson', pos:'MID', nacimiento:'24 ago 1999', club:'Bologna', pais_club:'Italia', foto:'', 
        bio:'Es probable que Ferguson estuviera ejerciendo su oficio en un gigante italiano a estas alturas (la Juventus y los clubes de Milán tenían un interés creíble) si no fuera por la grave lesión de rodilla sufrida en abril de 2024, que lo dejó fuera de la Eurocopa de ese verano. "Lo primero que pregunté fue \u0027¿Significa esto que me pierdo la Eurocopa?\u0027 y dijeron que sí", dijo Ferguson. "Ese fue un momento difícil. No soy un tipo emocional, pero me senté allí pensando que esa era mi oportunidad de jugar en un torneo importante y se había esfumado. Había sido algo con lo que siempre había soñado, así que fue difícil. Pero aquí estamos ahora". Al año siguiente, emuló a Graeme Souness como los escoceses en ganar la Coppa Italia. El capitán del Bologna proviene de una familia de mediocampistas con clase; a saber, su padre Derek y su tío Barry. Un mediocampista combativo que proporciona una amenaza de gol que Escocia aún no ha aprovechado adecuadamente.',

      { 
        numero:11, nombre:'Che Adams', pos:'FWD', nacimiento:'13 jul 1996', club:'Torino', pais_club:'Italia', foto:'', 
        bio:'Emuló al ícono escocés Denis Law al anotar su décimo gol con el Torino en octubre pasado. Steve Clarke cree que Adams es poco apreciado por los observadores del equipo de Escocia, dado el nivel de carrera desinteresada del delantero. El movimiento de Adams es clave para que los escoceses tengan una fuerte amenaza de gol desde el mediocampo. Adams jugó para Inglaterra a nivel sub-20 y también era elegible para representar a Antigua. Se comprometió con Escocia poco antes de la Eurocopa 2020 después de una larga especulación sobre su futuro internacional y es probable que sea la primera opción de Clarke como delantero centro en el Mundial. Adams respaldó a los fanáticos de Escocia después de los abucheos a tiempo completo cuando Bielorrusia fue superada por poco durante la clasificación. "Creo que tenían razón", dijo. "Hubo algunas malas tomas de decisiones, falta de concentración en momentos clave del partido. Tenemos que hacerlo mejor".', 
        dato_extra:'Emuló a Denis Law al marcar su décimo gol con el Torino en Italia' 
      },
      { 
        numero:9, nombre:'Lawrence Shankland', pos:'FWD', nacimiento:'10 ago 1995', club:'Hearts', pais_club:'Escocia', foto:'', 
        bio:'El autor del "otro" gol en esa famosa noche contra Dinamarca. El toque a quemarropa de dos yardas de Shankland fue, sin embargo, tan vital como los de sus contemporáneos más rimbombantes mientras Escocia se clasificaba para el Mundial. La carrera de Shankland ha dado un giro completo bajo el mismo entrenador. Derek McInnes liberó a un joven Shankland del Aberdeen, tras lo cual reconstruyó su carrera en las divisiones inferiores de Escocia. El toque prolífico de Shankland en el Hearts lo abandonó en la temporada 2024/25; su tiempo en Edimburgo parecía seguro que iba a terminar. Entra en escena McInnes, quien insistió en que Hearts mantuviera la fe en su capitán. Shankland ha cumplido para su antiguo/nuevo entrenador, gracias a algunas exhibiciones soberbias en la campaña que acaba de terminar. Para "Glad all over" véase "Law-rence Shank-land" al estilo de The Dave Clark Five. Un depredador del área capaz de un excelente juego de asociación y retención de balón. Lo que a Shankland le falta en velocidad lo compensa con inteligencia de juego.', 
        dato_extra:'Depredador del área que reconstruyó su carrera en el ascenso para luego ser capitán' 
      },
      { 
        numero:27, nombre:'Ben Gannon-Doak', pos:'FWD', nacimiento:'11 nov 2005', club:'Bournemouth', pais_club:'Inglaterra', foto:'', 
        bio:'Gannon-Doak reveló recientemente cómo se reconectó con la religión después de salir de casa cuando tenía 16 años para unirse al Liverpool. "Creo que Dios simplemente te mantiene con los pies en la tierra y humilde porque siempre nos dice que no tendríamos nada de esto sin él", dijo. "Dependo en gran medida de Dios para mantenerme fuerte". Gannon-Doak sobresalió en el sistema juvenil del Celtic antes de ser atraído a Anfield. Jürgen Klopp era fanático. Sin embargo, una combinación de lesiones y la salida de Klopp estancaron el progreso del extremo. Luego optó por relanzar su carrera en el Bournemouth. Steve Clarke ha tratado de moderar el entusiasmo en torno a Gannon-Doak, pero el ruido es comprensible. Este jugador puede ser un verdadero marcador de diferencias para los escoceses. Tiene directitud y un ritmo eléctrico, que en una noche de Liga de Naciones contra Croacia aterrorizó visiblemente al lateral de 77 millones de libras Josko Gvardiol.', 
        dato_extra:'Revivió su religión tras dejar su casa a los 16 años; su ritmo aterrorizó a Josko Gvardiol' 
      },
      { 
        numero:28, nombre:'Findlay Curtis', pos:'FWD', nacimiento:'1 oct 2006', club:'Rangers', pais_club:'Escocia', foto:'', 
        bio:'La aparición de Steve Clarke en el encuentro de marzo de Kilmarnock y Hearts resultó vital para Curtis. El jugador cedido por el Rangers produjo una excelente actuación en la banda izquierda para el Kilmarnock, y Clarke convocó a Curtis solo unos días después para partidos amistosos. "Estaba estallando de orgullo y se lo dije a mi mamá y a mi papá", recordó Curtis. "Mi mamá empezó a llorar". Escocia está corta de opciones de ataque por las bandas, lo que indudablemente ayudó al caso de Curtis, con Clarke también ansioso por demostrar que tiene los ojos puestos en la próxima generación después de que Harvey Barnes rechazara los acercamientos de Escocia. La participación internacional de Curtis llegó tarde; apenas apareció por primera vez con el equipo sub-21 de Escocia el año pasado. Clarke no ha comparado sin razón a Curtis con Ben Gannon-Doak. Lo más probable es que Curtis reciba una gran oportunidad en el fútbol del primer equipo con el Rangers la próxima temporada. Ciertamente debería.', 
        dato_extra:'Su madre rompió a llorar al enterarse de su sorpresiva convocatoria a la selección mayor' 
      },
      { 
        numero:29, nombre:'George Hirst', pos:'FWD', nacimiento:'15 feb 1999', club:'Ipswich Town', pais_club:'Inglaterra', foto:'', 
        bio:'El padre de Hirst, David, hizo solo tres apariciones con Inglaterra a pesar de su excelente destreza goleadora en el Sheffield Wednesday. Alex Ferguson intentó y fracasó en fichar a Hirst padre para el Manchester United en varias ocasiones. Las esperanzas de George de emular a David en Hillsborough no se materializaron, pero ha encontrado un hogar en Portman Road y participó en campañas de ascenso consecutivas mientras el Ipswich era catapultado desde la League One hasta la Premier League. "Es un personaje duro y lo ha hecho bien para nosotros cada temporada en cada división", dijo el entrenador del Ipswich, Kieran McKenna. "George ha sido una parte enorme del éxito aquí, un servidor increíble para el club de fútbol y sigue siendo una persona realmente importante en el grupo de liderazgo".', 
        dato_extra:'Logró dos ascensos consecutivos con el Ipswich Town hasta llegar a la Premier League' 
      } ] },
